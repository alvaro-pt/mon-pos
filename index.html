<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moloni POS</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <meta http-equiv="refresh" content="1.2; url=sale.html" />
  <style>
    body { height:100dvh; display:grid; place-items:center; background:linear-gradient(160deg,#0a3329,var(--brand-900)); color:#cfe9e1; }
    .splash { text-align:center; animation:pop .5s var(--ease); }
    .mark { width:88px; height:88px; border-radius:24px; margin:0 auto var(--sp-5);
      background:linear-gradient(145deg,var(--brand-400),var(--brand-600)); display:grid; place-items:center;
      color:#04231d; font-weight:900; font-size:48px; box-shadow:var(--sh-lg), inset 0 2px 0 rgba(255,255,255,.3); }
    .splash h1 { color:#fff; font-size:var(--fs-2xl); font-weight:800; letter-spacing:-.01em; }
    .splash p { font-size:var(--fs-sm); margin-top:6px; opacity:.8; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="mark">m</div>
    <h1>Moloni POS</h1>
    <p>A iniciar terminal…</p>
  </div>
  <script>window.setTimeout(function(){ location.href = "sale.html"; }, 1100);</script>

</html>
