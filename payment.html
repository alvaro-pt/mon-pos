<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Moloni POS — Pagamento</title>
  <script>try{var t=sessionStorage.getItem('pos_theme');if(t&&t!=='normal')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/sale.css" />
  <link rel="stylesheet" href="assets/css/payment.css" />
</head>
<body>
  <header class="pay-top">
    <a class="pay-top__back" href="sale.html" id="back"></a>
    <span class="pay-top__title" id="title">Pagamento</span>
  </header>

  <main class="pay-screen">
    <h1 class="sr-only" id="h1">Pagamento</h1>
    <section class="pay-left">
      <div class="pay-total">
        <div class="lbl" id="lblDue"></div>
        <div class="big num" id="grandTotal">—</div>
      </div>

      <div class="methods" id="methods">
        <button class="method" type="button" data-m="cash" aria-pressed="true"><span data-icon="banknote"></span><span data-s="pay.method.cash"></span></button>
        <button class="method" type="button" data-m="card" aria-pressed="false"><span data-icon="card"></span><span data-s="pay.method.card"></span></button>
        <button class="method" type="button" data-m="mbway" aria-pressed="false"><span data-icon="smartphone"></span><span data-s="pay.method.mbway"></span></button>
      </div>

      <!-- painel dinheiro -->
      <div class="panel" id="cashPanel">
        <button class="cash__received" id="received" type="button">
          <span class="k" id="lblReceived"></span>
          <span class="v num" id="receivedVal">0,00 €</span>
        </button>
        <div class="quick" id="quick"></div>
        <div class="change-row"><span class="k" id="lblChange"></span><span class="v num" id="changeVal">0,00 €</span></div>
      </div>

      <!-- painel cartão / mbway -->
      <div class="panel hidden" id="termPanel">
        <div class="terminal">
          <span data-icon="card" id="termIcon"></span>
          <p id="termMsg"></p>
          <small id="termHint"></small>
        </div>
      </div>
    </section>

    <aside class="pay-right">
      <div class="receipt">
        <h2 id="rTitle"></h2>
        <div id="rRows"></div>
      </div>
      <button class="pay" id="finish" type="button"><span id="finishLbl"></span><span class="pay__amount num" id="finishAmt"></span></button>
      <div class="cert">
        <div class="qr" aria-hidden="true"></div>
        ATCUD: AJ4F-1 · <span id="certTxt"></span>
      </div>
    </aside>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
  (function () {
    "use strict";
    var $ = function (s) { return document.querySelector(s); };
    var ic = POS.icon, cart = POS.cart;

    // Fonte de verdade única: o carrinho. Sem itens => volta à venda.
    var totals = cart.totals();
    if (!totals.itemCount) { window.location.href = "sale.html"; return; }

    var method = "cash";
    var receivedCents = 0;

    function paintIcons() {
      document.querySelectorAll("[data-icon]").forEach(function (el) { el.innerHTML = ic(el.getAttribute("data-icon"), { size: 32, stroke: 1.6 }); });
      $("#back").innerHTML = ic("chevron-left", { size: 20 }) + "<span>" + POS.s("act.back") + "</span>";
    }

    function applyStatic() {
      document.querySelectorAll("[data-s]").forEach(function (el) { el.textContent = POS.s(el.getAttribute("data-s")); });
      $("#title").textContent = POS.s("pay.title");
      $("#h1").textContent = POS.s("pay.title");
      $("#lblDue").textContent = POS.s("cart.totalDue");
      $("#lblReceived").textContent = POS.s("pay.received");
      $("#lblChange").textContent = POS.s("pay.change");
      $("#rTitle").textContent = POS.s("pay.summary");
      $("#certTxt").textContent = POS.s("pay.cert");
      $("#finishLbl").textContent = POS.s("pay.complete");
      $("#back").innerHTML = ic("chevron-left", { size: 20 }) + "<span>" + POS.s("act.back") + "</span>";
    }

    function renderTotals() {
      totals = cart.totals();
      $("#grandTotal").textContent = POS.money(totals.totalCents);
      $("#finishAmt").textContent = POS.money(totals.totalCents);
      var rows = rrow(POS.s("tot.subtotal"), POS.money(totals.subtotalCents));
      totals.taxBreakdown.forEach(function (g) { rows += rrow(POS.s("tot.tax") + " " + g.rate + "%", POS.money(g.tax)); });
      if (totals.discountCents > 0) rows += rrow(POS.s("tot.discount"), "−" + POS.money(totals.discountCents));
      var c = cart.customer();
      rows += rrow(POS.s("cart.customer"), c.nif ? "NIF " + c.nif : POS.t(c.name));
      rows += '<div class="rrow tot"><span>' + POS.s("tot.total") + '</span><span class="v">' + POS.money(totals.totalCents) + "</span></div>";
      $("#rRows").innerHTML = rows;
    }
    function rrow(l, v) { return '<div class="rrow"><span>' + l + '</span><span class="v">' + v + "</span></div>"; }

    /* ---------- Quick cash: denominações EUR ≥ total + exato ---------- */
    function renderQuick() {
      var host = $("#quick"); host.innerHTML = "";
      var notes = [500, 1000, 2000, 5000, 10000];
      var vals = [totals.totalCents];
      // próxima nota "redonda" e notas standard acima do total
      notes.forEach(function (n) { if (n > totals.totalCents) vals.push(n); });
      var ceil5 = Math.ceil(totals.totalCents / 500) * 500;
      if (ceil5 > totals.totalCents) vals.push(ceil5);
      vals = vals.filter(function (v, i, a) { return a.indexOf(v) === i; }).sort(function (a, b) { return a - b; }).slice(0, 6);
      vals.forEach(function (v) {
        var b = document.createElement("button"); b.type = "button";
        if (v === totals.totalCents) { b.className = "exact"; b.textContent = POS.s("pay.exact"); }
        else b.textContent = POS.money(v);
        b.addEventListener("click", function () { receivedCents = v; renderCash(); });
        host.appendChild(b);
      });
    }

    function renderCash() {
      $("#receivedVal").textContent = POS.money(receivedCents);
      $("#changeVal").textContent = POS.money(Math.max(0, receivedCents - totals.totalCents));
    }

    /* ---------- Método ---------- */
    function setMethod(m) {
      method = m;
      document.querySelectorAll(".method").forEach(function (x) { x.setAttribute("aria-pressed", String(x.dataset.m === m)); });
      $("#cashPanel").classList.toggle("hidden", m !== "cash");
      $("#termPanel").classList.toggle("hidden", m === "cash");
      if (m !== "cash") {
        $("#termIcon").innerHTML = ic(m === "card" ? "card" : "smartphone", { size: 44, stroke: 1.5 });
        $("#termMsg").textContent = POS.s(m === "card" ? "pay.method.card" : "pay.method.mbway");
        $("#termHint").textContent = POS.money(totals.totalCents);
      }
    }

    /* ---------- Finalizar ---------- */
    function finish() {
      if (method === "cash" && receivedCents < totals.totalCents) {
        POS.toast(POS.s("pay.insufficient"), { variant: "danger" }); return;
      }
      if (method === "cash") return success();
      // cartão / mbway: estado de espera simulado
      var ov = waiting(POS.s(method === "card" ? "pay.cardWaiting" : "pay.mbwayWaiting"));
      setTimeout(function () { ov.remove(); success(); }, 1400);
    }

    function waiting(msg) {
      var ov = document.createElement("div"); ov.className = "success-ov";
      ov.innerHTML = '<div class="success"><div class="spin"></div><h2>' + msg + "</h2></div>";
      document.body.appendChild(ov); return ov;
    }

    function success() {
      var change = Math.max(0, receivedCents - totals.totalCents);
      var ov = document.createElement("div"); ov.className = "success-ov";
      ov.innerHTML = '<div class="success"><div class="success__badge">' + ic("check", { size: 44, stroke: 2.4 }) + "</div>" +
        "<h2>" + POS.s("pay.done") + "</h2>" +
        (method === "cash" && change > 0 ? '<div class="success__change">' + POS.money(change) + "<small>" + POS.s("pay.change") + "</small></div>" : "") +
        '<button class="btn btn--pay btn--block" id="newSale" style="margin-top:var(--sp-4)">' + POS.s("pay.newSale") + "</button></div>";
      document.body.appendChild(ov);
      cart.clear();
      try { sessionStorage.removeItem("pos_payment"); } catch (e) {}
      ov.querySelector("#newSale").addEventListener("click", function () { window.location.href = "sale.html"; });
      setTimeout(function () { window.location.href = "sale.html"; }, 2600);
    }

    function renderAll() { applyStatic(); paintIcons(); renderTotals(); renderQuick(); renderCash(); setMethod(method); }

    document.querySelectorAll(".method").forEach(function (m) { m.addEventListener("click", function () { setMethod(m.dataset.m); }); });
    $("#received").addEventListener("click", function () {
      POS.keypad({ title: POS.s("pay.received"), sub: POS.s("cart.totalDue") + ": " + POS.money(totals.totalCents),
        decimal: true, initial: 0, maxInt: 5, maxDec: 2, suffix: "€",
        onConfirm: function (v) { receivedCents = Math.round(v * 100); renderCash(); } });
    });
    $("#finish").addEventListener("click", finish);
    POS.onLangChange(renderAll);

    POS.mountDevNav("sale");
    renderAll();
  })();
  </script>
</body>
</html>
