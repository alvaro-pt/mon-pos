<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Moloni POS — Pagamento</title>
  <script>try{var t=sessionStorage.getItem('pos_theme');if(t&&t!=='normal')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/sale.css" />
  <link rel="stylesheet" href="assets/css/payment.css" />
</head>
<body>
  <!-- Topbar (idêntica à venda) -->
  <header class="topbar">
    <a class="topbar__logo topbar__logo--back" href="sale.html" aria-label="Voltar à venda">
      <svg viewBox="0 0 500 500" fill="currentColor" aria-hidden="true" focusable="false"><path d="M493.6 394.7v94.34H159.58C74.62 489.04 5.5 419.92 5.5 334.96V95.46h94.34v239.49c0 32.95 26.79 59.75 59.75 59.75H493.6Z"/><path d="M493.6 155.08v333.95h-94.34V155.08c0-32.95-26.79-59.75-59.75-59.75H99.96V1h239.55c84.97 0 154.08 69.12 154.08 154.08Z"/><path d="M194.85 190.34H304.2v109.35H194.85z"/></svg>
    </a>
    <div class="topbar__brand">
      <span class="topbar__store">Mercearia Avenida</span>
      <span class="topbar__terminal"><span id="topDate">--</span><span class="topbar__dot"> · </span><span id="topClock" class="num">--:--</span></span>
    </div>
    <span class="topbar__spacer"></span>
    <div class="topbar__actions row">
      <div class="topbar__op-group">
        <button class="topbar__user" id="tbUser" type="button" aria-haspopup="menu" aria-expanded="false">
          <span class="topbar__avatar" id="tbAvatar">AS</span>
          <span class="topbar__user-info"><span id="tbUserName">Ana Sousa</span><span class="topbar__user-terminal" id="tbUserTerminal">Terminal 1</span></span>
          <span class="topbar__chev" id="tbUserChev" aria-hidden="true"></span>
        </button>
        <span class="topbar__op-sep" aria-hidden="true"></span>
        <button class="topbar__btn topbar__btn--lock" id="tbLock" type="button" aria-label="Bloquear terminal"></button>
      </div>
    </div>
  </header>

  <main class="pay-screen" id="screen">
    <h1 class="sr-only" id="h1">Pagamento</h1>

    <!-- Coluna esquerda: resumo da venda -->
    <section class="pay-left" aria-labelledby="lblCartSummary">

      <!-- Cliente (acima do resumo) -->
      <button class="pay-cust-row" id="btnCust" type="button" aria-label="Selecionar cliente">
        <span class="pay-cust-row__ic" data-icon="user" aria-hidden="true"></span>
        <div class="pay-cust-row__info">
          <span class="pay-cust-row__name" id="custName">Consumidor Final</span>
          <span class="pay-cust-row__label" data-s="pay.customer">Cliente</span>
        </div>
        <span class="pay-cust-row__chev" data-icon="chevron-right" aria-hidden="true"></span>
      </button>

      <h2 class="pay-left__title" id="lblCartSummary">Resumo da venda</h2>
      <div class="cart-lines" id="cartLines" aria-label="Artigos"></div>
      <div class="cart-totals" id="cartTotals"></div>
      <div id="cartPayInfo"></div>
    </section>

    <!-- Coluna direita: fluxo de pagamento -->
    <aside class="pay-right" aria-label="Pagamento">

      <!-- Dados da Fatura -->
      <button class="billing-card" id="billingCard" type="button" aria-label="Dados da Fatura">
        <span class="billing-card__icon" aria-hidden="true" data-icon="file-text"></span>
        <div class="billing-card__body">
          <span class="billing-card__title" data-s="pay.billingData">Dados da Fatura</span>
          <span class="billing-card__sub" id="bcSub">FS — Fatura Simplificada · 01 jul 2026</span>
        </div>
        <span class="billing-card__chev" aria-hidden="true" data-icon="chevron-right"></span>
      </button>

      <!-- Barra de modo: título + toggle dividido -->
      <div class="pay-mode-bar">
        <span class="pay-mode-bar__title" id="lblPaySection">Pagamentos</span>
        <button class="pay-mode-toggle" id="btnMultiMode" type="button" aria-pressed="false">
          <span data-icon="columns" aria-hidden="true"></span>
          <span id="lblSplit" data-s="pay.split.short">Dividir</span>
        </button>
      </div>

      <!-- ── MODO SIMPLES ─────────────────────────────── -->
      <div id="singleMode">

        <!-- Métodos de pagamento -->
        <div class="methods" id="methods" role="group" aria-label="Método de pagamento">
          <button class="method" type="button" data-m="cash" aria-pressed="false">
            <span class="method__ic" data-icon="banknote" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.cash">Dinheiro</span>
          </button>
          <button class="method" type="button" data-m="card" aria-pressed="false">
            <span class="method__ic" data-icon="card" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.card">Cartão</span>
          </button>
          <button class="method" type="button" data-m="mbway" aria-pressed="false">
            <span class="method__ic" data-icon="smartphone" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.mbway">MB WAY</span>
          </button>
        </div>

        <!-- Painel dinheiro -->
        <div class="panel" id="cashPanel" hidden>
          <button class="cash__received" id="received" type="button">
            <span class="k" id="lblReceived">Valor recebido</span>
            <span class="v num" id="receivedVal">—</span>
          </button>
          <div class="quick" id="quick"></div>
        </div>

        <!-- Painel cartão / MB WAY -->
        <div class="panel panel--term" id="termPanel" hidden>
          <div class="terminal" id="terminal" aria-live="assertive"></div>
        </div>

      </div><!-- /#singleMode -->

      <!-- ── MODO DIVIDIDO ────────────────────────────── -->
      <div id="multiMode" hidden>
        <div class="multi-methods" id="multiMethodList" aria-label="Métodos de pagamento"></div>
      </div>

      <!-- CTA (partilhado pelos dois modos) -->
      <div class="pay-cta">
        <button class="pay" id="finish" type="button">
          <span class="pay__lbl" id="finishLbl"></span>
          <span class="pay__amount num" id="finishAmt"></span>
          <span class="pay__reason" id="finishReason"></span>
        </button>
      </div>

    </aside>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/doc.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
  (function () {
    "use strict";
    var $ = function (s) { return document.querySelector(s); };
    var ic = POS.icon, cart = POS.cart;

    /* ---------- Sobreviver a refresh: carrinho vazio mas venda recente ---------- */
    var LAST_SALE_TTL = 2 * 60 * 1000; // 2 min
    if (!cart.totals().itemCount) {
      var last = POS.lastSale();
      if (last && last.ts && (Date.now() - last.ts) < LAST_SALE_TTL) {
        document.documentElement.lang = POS.lang;
        $("#title").textContent = POS.s("pay.title");
        $("#h1").textContent = POS.s("pay.title");
        POS.mountDevNav("sale");
        if (last.changeCents > 0) { showChangeStep(last.changeCents, { restored: true }); return; }
        POS.clearLastSale();
      }
      window.location.href = "sale.html"; return;
    }

    /* ---------- Estado de UI (não-persistente) ---------- */
    var method = POS.lastMethod();       // método selecionado (default = último usado)
    var amountCents = 0;                 // valor em curso para o método selecionado
    var amountTouched = false;           // operador já definiu valor manual/quick?
    var termState = "idle";              // idle | waiting | declined | cancelled
    var splitMode = false;               // há algum pagamento parcial já registado?
    var committing = false;              // guarda anti-duplo-toque

    // Modo dividido
    var multiMode = false;
    var MULTI_METHODS = [
      { id: "cash",  icon: "banknote",   labelKey: "pay.method.cash" },
      { id: "card",  icon: "card",       labelKey: "pay.method.card" },
      { id: "mbway", icon: "smartphone", labelKey: "pay.method.mbway" },
    ];
    var multiAmounts = { cash: 0, card: 0, mbway: 0 };

    // Estado do formulário / opções do documento
    var docType = cart.state.docType || "receipt";
    var issueDate = new Date().toISOString().slice(0, 10);
    var notes = "";
    var loadAddr = "", loadZip = "", loadCity = "";
    var unloadAddr = "", unloadZip = "", unloadCity = "";
    var transportDt = "";

    function totals() { return cart.totals(); }
    function due() { return cart.dueCents(); }

    /* ---------- paintIcons: resolve [data-icon] ---------- */
    function paintIcons() {
      document.querySelectorAll("[data-icon]").forEach(function (el) {
        var name = el.getAttribute("data-icon");
        var size = el.dataset.size ? parseInt(el.dataset.size, 10) : 22;
        el.innerHTML = ic(name, { size: size, stroke: 1.7 });
        el.removeAttribute("data-icon");
      });
      $("#tbUserChev").innerHTML = ic("chevron-down", { size: 16 });
      $("#tbLock").innerHTML = ic("lock", { size: 18 });
    }

    /* ---------- i18n estático ---------- */
    function applyStatic() {
      document.querySelectorAll("[data-s]").forEach(function (el) {
        el.textContent = POS.s(el.getAttribute("data-s"));
      });
      var h1 = $("#h1"); if (h1) h1.textContent = POS.s("pay.title");
      var lrec = $("#lblReceived"); if (lrec) lrec.textContent = POS.s("pay.received");
      var lcs = $("#lblCartSummary"); if (lcs) lcs.textContent = POS.s("pay.cartSummary");
    }

    /* ---------- Tipo de documento ---------- */
    var DOC_TYPE_META = {
      receipt:        { code: "VD", pt: "Venda a Dinheiro",    en: "Cash Sale" },
      simplified:     { code: "FS", pt: "Fatura Simplificada", en: "Simplified Invoice" },
      invoiceReceipt: { code: "FR", pt: "Fatura-Recibo",       en: "Invoice Receipt" },
      invoice:        { code: "FT", pt: "Fatura",              en: "Invoice" },
      deliveryNote:   { code: "GT", pt: "Guia de Transporte",  en: "Delivery Note" }
    };

    function docTypeLabel(dt) {
      var MAP = {
        receipt: POS.s("doc.receipt"),
        simplified: POS.s("doc.simplified"),
        invoiceReceipt: POS.s("doc.invoiceReceipt"),
        invoice: POS.s("doc.invoice"),
        deliveryNote: POS.s("doc.deliveryNote"),
      };
      return MAP[dt] || dt;
    }

    function renderBillingCard() {
      var sub = document.getElementById("bcSub");
      var card = document.getElementById("billingCard");
      if (!sub || !card) return;
      var meta = DOC_TYPE_META[docType] || DOC_TYPE_META.simplified;
      var label = meta.code + " — " + (POS.lang === "en" ? meta.en : meta.pt);
      var d = issueDate ? new Date(issueDate + "T00:00:00") : new Date();
      var dateStr = d.toLocaleDateString(POS.lang === "en" ? "en-GB" : "pt-PT", { day: "2-digit", month: "short", year: "numeric" });
      sub.textContent = label + " · " + dateStr;
      // Aviso visual se GT sem dados de transporte obrigatórios
      var warnGT = docType === "deliveryNote" && (!loadAddr || !loadZip || !loadCity || !unloadAddr || !unloadCity);
      card.classList.toggle("billing-card--warn", warnGT);
    }

    function setDocType(dt) {
      docType = dt;
      cart.state.docType = dt;
      try { sessionStorage.setItem("pos_cart", JSON.stringify(cart.state)); } catch (e) {}
      document.querySelectorAll(".top-chip").forEach(function (c) {
        c.setAttribute("aria-pressed", String(c.dataset.dt === dt));
      });
      refreshCTA();
    }

    /* ---------- Cliente ---------- */
    function renderCustomer() {
      var c = cart.customer();
      var nameEl = $("#custName");
      if (!nameEl) return;
      var name = POS.t(c.name);
      var nif = c.nif ? " · NIF " + c.nif : "";
      nameEl.textContent = name + nif;
    }

    function openCustomerPicker() {
      function field(id, labelKey, attrs) {
        return '<label class="ff"><span>' + POS.s(labelKey) + '</span>' +
          '<input id="' + id + '" class="ff__in" autocomplete="off" ' + (attrs || "") + '></label>';
      }
      var wrap = document.createElement("div");
      wrap.className = "sheet cust-sheet";
      wrap.innerHTML =
        '<div style="padding:var(--sp-4) var(--sp-5) var(--sp-3)">' +
          '<input class="ff__in" style="width:100%" type="search" placeholder="' + POS.s("cust.search") + '" id="custQ">' +
        '</div>' +
        '<div class="clist" id="clist" style="padding:0 var(--sp-4)"></div>' +
        '<div class="cust-foot">' +
          '<button class="cust-expand" id="custExpand" type="button" aria-expanded="false" hidden>' +
            ic("plus", { size: 18 }) + '<span>' + POS.s("cust.moreFields") + '</span>' +
          '</button>' +
          '<div class="cust-form" id="custForm" hidden>' +
            field("cf_name", "cust.name", "required") +
            '<div class="ff-grid">' + field("cf_nif", "cust.nif", 'inputmode="numeric"') + field("cf_phone", "cust.phone", 'inputmode="tel"') + '</div>' +
            field("cf_addr", "cust.address") +
            '<div class="ff-grid">' + field("cf_zip", "cust.zip") + field("cf_city", "cust.city") + '</div>' +
            field("cf_country", "cust.country") +
            '<button class="btn btn--primary btn--block" id="custSave" type="button" style="margin-top:var(--sp-2)">' +
              ic("check", { size: 18 }) + ' ' + POS.s("cust.save") +
            '</button>' +
          '</div>' +
        '</div>';

      var listEl = wrap.querySelector("#clist");

      function paint(q) {
        listEl.innerHTML = "";
        var trimmed = (q || "").trim();
        var tl = trimmed.toLowerCase();
        var rows = POS.customers.filter(function (c) {
          if (!trimmed) return true;
          return POS.t(c.name).toLowerCase().indexOf(tl) >= 0 || (c.nif || "").indexOf(tl) >= 0;
        });
        var isNif = /^\d{9}$/.test(trimmed);
        var nifMode = isNif && !rows.some(function (c) { return c.nif === trimmed; });

        if (nifMode) {
          var fastBtn = document.createElement("button");
          fastBtn.type = "button"; fastBtn.className = "cust-nif-fast";
          fastBtn.innerHTML =
            '<span class="cust-nif-fast__ic">' + ic("zap", { size: 20 }) + '</span>' +
            '<span class="cust-nif-fast__body"><b>NIF ' + trimmed + '</b>' +
              '<small>' + POS.s("cust.nifFastHint") + '</small></span>' +
            '<span class="cust-nif-fast__chev">' + ic("chevron-right", { size: 16 }) + '</span>';
          fastBtn.addEventListener("click", function () { saveCustomer({ nif: trimmed, quick: true }); });
          listEl.appendChild(fastBtn);
        }

        var expandBtn = wrap.querySelector("#custExpand");
        if (expandBtn) expandBtn.hidden = !(trimmed && (rows.length === 0 || nifMode));

        if (!rows.length && !nifMode) {
          listEl.innerHTML += '<p class="muted" style="padding:12px">' + POS.s("cust.noResults") + '</p>';
          return;
        }

        rows.forEach(function (c) {
          var nm = POS.t(c.name);
          var isActive = c.id === cart.state.customerId;
          var b = document.createElement("button"); b.type = "button"; b.className = "clist__item doc-item";
          b.setAttribute("aria-pressed", String(isActive));
          b.innerHTML =
            '<span class="doc-code" style="--code-c:' + (c.isDefault ? "var(--ink-500)" : avatarColor(nm)) + '">' +
              (c.isDefault ? ic("user", { size: 20 }) : initials(nm)) +
            '</span>' +
            '<span class="doc-item__main">' +
              '<span class="doc-item__no">' + nm + '</span>' +
              '<span class="doc-item__sub">' + (c.nif ? "NIF " + c.nif : POS.s("cart.customer")) + '</span>' +
            '</span>' +
            (isActive ? '<span>' + ic("check", { size: 18 }) + '</span>' : '');
          b.addEventListener("click", function () {
            cart.setCustomer(c.id); renderCustomer(); renderCart(); close();
          });
          listEl.appendChild(b);
        });
      }

      function saveCustomer(d) {
        var nif = (d.nif || "").trim().replace(/\s/g, "");
        if (!d.quick && !d.name) { POS.toast(POS.s("cust.nameRequired"), { variant: "danger", duration: 1800 }); return; }
        if (nif && !/^\d{9}$/.test(nif)) { POS.toast(POS.s("cust.nifInvalid"), { variant: "danger", duration: 1600 }); return; }
        var existing = nif && POS.customers.find(function (c) { return c.nif === nif; });
        if (existing && d.quick) { cart.setCustomer(existing.id); renderCustomer(); renderCart(); close(); return; }
        var id = "c" + Date.now();
        var name = d.name || (nif ? "Particular" : POS.s("cart.customer"));
        var c = { id: id, name: { pt: name, en: name }, nif: nif || null,
          phone: d.phone, address: d.address, zip: d.zip, city: d.city, country: d.country };
        POS.customers.push(c);
        cart.setCustomer(id); renderCustomer(); renderCart(); close();
        POS.toast(POS.s(d.quick ? "cust.nifSaved" : "cust.saved"), { variant: "success", duration: 1800 });
      }

      paint("");
      var close = POS.openModal(wrap, { label: POS.s("cart.customer") });

      wrap.querySelector("#custQ").addEventListener("input", function () { paint(this.value); });

      var expand = wrap.querySelector("#custExpand"), form = wrap.querySelector("#custForm");
      expand.addEventListener("click", function () {
        var open = form.hidden; form.hidden = !open; expand.setAttribute("aria-expanded", String(open));
        if (open) {
          var searchVal = (wrap.querySelector("#custQ").value || "").trim();
          var isNifQ = /^\d{9}$/.test(searchVal);
          if (isNifQ) { wrap.querySelector("#cf_nif").value = searchVal; }
          else if (searchVal) { wrap.querySelector("#cf_name").value = searchVal; }
          wrap.querySelector("#cf_name").focus();
        }
      });
      wrap.querySelector("#custSave").addEventListener("click", function () {
        saveCustomer({
          name: wrap.querySelector("#cf_name").value.trim(),
          nif:  wrap.querySelector("#cf_nif").value,
          phone: wrap.querySelector("#cf_phone").value.trim(),
          address: wrap.querySelector("#cf_addr").value.trim(),
          zip: wrap.querySelector("#cf_zip").value.trim(),
          city: wrap.querySelector("#cf_city").value.trim(),
          country: wrap.querySelector("#cf_country").value.trim(),
        });
      });

      setTimeout(function () { var qi = wrap.querySelector("#custQ"); if (qi) qi.focus(); }, 50);
    }

    /* ---------- Validação do formulário ---------- */
    function validateForm() {
      if (docType === "deliveryNote") {
        if (!loadAddr || !loadZip || !loadCity || !unloadAddr || !unloadCity) {
          return POS.s("pay.transport.needData");
        }
      }
      return null;
    }

    /* ---------- Opções do documento (drawer) ---------- */
    function buildLocFieldset(legend, addrId, zipId, cityId, addrVal, zipVal, cityVal) {
      return '<fieldset class="transport__loc">' +
        '<legend class="transport__legend">' + legend + '</legend>' +
        '<input class="transport__inp" type="text" id="' + addrId + '" placeholder="' + POS.s("pay.transport.addr") + '" value="' + (addrVal || "") + '" autocomplete="off" />' +
        '<div class="transport__row2">' +
          '<input class="transport__inp transport__inp--zip" type="text" id="' + zipId + '" placeholder="' + POS.s("pay.transport.zip") + '" value="' + (zipVal || "") + '" autocomplete="off" />' +
          '<input class="transport__inp" type="text" id="' + cityId + '" placeholder="' + POS.s("pay.transport.city") + '" value="' + (cityVal || "") + '" autocomplete="off" />' +
        '</div>' +
      '</fieldset>';
    }

    function openDocOptions() {
      var isGT = docType === "deliveryNote";
      var wrap = document.createElement("div");
      wrap.className = "doc-opts";
      wrap.innerHTML =
        // Secção: tipo de documento
        '<div class="doc-opts__sect">' +
          '<div class="doc-opts__label">' + POS.s("pay.docType") + '</div>' +
          '<div class="doc-opts__chips" role="group">' +
            [
              { dt: "receipt",        code: "VD" },
              { dt: "simplified",     code: "FS" },
              { dt: "invoiceReceipt", code: "FR" },
              { dt: "invoice",        code: "FT" },
              { dt: "deliveryNote",   code: "GT" }
            ].map(function (x) {
              return '<button class="top-chip doc-opts__chip" type="button" data-dt-inner="' + x.dt + '" aria-pressed="' + (docType === x.dt) + '">' + x.code + '</button>';
            }).join("") +
          '</div>' +
        '</div>' +
        // Secção: data de emissão
        '<div class="doc-opts__sect">' +
          '<label class="doc-opts__label" for="doDt">' + POS.s("pay.issueDate") + '</label>' +
          '<input class="pay-date" type="date" id="doDt" value="' + issueDate + '" />' +
        '</div>' +
        // Secção: observações
        '<div class="doc-opts__sect">' +
          '<label class="doc-opts__label" for="doNotes">' + POS.s("pay.notes") + '</label>' +
          '<textarea class="pay-notes" id="doNotes" rows="3" placeholder="' + POS.s("pay.notesPlaceholder") + '">' + notes + '</textarea>' +
        '</div>' +
        // Dados de transporte
        '<details class="transport" id="doTransport"' + (isGT ? " open" : "") + '>' +
          '<summary class="transport__sum">' +
            '<span class="transport__sum-txt">' + POS.s("pay.transport") + '</span>' +
            '<span class="transport__badge" style="' + (isGT ? "" : "display:none") + '">' + POS.s("pay.transport.required") + '</span>' +
            '<span class="transport__chev" aria-hidden="true"></span>' +
          '</summary>' +
          '<div class="transport__body">' +
            buildLocFieldset(POS.s("pay.transport.load"), "tLoadAddr", "tLoadZip", "tLoadCity", loadAddr, loadZip, loadCity) +
            buildLocFieldset(POS.s("pay.transport.unload"), "tUnloadAddr", "tUnloadZip", "tUnloadCity", unloadAddr, unloadZip, unloadCity) +
            '<div class="transport__dt">' +
              '<label class="transport__legend" for="tDt">' + POS.s("pay.transport.dtStart") + '</label>' +
              '<input class="transport__inp" type="datetime-local" id="tDt" value="' + transportDt + '" />' +
            '</div>' +
          '</div>' +
        '</details>';

      // Eventos nos chips internos de tipo de documento
      wrap.querySelectorAll("[data-dt-inner]").forEach(function (c) {
        c.addEventListener("click", function () {
          setDocType(c.dataset.dtInner);
          wrap.querySelectorAll("[data-dt-inner]").forEach(function (x) {
            x.setAttribute("aria-pressed", String(x.dataset.dtInner === docType));
          });
          renderBillingCard();
          // Abrir/fechar o details de transporte conforme o tipo
          var transp = wrap.querySelector("#doTransport");
          if (transp) {
            transp.open = (docType === "deliveryNote");
            var badge = transp.querySelector(".transport__badge");
            if (badge) badge.style.display = (docType === "deliveryNote") ? "" : "none";
          }
        });
      });

      function saveOpts() {
        var doDt = wrap.querySelector("#doDt");
        var doNotes = wrap.querySelector("#doNotes");
        if (doDt) issueDate = doDt.value;
        if (doNotes) notes = doNotes.value;
        loadAddr = (wrap.querySelector("#tLoadAddr") || {}).value || "";
        loadZip = (wrap.querySelector("#tLoadZip") || {}).value || "";
        loadCity = (wrap.querySelector("#tLoadCity") || {}).value || "";
        unloadAddr = (wrap.querySelector("#tUnloadAddr") || {}).value || "";
        unloadZip = (wrap.querySelector("#tUnloadZip") || {}).value || "";
        unloadCity = (wrap.querySelector("#tUnloadCity") || {}).value || "";
        transportDt = (wrap.querySelector("#tDt") || {}).value || "";
        renderBillingCard();
        refreshCTA();
      }

      wrap.addEventListener("input", saveOpts);
      POS.openDrawer(wrap, { label: POS.s("pay.docOptions"), dimmed: false });
    }

    /* ---------- Resumo da venda (coluna esquerda) ---------- */
    function renderCart() {
      var lines = cart.lines;
      var t = totals();

      if (lines.length === 0) {
        $("#cartLines").innerHTML =
          '<div class="cart-empty">' + ic("shopping-cart", { size: 28, stroke: 1.5 }) +
          '<span>' + POS.s("cart.empty.title") + '</span></div>';
        $("#cartTotals").innerHTML = "";
        renderCartPayInfo();
        return;
      }

      var linesHtml = lines.map(function (l) {
        var p = POS.getProduct(l.productId);
        var name = l.nameOverride || (p ? POS.t(p.name) : l.productId);
        var qty = l.weighable ? (l.qty + " kg") : (l.qty + "×");
        var unitPrice = POS.money(l.unitPriceCents);
        var lineTotal = POS.money(cart.lineTotal(l));
        var discAmt = cart.lineDiscount(l);

        var html = '<div class="cart-line">' +
          '<div class="cart-line__main">' +
            '<span class="cart-line__qty">' + qty + '</span>' +
            '<span class="cart-line__name">' + name + '</span>' +
            '<span class="cart-line__unit num">' + unitPrice + '</span>' +
            '<span class="cart-line__total num">' + lineTotal + '</span>' +
          '</div>';

        if (discAmt > 0) {
          html += '<div class="cart-line__disc">Desconto −' + POS.money(discAmt) + '</div>';
        }

        return html + '</div>';
      }).join("");

      // Descontos discriminados
      var discHtml = "";
      var lineDiscTotal = cart.lines.reduce(function (s, l) { return s + cart.lineDiscount(l); }, 0);
      if (lineDiscTotal > 0) {
        discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + POS.s("disc.perArticle") + '</span><span class="num">−' + POS.money(lineDiscTotal) + '</span></div>';
      }
      var gd = cart.state.discount;
      if (gd) {
        var gdLabel = POS.s("tot.discount") + (gd.type === "pct" ? " (" + gd.value + "%)" : "");
        var globalDiscAmt = t.discountCents - lineDiscTotal - (t.vouchersCents || 0);
        if (globalDiscAmt > 0) discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + gdLabel + '</span><span class="num">−' + POS.money(globalDiscAmt) + '</span></div>';
      }
      (cart.state.vouchers || []).forEach(function (v) {
        if (v.valueCents > 0) discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + v.code + '</span><span class="num">−' + POS.money(v.valueCents) + '</span></div>';
      });

      // IVA total único
      var taxHtml = t.taxCents > 0 ? '<div class="cart-sumrow"><span>' + POS.s("tot.tax") + '</span><span class="num">' + POS.money(t.taxCents) + '</span></div>' : "";

      var totHtml =
        '<div class="cart-sumrow cart-sumrow--sub"><span>' + POS.s("tot.subtotal") + '</span><span class="num">' + POS.money(t.subtotalCents) + '</span></div>' +
        taxHtml +
        discHtml +
        '<div class="cart-sumrow cart-sumrow--total"><span>' + POS.s("tot.total") + '</span><span class="num">' + POS.money(t.totalCents) + '</span></div>';

      $("#cartLines").innerHTML = linesHtml;
      $("#cartTotals").innerHTML = totHtml;
      renderCartPayInfo();
    }

    /* ---------- Pagamentos no carrinho (coluna esquerda) ---------- */
    function methodIcon(m) { return m === "cash" ? "banknote" : m === "card" ? "card" : "smartphone"; }

    function renderCartPayInfo(opts) {
      var el = document.getElementById("cartPayInfo");
      if (!el) return;
      opts = opts || {};
      var total = totals().totalCents;
      var pays = cart.payments();
      var html = "";

      if (multiMode && opts.multiAmounts) {
        // Preview dos montantes introduzidos no modo dividido
        var sumM = 0;
        MULTI_METHODS.forEach(function (m) {
          var amt = opts.multiAmounts[m.id] || 0;
          if (amt > 0) {
            sumM += amt;
            html += '<div class="cart-sumrow cart-sumrow--paid">' +
              '<span>' + POS.s("pay.method." + m.id) + '</span>' +
              '<span class="num">−' + POS.money(amt) + '</span>' +
            '</div>';
          }
        });
        var changeM = Math.max(0, sumM - total);
        var dueM = Math.max(0, total - sumM);
        if (sumM > 0) {
          if (dueM > 0) {
            html += '<div class="cart-sumrow cart-sumrow--due"><span>' + POS.s("pay.due") + '</span><span class="num">' + POS.money(dueM) + '</span></div>';
          } else if (changeM > 0) {
            html += '<div class="cart-sumrow cart-sumrow--change"><span>' + POS.s("pay.changeDue") + '</span><span class="num">' + POS.money(changeM) + '</span></div>';
          }
        }
      } else {
        var liveAmt = opts.liveAmt || 0;
        var liveMethod2 = opts.liveMethod || method;
        var paidBase = cart.paidCents();
        var paidLive = paidBase + liveAmt;
        var changeLive = Math.max(0, paidLive - total);
        var dueLive = Math.max(0, total - paidLive);

        pays.forEach(function (p) {
          html += '<div class="cart-sumrow cart-sumrow--paid">' +
            '<span>' + POS.s("pay.method." + p.method) + '</span>' +
            '<span class="num">−' + POS.money(p.amountCents) + '</span>' +
          '</div>';
        });
        if (liveAmt > 0 && liveMethod2 === "cash") {
          html += '<div class="cart-sumrow cart-sumrow--paid cart-sumrow--preview">' +
            '<span>' + POS.s("pay.method.cash") + '</span>' +
            '<span class="num">−' + POS.money(liveAmt) + '</span>' +
          '</div>';
        }
        if (paidLive > 0) {
          if (dueLive > 0) {
            html += '<div class="cart-sumrow cart-sumrow--due"><span>' + POS.s("pay.due") + '</span><span class="num">' + POS.money(dueLive) + '</span></div>';
          } else if (changeLive > 0) {
            html += '<div class="cart-sumrow cart-sumrow--change"><span>' + POS.s("pay.changeDue") + '</span><span class="num">' + POS.money(changeLive) + '</span></div>';
          }
        }
      }

      el.innerHTML = html ? '<div class="cart-pay-sep"></div>' + html : "";
    }

    /* ---------- renderPayList: no-op (HTML removido) ---------- */
    function renderPayList() { /* elementos removidos do DOM — função mantida para compatibilidade */ }

    /* ---------- Quick-cash ---------- */
    function renderQuick() {
      var host = $("#quick"); host.innerHTML = "";
      var target = due();
      if (target <= 0) target = totals().totalCents;
      if (target <= 0) return;
      var noteVals = [500, 1000, 2000, 5000, 10000];
      var vals = [target];
      var ceil5 = Math.ceil(target / 500) * 500; if (ceil5 > target) vals.push(ceil5);
      noteVals.forEach(function (n) { if (n > target) vals.push(n); });
      var ceilEuro = Math.ceil(target / 100) * 100; if (ceilEuro > target && vals.indexOf(ceilEuro) < 0) vals.push(ceilEuro);
      vals = vals.filter(function (v, i, a) { return a.indexOf(v) === i; }).sort(function (a, b) { return a - b; }).slice(0, 6);
      vals.forEach(function (v) {
        var b = document.createElement("button"); b.type = "button";
        var isExact = v === target;
        var isSelected = amountTouched && v === amountCents;
        b.setAttribute("aria-pressed", String(isSelected));
        if (isExact) {
          b.className = "exact" + (isSelected ? " is-selected" : "");
          b.innerHTML = '<span>' + POS.s("pay.exact") + '</span><span class="num">' + POS.money(v) + "</span>";
        } else {
          b.className = isSelected ? "is-selected" : "";
          b.innerHTML = '<span class="num">' + POS.money(v) + "</span>";
        }
        b.addEventListener("click", function () {
          amountCents = v; amountTouched = true;
          renderQuick(); renderCash(); renderPayBannerLive(); refreshCTA();
        });
        host.appendChild(b);
      });
    }

    function renderCash() {
      $("#receivedVal").textContent = amountTouched ? POS.money(amountCents) : "—";
      $("#received").classList.toggle("is-set", amountTouched);
    }

    // Atualização em tempo real dos pagamentos no carrinho
    function renderPayBannerLive() {
      renderCartPayInfo({ liveAmt: amountTouched ? amountCents : 0, liveMethod: method });
    }

    /* ---------- Painel cartão / MB WAY ---------- */
    function renderTerminal() {
      var host = $("#terminal");
      var chargeAmt = amountTouched ? amountCents : due();
      if (chargeAmt <= 0) chargeAmt = totals().totalCents;

      if (termState === "idle") {
        host.className = "terminal terminal--idle";
        host.innerHTML =
          '<span class="terminal__ic">' + ic(methodIcon(method), { size: 46, stroke: 1.5 }) + "</span>" +
          '<p class="terminal__msg">' + POS.s("pay.card.idle") + "</p>" +
          '<div class="terminal__amt num">' + POS.money(chargeAmt) + "</div>";
      } else if (termState === "waiting") {
        host.className = "terminal terminal--waiting";
        host.innerHTML =
          '<div class="spin" aria-hidden="true"></div>' +
          '<p class="terminal__msg">' + POS.s(method === "mbway" ? "pay.mbway.waiting" : "pay.card.waiting") + "</p>" +
          '<div class="terminal__amt num">' + POS.money(chargeAmt) + "</div>" +
          '<button class="btn btn--block term-cancel" type="button" id="termCancel">' + POS.s("pay.card.cancelOp") + "</button>" +
          '<div class="sim" role="group" aria-label="' + POS.s("pay.sim.hint") + '">' +
            '<button class="sim__btn sim__ok" type="button" id="simOk">' + ic("check", { size: 16 }) + "<span>" + POS.s("pay.sim.approve") + "</span></button>" +
            '<button class="sim__btn sim__no" type="button" id="simNo">' + ic("ban", { size: 16 }) + "<span>" + POS.s("pay.sim.decline") + "</span></button>" +
          "</div>";
        host.querySelector("#termCancel").addEventListener("click", function () { termCancel(chargeAmt); });
        host.querySelector("#simOk").addEventListener("click", function () { termApprove(chargeAmt); });
        host.querySelector("#simNo").addEventListener("click", function () { termDecline(chargeAmt); });
      } else if (termState === "declined") {
        host.className = "terminal terminal--declined";
        host.innerHTML =
          '<span class="terminal__ic terminal__ic--bad">' + ic("alert-circle", { size: 46, stroke: 2 }) + "</span>" +
          '<p class="terminal__msg">' + POS.s("pay.card.declined") + "</p>" +
          '<small class="terminal__hint">' + POS.s("pay.card.declinedHint") + "</small>" +
          '<div class="terminal__actions">' +
            '<button class="btn btn--primary btn--block" type="button" id="retry">' + POS.s("pay.card.retry") + "</button>" +
            '<button class="btn btn--block" type="button" id="changeM">' + POS.s("pay.card.changeMethod") + "</button>" +
          "</div>";
        host.querySelector("#retry").addEventListener("click", function () { termState = "idle"; renderTerminal(); refreshCTA(); });
        host.querySelector("#changeM").addEventListener("click", function () { termState = "idle"; setMethod("cash"); });
        host.querySelector("#retry").focus();
      }
    }

    function startTerminal() {
      termState = "waiting";
      renderTerminal();
      refreshCTA();
    }
    function termApprove(amt) {
      cart.addPayment({ method: method, amountCents: amt });
      POS.setLastMethod(method);
      termState = "idle";
      afterPaymentConfirmed();
    }
    function termDecline(amt) {
      cart.recordAttempt({ method: method, amountCents: amt, result: "declined" });
      termState = "declined";
      renderTerminal();
      refreshCTA();
    }
    function termCancel(amt) {
      cart.recordAttempt({ method: method, amountCents: amt, result: "cancelled" });
      termState = "idle";
      renderTerminal();
      refreshCTA();
      POS.toast(POS.s("pay.card.cancelled"), { duration: 1600 });
    }

    /* ---------- Método ---------- */
    function resetCurrent() {
      amountCents = 0; amountTouched = false; termState = "idle";
    }
    function setMethod(m) {
      method = m;
      resetCurrent();
      document.querySelectorAll(".method").forEach(function (x) {
        x.setAttribute("aria-pressed", String(x.dataset.m === m));
      });
      $("#cashPanel").hidden = (m !== "cash");
      $("#termPanel").hidden = (m === "cash");
      if (m === "cash") {
        var prefill = due(); if (prefill <= 0) prefill = totals().totalCents;
        if (prefill > 0) { amountCents = prefill; amountTouched = true; }
        renderQuick(); renderCash(); renderCartPayInfo();
      } else renderTerminal();
      refreshCTA();
    }

    /* ---------- Após confirmar um pagamento ---------- */
    function afterPaymentConfirmed() {
      if (cart.dueCents() > 0) {
        splitMode = true;
        resetCurrent();
        rerender();
        return;
      }
      completeSale();
    }

    /* ---------- Confirmar pagamento em dinheiro ---------- */
    function confirmCash() {
      if (committing) return;
      if (!amountTouched || amountCents <= 0) { refreshCTA(); return; }
      committing = true;
      cart.addPayment({ method: "cash", amountCents: amountCents });
      POS.setLastMethod("cash");
      committing = false;
      afterPaymentConfirmed();
    }

    /* ---------- CTA principal ---------- */
    function ctaState() {
      // Modo multi-pagamento
      if (multiMode) {
        var total = totals().totalCents;
        var sumEntered = MULTI_METHODS.reduce(function (s, m) { return s + (multiAmounts[m.id] || 0); }, 0);
        var formErr2 = validateForm();
        if (sumEntered <= 0) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: POS.s("pay.needAmount"), action: null };
        if (sumEntered < total) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: POS.s("pay.due") + " " + POS.money(total - sumEntered), action: null };
        if (formErr2) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: formErr2, action: null };
        return { label: POS.s("pay.emit"), amount: POS.money(total), reason: null, action: emitMultiMode };
      }

      var d = due();
      var paid = cart.paidCents();

      var formErr = validateForm();

      if (termState === "waiting") return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.card.waiting"), action: null, busy: true };
      if (termState === "declined") return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.card.declined"), action: null };

      if (method === "cash") {
        var pay = amountTouched ? amountCents : 0;
        if (pay <= 0) return { label: POS.s("pay.addPayment"), amount: "", reason: POS.s("pay.needAmount"), action: null };
        if (pay >= d) {
          // Cobre tudo (incluindo com troco)
          if (formErr) return { label: POS.s("pay.emit"), amount: POS.money(d), reason: formErr, action: null };
          return { label: POS.s("pay.emit"), amount: POS.money(d), reason: null, action: confirmCash };
        }
        return { label: POS.s("pay.addPayment"), amount: POS.money(pay), reason: null, action: confirmCash };
      }

      // Cartão / MB WAY (idle)
      var amt = amountTouched ? amountCents : d;
      if (amt <= 0) amt = totals().totalCents;
      if (amt <= 0) return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.needAmount"), action: null };
      if (amt < d) return { label: POS.s("pay.addPayment"), amount: POS.money(amt), reason: null, action: startTerminal };
      if (formErr) return { label: POS.s("pay.emit"), amount: POS.money(amt), reason: formErr, action: null };
      return { label: POS.s("pay.emit"), amount: POS.money(amt), reason: null, action: startTerminal };
    }

    function refreshCTA() {
      var s = ctaState();
      var btn = $("#finish");
      var isEmit = s.label === POS.s("pay.emit");
      $("#finishLbl").textContent = s.label;
      $("#finishAmt").textContent = s.amount || "";
      $("#finishReason").textContent = s.reason || "";
      btn.classList.toggle("has-reason", !!s.reason);
      btn.classList.toggle("is-busy", !!s.busy);
      btn.classList.toggle("is-emit", isEmit && !s.reason);
      btn.disabled = !s.action;
      btn.onclick = s.action ? function () {
        btn.disabled = true;
        s.action();
      } : null;
    }

    /* ---------- Cleanup ---------- */
    function cleanup() { try { sessionStorage.removeItem("pos_payment"); } catch (e) {} }

    function autoPrintReceipt() {
      if (POS.autoPrint()) POS.toast(POS.s("doc.printed"), { duration: 1400 });
    }

    /* ---------- Concluir venda ---------- */
    function completeSale() {
      if (committing) return;
      committing = true;
      var formErr = validateForm();
      if (formErr) {
        committing = false;
        POS.toast(formErr, { variant: "error", duration: 2200 });
        refreshCTA();
        return;
      }
      var change = cart.changeCents();
      if (change > 0) return showChangeStep(change);
      var sale = cart.commitSale({ receiptDest: "none" });
      autoPrintReceipt();
      cleanup();
      openPostSaleModal(sale);
    }

    /* ---------- Passo de troco (modal) ---------- */
    function showChangeStep(change, opts) {
      opts = opts || {};
      var card = document.createElement("div"); card.className = "changecard";
      card.innerHTML =
        '<div class="changecard__lbl">' + POS.s("pay.changeDue") + "</div>" +
        '<div class="changecard__val num">' + POS.money(change) + "</div>" +
        '<button class="btn btn--pay btn--block changecard__ok" type="button" id="chgOk">' + POS.s("pay.emit") + "</button>";

      var close = POS.openModal(card, { noClose: true, label: POS.s("pay.success") });
      var okBtn = card.querySelector("#chgOk");
      var done = false;

      var go = function () {
        if (done) return; done = true; okBtn.disabled = true;
        var sale;
        if (!opts.restored) {
          sale = cart.commitSale({ receiptDest: "none" });
          autoPrintReceipt();
        } else {
          sale = POS.lastSale();
          POS.clearLastSale();
        }
        cleanup();
        close();
        if (sale) openPostSaleModal(sale);
        else window.location.href = "sale.html";
      };

      okBtn.addEventListener("click", go);
      card.addEventListener("keydown", function (e) {
        if (e.key !== "Enter") return;
        var a = document.activeElement;
        if (a && a !== okBtn && (a.tagName === "BUTTON" || a.tagName === "SUMMARY")) return;
        e.preventDefault(); go();
      });
      okBtn.focus();
    }

    /* ---------- Modal pós-venda ---------- */
    function openPostSaleModal(sale) {
      var cust = POS.customers.find(function (c) { return c.id === sale.customerId; });
      var custEmail = (cust && cust.email) || "";

      var wrap = document.createElement("div"); wrap.className = "postsale";
      wrap.innerHTML =
        '<div class="postsale__head">' +
          '<div class="postsale__badge">' + ic("check", { size: 32, stroke: 2.8 }) + '</div>' +
          '<h3>' + POS.s("pay.success") + '</h3>' +
          '<p class="postsale__ref">' + (sale.seriesId || "2026") + (sale.saleNo ? " · Nº " + sale.saleNo : "") + '</p>' +
        '</div>' +
        '<div class="postsale__actions">' +
          '<button class="postsale__act" data-a="print" type="button" aria-pressed="false">' + ic("printer", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.print") + '</span></button>' +
          '<button class="postsale__act" data-a="email" type="button" aria-pressed="false">' + ic("mail", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.email") + '</span></button>' +
          '<button class="postsale__act" data-a="offer" type="button" aria-pressed="false">' + ic("gift", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.offer") + '</span></button>' +
        '</div>' +
        '<div class="postsale__panel" id="psPanel"></div>' +
        '<button class="btn btn--primary btn--block" id="psNewSale" type="button">' + POS.s("pay.newSale") + '</button>';

      var close = POS.openModal(wrap, { label: POS.s("pay.success") });
      var panel = wrap.querySelector("#psPanel");

      function setActive(btn) {
        wrap.querySelectorAll(".postsale__act").forEach(function (b) { b.setAttribute("aria-pressed", String(b === btn)); });
      }

      wrap.querySelector('[data-a="print"]').addEventListener("click", function () {
        setActive(this); panel.innerHTML = "";
        POS.printDoc(sale, { format: "a4" });
        POS.toast(POS.s("doc.printed"), { duration: 1400 });
        this.setAttribute("aria-pressed", "false");
      });

      wrap.querySelector('[data-a="email"]').addEventListener("click", function () {
        setActive(this);
        panel.innerHTML =
          '<div class="ps-email">' +
            '<label class="ps-email__label" for="psEmailIn">' + POS.s("doc.emailPrompt") + '</label>' +
            '<div class="ps-email__row">' +
              '<input class="ff__in" id="psEmailIn" type="email" placeholder="email@exemplo.com" value="' + custEmail + '" autocomplete="email">' +
              '<button class="btn btn--primary" id="psEmailSend" type="button">' + ic("send", { size: 16 }) + ' ' + POS.s("act.confirm") + '</button>' +
            '</div>' +
          '</div>';
        panel.querySelector("#psEmailIn").focus();
        panel.querySelector("#psEmailSend").addEventListener("click", function () {
          var addr = panel.querySelector("#psEmailIn").value.trim();
          if (!addr) { panel.querySelector("#psEmailIn").focus(); return; }
          POS.toast(POS.s("doc.emailSent"), { variant: "success", duration: 2000 });
        });
      });

      wrap.querySelector('[data-a="offer"]').addEventListener("click", function () {
        setActive(this);
        var linesHtml = (sale.lines || []).map(function (l) {
          var p = POS.products.find(function (x) { return x.id === l.productId; });
          var name = p ? POS.t(p.name) : l.productId;
          var qty = l.weighable ? (l.qty + " kg") : ("×" + l.qty);
          return '<label class="ps-offer__row"><input class="ps-offer__chk" type="checkbox" value="' + l.key + '" checked>' +
            '<span class="ps-offer__name">' + name + '</span>' +
            '<span class="ps-offer__qty">' + qty + '</span></label>';
        }).join("");
        panel.innerHTML =
          '<div class="ps-offer">' +
            '<p class="ps-offer__hint">' + POS.s("doc.gift") + '</p>' +
            '<div class="ps-offer__list">' + linesHtml + '</div>' +
            '<button class="btn btn--block" id="psOfferPrint" type="button">' + ic("printer", { size: 16 }) + ' ' + POS.s("doc.gift") + '</button>' +
          '</div>';
        panel.querySelector("#psOfferPrint").addEventListener("click", function () {
          var keys = Array.from(panel.querySelectorAll(".ps-offer__chk:checked")).map(function (c) { return c.value; });
          var filtered = Object.assign({}, sale, { lines: sale.lines.filter(function (l) { return keys.indexOf(String(l.key)) !== -1; }) });
          POS.printDoc(filtered, { format: "offer" });
          POS.toast(POS.s("doc.giftPrinted"), { duration: 1400 });
        });
      });

      var done = false;
      wrap.querySelector("#psNewSale").addEventListener("click", function () {
        if (done) return; done = true;
        POS.clearLastSale && POS.clearLastSale();
        close();
        window.location.href = "sale.html";
      });
    }

    /* ---------- Modo dividido ---------- */
    function renderMultiMethods() {
      var total = totals().totalCents;
      var sumEntered = MULTI_METHODS.reduce(function (s, m) { return s + (multiAmounts[m.id] || 0); }, 0);

      var rows = MULTI_METHODS.map(function (m) {
        var amt = multiAmounts[m.id] || 0;
        var hasAmt = amt > 0;
        return '<div class="mrow' + (hasAmt ? " mrow--set" : "") + '">' +
          '<span class="mrow__ic">' + ic(m.icon, { size: 22, stroke: 1.6 }) + '</span>' +
          '<span class="mrow__label">' + POS.s(m.labelKey) + '</span>' +
          '<button class="mrow__val num" type="button" data-m="' + m.id + '" aria-label="' + POS.s(m.labelKey) + ': ' + (hasAmt ? POS.money(amt) : "—") + '">' +
            (hasAmt ? POS.money(amt) : '<span class="mrow__placeholder">—</span>') +
          '</button>' +
          (hasAmt ? '<button class="mrow__clr" type="button" data-m="' + m.id + '" aria-label="' + POS.s("pay.removePayment") + '">' + ic("x", { size: 16 }) + '</button>' : '<span class="mrow__clr-ph"></span>') +
        '</div>';
      }).join("");

      document.getElementById("multiMethodList").innerHTML = rows;

      // Atualizar info de pagamentos no carrinho
      renderCartPayInfo({ multiAmounts: multiAmounts });

      // Eventos: botão de valor → keypad
      document.querySelectorAll(".mrow__val").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var mid = btn.dataset.m;
          var cur = multiAmounts[mid] || 0;
          var remaining2 = Math.max(0, total - sumEntered + cur);
          POS.keypad({
            title: POS.s("pay.received"),
            sub: POS.s("pay.method." + mid),
            decimal: true, initial: cur / 100, maxInt: 5, maxDec: 2, suffix: "€",
            onConfirm: function (v) {
              multiAmounts[mid] = Math.round(v * 100);
              renderMultiMethods();
              refreshCTA();
            }
          });
        });
      });

      // Eventos: botão × → limpar
      document.querySelectorAll(".mrow__clr").forEach(function (btn) {
        if (!btn.dataset.m) return;
        btn.addEventListener("click", function () {
          multiAmounts[btn.dataset.m] = 0;
          renderMultiMethods();
          refreshCTA();
        });
      });
    }

    function toggleMultiMode() {
      multiMode = !multiMode;
      var btn = document.getElementById("btnMultiMode");
      btn.setAttribute("aria-pressed", String(multiMode));
      document.getElementById("singleMode").hidden = multiMode;
      document.getElementById("multiMode").hidden = !multiMode;
      if (multiMode) {
        cart.clearPayments();
        multiAmounts = { cash: 0, card: 0, mbway: 0 };
        renderMultiMethods();
      } else {
        multiAmounts = { cash: 0, card: 0, mbway: 0 };
        resetCurrent();
        setMethod(method);
        renderPayList();
      }
      refreshCTA();
    }

    function emitMultiMode() {
      if (committing) return;
      committing = true;
      var formErr = validateForm();
      if (formErr) { committing = false; POS.toast(formErr, { variant: "error", duration: 2200 }); refreshCTA(); return; }
      MULTI_METHODS.forEach(function (m) {
        var amt = multiAmounts[m.id] || 0;
        if (amt > 0) {
          cart.addPayment({ method: m.id, amountCents: amt });
          POS.setLastMethod(m.id);
        }
      });
      var change = cart.changeCents();
      if (change > 0) return showChangeStep(change);
      var sale = cart.commitSale({ receiptDest: "none" });
      autoPrintReceipt();
      cleanup();
      openPostSaleModal(sale);
    }

    /* ---------- Render geral ---------- */
    function rerender() {
      renderCart(); // já chama renderCartPayInfo() no fim
      if (multiMode) {
        renderMultiMethods(); // chama renderCartPayInfo({multiAmounts}) no fim
      } else {
        if (method === "cash") {
          $("#cashPanel").hidden = false; $("#termPanel").hidden = true;
          renderQuick(); renderCash();
        } else {
          $("#cashPanel").hidden = true; $("#termPanel").hidden = false;
          renderTerminal();
        }
        document.querySelectorAll(".method").forEach(function (x) {
          x.setAttribute("aria-pressed", String(x.dataset.m === method));
        });
      }
      renderBillingCard();
      refreshCTA();
    }

    function renderAll() { applyStatic(); paintIcons(); renderCustomer(); renderBillingCard(); rerender(); renderUser(); }

    /* ---------- Topbar: relógio, operador, lock ---------- */
    function tick() {
      var d = new Date(), loc = POS.lang === "pt" ? "pt-PT" : "en-IE";
      $("#topClock").textContent = d.toLocaleTimeString(loc, { hour: "2-digit", minute: "2-digit" });
      var dateEl = $("#topDate");
      if (dateEl) dateEl.textContent = d.toLocaleDateString(loc, { weekday: "short", day: "numeric", month: "short" });
    }
    function initials(name) {
      var w = (name || "").trim().split(/\s+/).filter(Boolean);
      if (!w.length) return "?";
      return (w[0][0] + (w.length > 1 ? w[w.length - 1][0] : "")).toUpperCase();
    }
    function avatarColor(name) {
      var ch = (name || "?").trim().toUpperCase().charCodeAt(0);
      var i = (ch >= 65 && ch <= 90) ? ch - 65 : 0;
      return "hsl(" + Math.round(i / 26 * 360) + ", 52%, 46%)";
    }
    function currentOp() {
      var t = POS.terminal();
      return POS.operators.find(function (o) { return o.id === t.operatorId; }) || { id: t.operatorId, name: t.operatorName, pin: "" };
    }
    function opRole(t) {
      var o = POS.operators.find(function (x) { return x.id === t.operatorId; });
      return o ? POS.t(o.role) : POS.s("user.role");
    }
    function renderUser() {
      var t = POS.terminal();
      var termLabel = (t.terminalId || "T1").replace(/^T(\d+)$/, "Terminal $1");
      var av = document.querySelector(".topbar__user .topbar__avatar"); if (av) av.textContent = initials(t.operatorName);
      var nm = $("#tbUserName"); if (nm) nm.textContent = t.operatorName;
      var tt = $("#tbUserTerminal"); if (tt) tt.textContent = termLabel;
      var st = document.querySelector(".topbar__store"); if (st) st.textContent = (POS.store && POS.store.name) || st.textContent;
    }
    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
      else document.exitFullscreen && document.exitFullscreen();
    }
    function handleUserAction(a) {
      if (a === "fs") return toggleFullscreen();
      if (a === "logout") return (window.location.href = "sale.html");
      if (a === "switch") return switchOperator();
      if (a === "profile") return POS.toast(POS.s("user.profile") + " · demo", { duration: 1500 });
      if (a === "settings") return POS.toast(POS.s("nav.settings") + " · demo", { duration: 1500 });
      if (a === "terminal") return POS.toast(POS.s("user.switchTerminal") + " · demo", { duration: 1500 });
      if (a === "moloni") return POS.toast(POS.s("user.backToMoloni") + " · demo", { duration: 1500 });
    }
    function switchOperator() {
      var t = POS.terminal();
      var sel = null, pin = "", close = null;
      var wrap = document.createElement("div"); wrap.className = "sheet op-switch";
      wrap.innerHTML = "<h3>" + POS.s("op.switchTitle") + "</h3><div class='sheet__sub'>" + POS.s("op.switchHint") + "</div>" +
        '<div class="op-list" id="opList"></div>' +
        '<div class="op-pin" id="opPinSec" hidden><div class="op-pin__lbl">' + POS.s("op.pin") + "</div>" +
          '<div class="lk-dots" id="opDots"></div><div class="lk-pad op-pad" id="opPad"></div></div>' +
        '<div class="sheet__foot"><button class="btn btn--block" data-k="cancel">' + POS.s("act.cancel") + "</button></div>";
      var listEl = wrap.querySelector("#opList"), pinSec = wrap.querySelector("#opPinSec"), dotsEl = wrap.querySelector("#opDots"), pad = wrap.querySelector("#opPad");
      function pinLen() { return (sel && sel.pin ? sel.pin.length : 4) || 4; }
      function dots() { var n = pinLen(), h = ""; for (var i = 0; i < n; i++) h += '<span class="lk-dot' + (i < pin.length ? " is-on" : "") + '"></span>'; dotsEl.innerHTML = h; }
      function buildPad() {
        pad.innerHTML = "";
        ["1","2","3","4","5","6","7","8","9","blank","0","back"].forEach(function (k) {
          if (k === "blank") { var sp = document.createElement("span"); sp.className = "lk-key lk-key--blank"; pad.appendChild(sp); return; }
          var b = document.createElement("button"); b.type = "button"; b.className = "lk-key";
          if (k === "back") { b.className += " lk-key--ico"; b.innerHTML = ic("backspace", { size: 22 }); b.setAttribute("aria-label", "Backspace"); }
          else b.textContent = k;
          b.addEventListener("click", function () {
            if (k === "back") { pin = pin.slice(0, -1); dots(); return; }
            if (pin.length >= pinLen()) return;
            pin += k; dots(); if (pin.length === pinLen()) setTimeout(check, 120);
          });
          pad.appendChild(b);
        });
      }
      function check() {
        if (sel && pin === (sel.pin || "")) { doSwitch(); return; }
        pinSec.classList.remove("shake"); void pinSec.offsetWidth; pinSec.classList.add("shake");
        pin = ""; dots(); POS.toast(POS.s("op.wrongPin"), { variant: "danger", duration: 1400 });
      }
      function doSwitch() {
        var from = POS.terminal().operatorName;
        POS.setTerminal({ operatorId: sel.id, operatorName: sel.name });
        if (POS.cash.isOpen()) POS.cash.movement("handover", 0, from + " → " + sel.name);
        if (close) close(); renderUser();
        POS.toast(POS.s("op.switched") + " · " + sel.name, { variant: "success", duration: 1800 });
      }
      POS.operators.forEach(function (o) {
        var cur = o.id === t.operatorId;
        var b = document.createElement("button"); b.type = "button"; b.className = "op-row" + (cur ? " is-current" : "");
        if (cur) b.disabled = true;
        b.innerHTML = '<span class="op-ava" style="background:' + avatarColor(o.name) + '">' + initials(o.name) + "</span>" +
          '<span class="op-info"><b>' + o.name + "</b><small>" + POS.t(o.role) + (cur ? " · " + POS.s("op.current") : "") + "</small></span>";
        b.addEventListener("click", function () {
          sel = o; pin = "";
          listEl.querySelectorAll(".op-row").forEach(function (x) { x.classList.remove("is-sel"); });
          b.classList.add("is-sel");
          pinSec.hidden = false; buildPad(); dots();
        });
        listEl.appendChild(b);
      });
      close = POS.openModal(wrap, { label: POS.s("op.switchTitle") });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", function () { close(); });
    }
    var MOLONI_MARK = '<svg viewBox="0 0 500 500" fill="currentColor" aria-hidden="true" focusable="false">' +
      '<path d="M493.6 394.7v94.34H159.58C74.62 489.04 5.5 419.92 5.5 334.96V95.46h94.34v239.49c0 32.95 26.79 59.75 59.75 59.75H493.6Z"/>' +
      '<path d="M493.6 155.08v333.95h-94.34V155.08c0-32.95-26.79-59.75-59.75-59.75H99.96V1h239.55c84.97 0 154.08 69.12 154.08 154.08Z"/>' +
      '<path d="M194.85 190.34H304.2v109.35H194.85z"/></svg>';
    function lockTerminal() {
      if (document.querySelector(".lockscreen")) return;
      try { localStorage.setItem("pos_locked", "1"); } catch (e) {}
      var target = currentOp(), pin = "", fromId = currentOp().id;
      var node = document.createElement("div"); node.className = "lockscreen"; node.setAttribute("role", "dialog"); node.setAttribute("aria-modal", "true");
      node.innerHTML = '<div class="lk-stars" id="lkStars" aria-hidden="true"></div><div class="lk-wrap" id="lkWrap"></div>';
      (function makeStars() {
        var box = node.querySelector("#lkStars"), html = "";
        for (var i = 0; i < 46; i++) {
          var sz = (Math.random() * 2.4 + 1).toFixed(1);
          var dur = (Math.random() * 5 + 4).toFixed(1), del = (-Math.random() * 8).toFixed(1);
          html += '<span class="lk-star" style="left:' + (Math.random() * 100).toFixed(2) + "%;top:" + (Math.random() * 100).toFixed(2) +
            "%;width:" + sz + "px;height:" + sz + "px;animation-duration:" + dur + "s;animation-delay:" + del + 's"></span>';
        }
        box.innerHTML = html;
      })();
      function dots() { var n = (target.pin || "0000").length || 4; var out = ""; for (var i = 0; i < n; i++) out += '<span class="lk-dot' + (i < pin.length ? " is-on" : "") + '"></span>'; return out; }
      function shell() {
        node.querySelector("#lkWrap").innerHTML =
          '<div class="lk-head"><span class="lk-logo">' + MOLONI_MARK + "</span>" +
            '<span class="lk-brand"><span class="lk-brand__top"><b>Moloni</b><span class="lk-pos">POS</span></span>' +
              "<small>" + POS.s("lock.brandTagline") + "</small></span></div>" +
          '<div class="lock-card" id="lkCard">' +
            '<div class="lock-badge">' + ic("lock", { size: 26 }) + "</div>" +
            '<div class="lock-title">' + POS.s("lock.title") + "</div>" +
            '<div class="lock-op"><span class="op-ava">' + initials(target.name) + '</span><b class="lock-opname">' + target.name + "</b></div>" +
            '<div class="lock-pinhint">' + POS.s("lock.enterPin") + "</div>" +
            '<div class="lk-dots" id="lkDots">' + dots() + "</div>" +
            '<div class="lk-pad" id="lkPad"></div>' +
            '<button class="lk-switch" id="lkSwitch" type="button">' + ic("repeat", { size: 16 }) + " " + POS.s("lock.switch") + "</button>" +
          "</div>";
        var pad = node.querySelector("#lkPad");
        ["1","2","3","4","5","6","7","8","9","blank","0","back"].forEach(function (k) {
          if (k === "blank") { var sp = document.createElement("span"); sp.className = "lk-key lk-key--blank"; sp.setAttribute("aria-hidden", "true"); pad.appendChild(sp); return; }
          var b = document.createElement("button"); b.type = "button"; b.className = "lk-key";
          if (k === "back") { b.className += " lk-key--ico"; b.innerHTML = ic("backspace", { size: 24 }); b.setAttribute("aria-label", "Backspace"); }
          else b.textContent = k;
          b.addEventListener("click", function () { press(k); });
          pad.appendChild(b);
        });
        node.querySelector("#lkSwitch").addEventListener("click", chooseOp);
      }
      function redraw() { var d = node.querySelector("#lkDots"); if (d) d.innerHTML = dots(); }
      function press(k) {
        if (k === "back") { pin = pin.slice(0, -1); redraw(); return; }
        var max = (target.pin || "0000").length || 4;
        if (pin.length >= max) return;
        pin += k; redraw();
        if (pin.length === max) setTimeout(check, 120);
      }
      function check() {
        if (pin === (target.pin || "")) { unlock(); return; }
        var card = node.querySelector("#lkCard"); if (card) { card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake"); }
        pin = ""; redraw(); POS.toast(POS.s("op.wrongPin"), { variant: "danger", duration: 1400 });
      }
      function chooseOp() {
        var list = document.createElement("div"); list.className = "lk-oplist";
        POS.operators.forEach(function (o) {
          var b = document.createElement("button"); b.type = "button"; b.className = "op-row" + (o.id === target.id ? " is-sel" : "");
          b.innerHTML = '<span class="op-ava">' + initials(o.name) + "</span><span class=\"op-info\"><b>" + o.name + "</b><small>" + POS.t(o.role) + "</small></span>";
          b.addEventListener("click", function () { target = o; pin = ""; shell(); });
          list.appendChild(b);
        });
        var card = node.querySelector("#lkCard");
        card.innerHTML = '<div class="lock-brand"><span class="lock-logo">' + ic("register", { size: 22 }) + '</span><span class="lock-word">Moloni <b>POS</b></span></div>' +
          '<div class="lock-title">' + POS.s("user.switchOperator") + "</div>";
        card.appendChild(list);
      }
      function unlock() {
        try { localStorage.removeItem("pos_locked"); } catch (e) {}
        document.removeEventListener("keydown", onKey, true);
        var app = $(".app"); if (app) { app.removeAttribute("inert"); app.removeAttribute("aria-hidden"); }
        node.remove();
        if (target.id !== fromId) {
          POS.setTerminal({ operatorId: target.id, operatorName: target.name });
          if (POS.cash.isOpen()) POS.cash.movement("handover", 0, currentOp().name);
          renderUser();
          POS.toast(POS.s("op.switched") + " · " + target.name, { variant: "success", duration: 1600 });
        }
      }
      function onKey(e) {
        if (/^[0-9]$/.test(e.key)) { e.preventDefault(); press(e.key); }
        else if (e.key === "Backspace") { e.preventDefault(); press("back"); }
      }
      shell();
      var app = $(".app"); if (app) { app.setAttribute("inert", ""); app.setAttribute("aria-hidden", "true"); }
      document.body.appendChild(node);
      var firstKey = node.querySelector(".lk-key"); if (firstKey) firstKey.focus();
      document.addEventListener("keydown", onKey, true);
    }
    function openUserMenu(anchor) {
      if (document.querySelector(".tb-menu")) return;
      var fs = !!document.fullscreenElement;
      function item(icon, label, act, warn) { return '<button class="tb-menu__item' + (warn ? " warn" : "") + '" role="menuitem" data-act="' + (act || "") + '">' + ic(icon, { size: 20 }) + "<span>" + POS.s(label) + "</span></button>"; }
      var menu = document.createElement("div"); menu.className = "tb-menu"; menu.setAttribute("role", "menu");
      menu.innerHTML =
        '<div class="tb-menu__head"><span class="topbar__avatar">' + initials(POS.terminal().operatorName) + '</span><div><b>' + POS.terminal().operatorName + "</b><small>" + opRole(POS.terminal()) + "</small></div></div>" +
        '<div class="tb-menu__sep"></div>' +
        item("user", "user.profile", "profile") +
        '<div class="tb-menu__sep"></div>' +
        item("repeat", "user.switchOperator", "switch") + item(fs ? "minimize" : "maximize", fs ? "user.exitFullscreen" : "user.fullscreen", "fs") +
        '<div class="tb-menu__sep"></div>' +
        item("corner-up-left", "user.backToMoloni", "moloni") + item("log-out", "user.logout", "logout", true);
      document.body.appendChild(menu);
      var r = anchor.getBoundingClientRect();
      menu.style.top = (r.bottom + 8) + "px"; menu.style.right = Math.max(8, window.innerWidth - r.right) + "px";
      anchor.setAttribute("aria-expanded", "true");
      function close() { menu.remove(); anchor.setAttribute("aria-expanded", "false"); document.removeEventListener("mousedown", onOut, true); document.removeEventListener("keydown", onEsc, true); }
      function onOut(e) { if (!menu.contains(e.target) && !anchor.contains(e.target)) close(); }
      function onEsc(e) { if (e.key === "Escape") close(); }
      menu.addEventListener("click", function (e) { var b = e.target.closest("[data-act]"); if (!b) return; close(); handleUserAction(b.dataset.act); });
      setTimeout(function () { document.addEventListener("mousedown", onOut, true); document.addEventListener("keydown", onEsc, true); }, 0);
      var f = menu.querySelector(".tb-menu__item"); if (f) f.focus();
    }

    /* ---------- Eventos ---------- */
    // Métodos de pagamento
    document.querySelectorAll(".method").forEach(function (m) {
      m.addEventListener("click", function () { setMethod(m.dataset.m); });
    });

    // Valor recebido (abrir keypad)
    $("#received").addEventListener("click", function () {
      var target = due();
      if (target <= 0) target = totals().totalCents;
      POS.keypad({
        title: POS.s("pay.received"),
        sub: POS.s("cart.totalDue") + ": " + POS.money(target),
        decimal: true, initial: 0, maxInt: 5, maxDec: 2, suffix: "€",
        onConfirm: function (v) {
          amountCents = Math.round(v * 100); amountTouched = true;
          renderCash(); renderPayBannerLive(); refreshCTA();
        }
      });
    });

    // Chips de tipo de documento (barra de topo)
    document.querySelectorAll(".top-chip").forEach(function (c) {
      c.addEventListener("click", function () { setDocType(c.dataset.dt); });
    });

    // Card de dados da fatura
    document.getElementById("billingCard").addEventListener("click", openDocOptions);

    // Seletor de cliente
    var btnCust = $("#btnCust");
    if (btnCust) btnCust.addEventListener("click", openCustomerPicker);

    // Botão de opções do documento
    var btnDocOpts = $("#btnDocOpts");
    if (btnDocOpts) btnDocOpts.addEventListener("click", openDocOptions);

    // Modo dividido
    document.getElementById("btnMultiMode").addEventListener("click", toggleMultiMode);

    // Topbar: lock + user menu
    $("#tbLock").addEventListener("click", lockTerminal);
    $("#tbUser").addEventListener("click", function () { openUserMenu($("#tbUser")); });

    /* ---------- Inicialização ---------- */
    POS.onLangChange(renderAll);
    POS.mountDevNav("sale");

    setDocType(docType);
    setMethod(method);
    renderAll();
    tick(); setInterval(tick, 1000 * 20);
  })();
  </script>
</body>
</html>
