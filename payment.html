<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Moloni POS — Pagamento</title>
  <script>try{var t=sessionStorage.getItem('pos_theme');if(t&&t!=='normal')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/sale.css" />
  <link rel="stylesheet" href="assets/css/payment.css" />
</head>
<body>
  <!-- Topo grafite: Voltar | Título | Cliente | Chips de doc | Opções -->
  <header class="pay-top" role="banner">
    <a class="pay-top__back" href="sale.html" id="back" aria-label="Voltar à venda"></a>
    <span class="pay-top__title" id="title">Pagamento</span>

    <button class="pay-top__cust" id="btnCust" type="button" aria-label="Selecionar cliente">
      <span class="pay-top__cust-ic" data-icon="user" aria-hidden="true"></span>
      <span class="pay-top__cust-name" id="custName">Consumidor Final</span>
      <span class="pay-top__cust-chev" data-icon="chevron-down" aria-hidden="true"></span>
    </button>

    <div class="pay-top__doctype" id="docChips" role="group" aria-label="Tipo de documento">
      <button class="top-chip" type="button" data-dt="receipt" aria-pressed="false">VD</button>
      <button class="top-chip" type="button" data-dt="simplified" aria-pressed="false">FS</button>
      <button class="top-chip" type="button" data-dt="invoiceReceipt" aria-pressed="false">FR</button>
      <button class="top-chip" type="button" data-dt="invoice" aria-pressed="false">FT</button>
      <button class="top-chip" type="button" data-dt="deliveryNote" aria-pressed="false">GT</button>
    </div>

    <button class="pay-top__opts" id="btnDocOpts" type="button">
      <span data-icon="settings" aria-hidden="true"></span>
      <span data-s="pay.docOptions">Opções</span>
    </button>
  </header>

  <main class="pay-screen" id="screen">
    <h1 class="sr-only" id="h1">Pagamento</h1>

    <!-- Coluna esquerda: resumo da venda -->
    <section class="pay-left" aria-labelledby="lblCartSummary">
      <h2 class="pay-left__title" id="lblCartSummary">Resumo da venda</h2>
      <div class="cart-lines" id="cartLines" aria-label="Artigos"></div>
      <div class="cart-totals" id="cartTotals"></div>
    </section>

    <!-- Coluna direita: fluxo de pagamento -->
    <aside class="pay-right" aria-label="Pagamento">

      <!-- Barra de modo: título + toggle dividido -->
      <div class="pay-mode-bar">
        <span class="pay-mode-bar__title" id="lblPaySection">Pagamentos</span>
        <button class="pay-mode-toggle" id="btnMultiMode" type="button" aria-pressed="false">
          <span data-icon="split" aria-hidden="true"></span>
          <span id="lblSplit">Dividir</span>
        </button>
      </div>

      <!-- ── MODO SIMPLES ─────────────────────────────── -->
      <div id="singleMode">

        <!-- Lista de pagamentos adicionados (sempre visível) -->
        <div class="paylist2" aria-label="Pagamentos adicionados">
          <div id="payListRows"></div>
          <div id="payBanner" aria-live="polite"></div>
        </div>

        <!-- Métodos de pagamento -->
        <div class="methods" id="methods" role="group" aria-label="Método de pagamento">
          <button class="method" type="button" data-m="cash" aria-pressed="false">
            <span class="method__ic" data-icon="banknote" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.cash">Dinheiro</span>
          </button>
          <button class="method" type="button" data-m="card" aria-pressed="false">
            <span class="method__ic" data-icon="card" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.card">Cartão</span>
          </button>
          <button class="method" type="button" data-m="mbway" aria-pressed="false">
            <span class="method__ic" data-icon="smartphone" aria-hidden="true"></span>
            <span class="method__lbl" data-s="pay.method.mbway">MB WAY</span>
          </button>
        </div>

        <!-- Painel dinheiro -->
        <div class="panel" id="cashPanel" hidden>
          <button class="cash__received" id="received" type="button">
            <span class="k" id="lblReceived">Valor recebido</span>
            <span class="v num" id="receivedVal">—</span>
          </button>
          <div class="quick" id="quick"></div>
        </div>

        <!-- Painel cartão / MB WAY -->
        <div class="panel panel--term" id="termPanel" hidden>
          <div class="terminal" id="terminal" aria-live="assertive"></div>
        </div>

      </div><!-- /#singleMode -->

      <!-- ── MODO DIVIDIDO ────────────────────────────── -->
      <div id="multiMode" hidden>
        <div class="multi-methods" id="multiMethodList" aria-label="Métodos de pagamento"></div>
        <div id="multiBanner" aria-live="polite"></div>
      </div>

      <!-- CTA (partilhado pelos dois modos) -->
      <div class="pay-cta">
        <button class="pay" id="finish" type="button">
          <span class="pay__lbl" id="finishLbl"></span>
          <span class="pay__amount num" id="finishAmt"></span>
          <span class="pay__reason" id="finishReason"></span>
        </button>
      </div>

    </aside>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/doc.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
  (function () {
    "use strict";
    var $ = function (s) { return document.querySelector(s); };
    var ic = POS.icon, cart = POS.cart;

    /* ---------- Sobreviver a refresh: carrinho vazio mas venda recente ---------- */
    var LAST_SALE_TTL = 2 * 60 * 1000; // 2 min
    if (!cart.totals().itemCount) {
      var last = POS.lastSale();
      if (last && last.ts && (Date.now() - last.ts) < LAST_SALE_TTL) {
        document.documentElement.lang = POS.lang;
        $("#title").textContent = POS.s("pay.title");
        $("#h1").textContent = POS.s("pay.title");
        POS.mountDevNav("sale");
        if (last.changeCents > 0) { showChangeStep(last.changeCents, { restored: true }); return; }
        POS.clearLastSale();
      }
      window.location.href = "sale.html"; return;
    }

    /* ---------- Estado de UI (não-persistente) ---------- */
    var method = POS.lastMethod();       // método selecionado (default = último usado)
    var amountCents = 0;                 // valor em curso para o método selecionado
    var amountTouched = false;           // operador já definiu valor manual/quick?
    var termState = "idle";              // idle | waiting | declined | cancelled
    var splitMode = false;               // há algum pagamento parcial já registado?
    var committing = false;              // guarda anti-duplo-toque

    // Modo dividido
    var multiMode = false;
    var MULTI_METHODS = [
      { id: "cash",  icon: "banknote",   labelKey: "pay.method.cash" },
      { id: "card",  icon: "card",       labelKey: "pay.method.card" },
      { id: "mbway", icon: "smartphone", labelKey: "pay.method.mbway" },
    ];
    var multiAmounts = { cash: 0, card: 0, mbway: 0 };

    // Estado do formulário / opções do documento
    var docType = cart.state.docType || "receipt";
    var issueDate = new Date().toISOString().slice(0, 10);
    var notes = "";
    var loadAddr = "", loadZip = "", loadCity = "";
    var unloadAddr = "", unloadZip = "", unloadCity = "";
    var transportDt = "";

    function totals() { return cart.totals(); }
    function due() { return cart.dueCents(); }

    /* ---------- paintIcons: resolve [data-icon] ---------- */
    function paintIcons() {
      document.querySelectorAll("[data-icon]").forEach(function (el) {
        var name = el.getAttribute("data-icon");
        var size = el.dataset.size ? parseInt(el.dataset.size, 10) : 22;
        el.innerHTML = ic(name, { size: size, stroke: 1.7 });
        el.removeAttribute("data-icon");
      });
    }

    /* ---------- i18n estático ---------- */
    function applyStatic() {
      document.querySelectorAll("[data-s]").forEach(function (el) {
        el.textContent = POS.s(el.getAttribute("data-s"));
      });
      $("#title").textContent = POS.s("pay.title");
      $("#h1").textContent = POS.s("pay.title");
      $("#lblReceived").textContent = POS.s("pay.received");
      $("#lblCartSummary").textContent = POS.s("pay.cartSummary");
      $("#back").innerHTML = ic("chevron-left", { size: 20 }) + "<span>" + POS.s("act.back") + "</span>";
    }

    /* ---------- Tipo de documento ---------- */
    function docTypeLabel(dt) {
      var MAP = {
        receipt: POS.s("doc.receipt"),
        simplified: POS.s("doc.simplified"),
        invoiceReceipt: POS.s("doc.invoiceReceipt"),
        invoice: POS.s("doc.invoice"),
        deliveryNote: POS.s("doc.deliveryNote"),
      };
      return MAP[dt] || dt;
    }

    function setDocType(dt) {
      docType = dt;
      cart.state.docType = dt;
      try { sessionStorage.setItem("pos_cart", JSON.stringify(cart.state)); } catch (e) {}
      document.querySelectorAll(".top-chip").forEach(function (c) {
        c.setAttribute("aria-pressed", String(c.dataset.dt === dt));
      });
      refreshCTA();
    }

    /* ---------- Cliente ---------- */
    function renderCustomer() {
      var c = cart.customer();
      var nameEl = $("#custName");
      if (!nameEl) return;
      var name = POS.t(c.name);
      var nif = c.nif ? " · NIF " + c.nif : "";
      nameEl.textContent = name + nif;
    }

    function openCustomerPicker() {
      var wrap = document.createElement("div");
      wrap.className = "sheet";
      var q = "";

      function filtered() {
        return POS.customers.filter(function (c) {
          if (!q) return true;
          var n = POS.t(c.name).toLowerCase();
          var nif = (c.nif || "").toLowerCase();
          return n.indexOf(q) >= 0 || nif.indexOf(q) >= 0;
        });
      }

      function renderList() {
        var list = filtered();
        var rows = list.map(function (c) {
          var isActive = c.id === cart.state.customerId;
          return '<button class="cust-row' + (isActive ? " is-active" : "") + '" type="button" data-id="' + c.id + '">' +
            '<span class="cust-avatar">' + ic("user", { size: 18 }) + '</span>' +
            '<span style="flex:1;text-align:left">' +
              '<span style="display:block;font-weight:700;font-size:var(--fs-sm)">' + POS.t(c.name) + '</span>' +
              (c.nif ? '<span style="display:block;font-size:var(--fs-xs);color:var(--ink-500)">NIF ' + c.nif + '</span>' : '') +
            '</span>' +
            (isActive ? '<span>' + ic("check", { size: 18 }) + '</span>' : '') +
          '</button>';
        }).join("") || '<p style="padding:var(--sp-4);color:var(--ink-400);text-align:center">' + POS.s("cust.empty") + '</p>';

        wrap.innerHTML =
          '<div style="padding:var(--sp-4) var(--sp-5) var(--sp-3)">' +
            '<input class="ff__in" style="width:100%" type="search" placeholder="' + POS.s("cust.search") + '" value="' + q + '" id="custQ" />' +
          '</div>' +
          '<div style="overflow-y:auto;flex:1;padding:0 var(--sp-4) var(--sp-5)">' + rows + '</div>';

        wrap.querySelector("#custQ").addEventListener("input", function () {
          q = this.value.toLowerCase();
          renderList();
          var qi = wrap.querySelector("#custQ");
          if (qi) { qi.focus(); qi.value = q; }
        });
        wrap.querySelectorAll(".cust-row").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = btn.dataset.id;
            cart.setCustomer(id);
            renderCustomer();
            renderCart();
            close();
          });
        });
      }

      renderList();
      var close = POS.openDrawer(wrap, { label: POS.s("cust.search"), dimmed: false });
      setTimeout(function () { var qi = wrap.querySelector("#custQ"); if (qi) qi.focus(); }, 50);
    }

    /* ---------- Validação do formulário ---------- */
    function validateForm() {
      if (docType === "deliveryNote") {
        if (!loadAddr || !loadZip || !loadCity || !unloadAddr || !unloadCity) {
          return POS.s("pay.transport.needData");
        }
      }
      return null;
    }

    /* ---------- Opções do documento (drawer) ---------- */
    function buildLocFieldset(legend, addrId, zipId, cityId, addrVal, zipVal, cityVal) {
      return '<fieldset class="transport__loc">' +
        '<legend class="transport__legend">' + legend + '</legend>' +
        '<input class="transport__inp" type="text" id="' + addrId + '" placeholder="' + POS.s("pay.transport.addr") + '" value="' + (addrVal || "") + '" autocomplete="off" />' +
        '<div class="transport__row2">' +
          '<input class="transport__inp transport__inp--zip" type="text" id="' + zipId + '" placeholder="' + POS.s("pay.transport.zip") + '" value="' + (zipVal || "") + '" autocomplete="off" />' +
          '<input class="transport__inp" type="text" id="' + cityId + '" placeholder="' + POS.s("pay.transport.city") + '" value="' + (cityVal || "") + '" autocomplete="off" />' +
        '</div>' +
      '</fieldset>';
    }

    function openDocOptions() {
      var isGT = docType === "deliveryNote";
      var wrap = document.createElement("div");
      wrap.className = "doc-opts";
      wrap.innerHTML =
        '<div class="doc-opts__sect">' +
          '<label class="doc-opts__label" for="doDt">' + POS.s("pay.issueDate") + '</label>' +
          '<input class="pay-date" type="date" id="doDt" value="' + issueDate + '" />' +
        '</div>' +
        '<div class="doc-opts__sect">' +
          '<label class="doc-opts__label" for="doNotes">' + POS.s("pay.notes") + '</label>' +
          '<textarea class="pay-notes" id="doNotes" rows="3" placeholder="' + POS.s("pay.notesPlaceholder") + '">' + notes + '</textarea>' +
        '</div>' +
        '<details class="transport" id="doTransport"' + (isGT ? " open" : "") + '>' +
          '<summary class="transport__sum">' +
            '<span class="transport__sum-txt">' + POS.s("pay.transport") + '</span>' +
            (isGT ? '<span class="transport__badge">' + POS.s("pay.transport.required") + '</span>' : '') +
            '<span class="transport__chev" aria-hidden="true"></span>' +
          '</summary>' +
          '<div class="transport__body">' +
            buildLocFieldset(POS.s("pay.transport.load"), "tLoadAddr", "tLoadZip", "tLoadCity", loadAddr, loadZip, loadCity) +
            buildLocFieldset(POS.s("pay.transport.unload"), "tUnloadAddr", "tUnloadZip", "tUnloadCity", unloadAddr, unloadZip, unloadCity) +
            '<div class="transport__dt">' +
              '<label class="transport__legend" for="tDt">' + POS.s("pay.transport.dtStart") + '</label>' +
              '<input class="transport__inp" type="datetime-local" id="tDt" value="' + transportDt + '" />' +
            '</div>' +
          '</div>' +
        '</details>';

      function saveOpts() {
        var doDt = wrap.querySelector("#doDt");
        var doNotes = wrap.querySelector("#doNotes");
        if (doDt) issueDate = doDt.value;
        if (doNotes) notes = doNotes.value;
        loadAddr = (wrap.querySelector("#tLoadAddr") || {}).value || "";
        loadZip = (wrap.querySelector("#tLoadZip") || {}).value || "";
        loadCity = (wrap.querySelector("#tLoadCity") || {}).value || "";
        unloadAddr = (wrap.querySelector("#tUnloadAddr") || {}).value || "";
        unloadZip = (wrap.querySelector("#tUnloadZip") || {}).value || "";
        unloadCity = (wrap.querySelector("#tUnloadCity") || {}).value || "";
        transportDt = (wrap.querySelector("#tDt") || {}).value || "";
        refreshCTA();
      }

      wrap.addEventListener("input", saveOpts);
      POS.openDrawer(wrap, { label: POS.s("pay.docOptions"), dimmed: false });
    }

    /* ---------- Resumo da venda (coluna esquerda) ---------- */
    function renderCart() {
      var lines = cart.lines;
      var t = totals();

      if (lines.length === 0) {
        $("#cartLines").innerHTML =
          '<div class="cart-empty">' + ic("shopping-cart", { size: 28, stroke: 1.5 }) +
          '<span>' + POS.s("cart.empty.title") + '</span></div>';
        $("#cartTotals").innerHTML = "";
        return;
      }

      var linesHtml = lines.map(function (l) {
        var p = POS.getProduct(l.productId);
        var name = l.nameOverride || (p ? POS.t(p.name) : l.productId);
        var qty = l.weighable ? (l.qty + " kg") : (l.qty + "×");
        var unitPrice = POS.money(l.unitPriceCents);
        var lineTotal = POS.money(cart.lineTotal(l));
        var discAmt = cart.lineDiscount(l);

        var html = '<div class="cart-line">' +
          '<div class="cart-line__main">' +
            '<span class="cart-line__qty">' + qty + '</span>' +
            '<span class="cart-line__name">' + name + '</span>' +
            '<span class="cart-line__unit num">' + unitPrice + '</span>' +
            '<span class="cart-line__total num">' + lineTotal + '</span>' +
          '</div>';

        if (discAmt > 0) {
          html += '<div class="cart-line__disc">Desconto −' + POS.money(discAmt) + '</div>';
        }

        return html + '</div>';
      }).join("");

      // Descontos discriminados
      var discHtml = "";
      var lineDiscTotal = cart.lines.reduce(function (s, l) { return s + cart.lineDiscount(l); }, 0);
      if (lineDiscTotal > 0) {
        discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + POS.s("disc.perArticle") + '</span><span class="num">−' + POS.money(lineDiscTotal) + '</span></div>';
      }
      var gd = cart.state.discount;
      if (gd) {
        var gdLabel = POS.s("tot.discount") + (gd.type === "pct" ? " (" + gd.value + "%)" : "");
        var globalDiscAmt = t.discountCents - lineDiscTotal - (t.vouchersCents || 0);
        if (globalDiscAmt > 0) discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + gdLabel + '</span><span class="num">−' + POS.money(globalDiscAmt) + '</span></div>';
      }
      (cart.state.vouchers || []).forEach(function (v) {
        if (v.valueCents > 0) discHtml += '<div class="cart-sumrow cart-sumrow--disc"><span>' + v.code + '</span><span class="num">−' + POS.money(v.valueCents) + '</span></div>';
      });

      // IVA total único
      var taxHtml = t.taxCents > 0 ? '<div class="cart-sumrow"><span>' + POS.s("tot.tax") + '</span><span class="num">' + POS.money(t.taxCents) + '</span></div>' : "";

      var totHtml =
        '<div class="cart-sumrow cart-sumrow--sub"><span>' + POS.s("tot.subtotal") + '</span><span class="num">' + POS.money(t.subtotalCents) + '</span></div>' +
        taxHtml +
        discHtml +
        '<div class="cart-sumrow cart-sumrow--total"><span>' + POS.s("tot.total") + '</span><span class="num">' + POS.money(t.totalCents) + '</span></div>';

      $("#cartLines").innerHTML = linesHtml;
      $("#cartTotals").innerHTML = totHtml;
    }

    /* ---------- Lista de pagamentos (sempre visível) ---------- */
    function methodIcon(m) { return m === "cash" ? "banknote" : m === "card" ? "card" : "smartphone"; }

    function renderPayList() {
      var pays = cart.payments();
      var d = due();
      var change = cart.changeCents();

      // Linhas de pagamento
      var rows = "";
      if (pays.length === 0) {
        rows = '<div class="paylist__empty">' +
          ic("credit-card", { size: 28, stroke: 1.5 }) +
          '<span>' + POS.s("pay.noPayments") + '</span>' +
        '</div>';
      } else {
        pays.forEach(function (p, i) {
          rows += '<div class="payrow">' +
            '<span class="payrow__ic">' + ic(methodIcon(p.method), { size: 20, stroke: 1.7 }) + '</span>' +
            '<span class="payrow__m">' + POS.s("pay.method." + p.method) + '</span>' +
            '<span class="payrow__v num">' + POS.money(p.amountCents) + '</span>' +
            '<button class="payrow__rm" type="button" data-i="' + i + '" aria-label="' + POS.s("pay.removePayment") + '">' + ic("x", { size: 18 }) + '</button>' +
          '</div>';
        });
      }

      // Banner em falta / troco
      var banner = "";
      if (pays.length > 0 && d > 0) {
        banner = '<div class="paylist__due"><span>' + POS.s("pay.due") + '</span><span class="num">' + POS.money(d) + '</span></div>';
      } else if (change > 0) {
        banner = '<div class="paylist__change"><span>' + POS.s("pay.changeDue") + '</span><span class="num">' + POS.money(change) + '</span></div>';
      }

      $("#payListRows").innerHTML = rows;
      $("#payBanner").innerHTML = banner;

      // Eventos dos botões de remover
      document.querySelectorAll(".payrow__rm").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var i = parseInt(btn.dataset.i, 10);
          var rem = cart.removePayment(i);
          if (rem) {
            POS.toast(POS.s("pay.paymentRemoved"), {
              duration: 1800,
              action: {
                label: POS.s("cart.undo"),
                onClick: function () {
                  cart.addPayment({ method: rem.payment.method, amountCents: rem.payment.amountCents });
                  rerender();
                }
              }
            });
          }
          if (cart.payments().length === 0) splitMode = false;
          resetCurrent();
          rerender();
        });
      });
    }

    /* ---------- Quick-cash ---------- */
    function renderQuick() {
      var host = $("#quick"); host.innerHTML = "";
      var target = due();
      if (target <= 0) target = totals().totalCents;
      if (target <= 0) return;
      var noteVals = [500, 1000, 2000, 5000, 10000];
      var vals = [target];
      var ceil5 = Math.ceil(target / 500) * 500; if (ceil5 > target) vals.push(ceil5);
      noteVals.forEach(function (n) { if (n > target) vals.push(n); });
      var ceilEuro = Math.ceil(target / 100) * 100; if (ceilEuro > target && vals.indexOf(ceilEuro) < 0) vals.push(ceilEuro);
      vals = vals.filter(function (v, i, a) { return a.indexOf(v) === i; }).sort(function (a, b) { return a - b; }).slice(0, 6);
      vals.forEach(function (v) {
        var b = document.createElement("button"); b.type = "button";
        if (v === target) {
          b.className = "exact";
          b.innerHTML = '<span>' + POS.s("pay.exact") + '</span><span class="num">' + POS.money(v) + "</span>";
        } else {
          b.innerHTML = '<span class="num">' + POS.money(v) + "</span>";
        }
        b.addEventListener("click", function () {
          amountCents = v; amountTouched = true;
          renderCash(); renderPayBannerLive(); refreshCTA();
        });
        host.appendChild(b);
      });
    }

    function renderCash() {
      $("#receivedVal").textContent = amountTouched ? POS.money(amountCents) : "—";
      $("#received").classList.toggle("is-set", amountTouched);
    }

    // Banner em tempo real (antes de confirmar o pagamento)
    function renderPayBannerLive() {
      var pays = cart.payments();
      var d = due();
      var liveChange = Math.max(0, (cart.paidCents() + (amountTouched ? amountCents : 0)) - totals().totalCents);
      var liveDue = Math.max(0, d - (amountTouched ? amountCents : 0));
      var banner = "";
      if (method === "cash" && liveChange > 0) {
        banner = '<div class="paylist__change"><span>' + POS.s("pay.changeDue") + '</span><span class="num">' + POS.money(liveChange) + '</span></div>';
      } else if (pays.length > 0 && d > 0 && (cart.paidCents() + (amountTouched ? amountCents : 0)) < totals().totalCents) {
        banner = '<div class="paylist__due"><span>' + POS.s("pay.due") + '</span><span class="num">' + POS.money(liveDue) + '</span></div>';
      }
      $("#payBanner").innerHTML = banner;
    }

    /* ---------- Painel cartão / MB WAY ---------- */
    function renderTerminal() {
      var host = $("#terminal");
      var chargeAmt = amountTouched ? amountCents : due();
      if (chargeAmt <= 0) chargeAmt = totals().totalCents;

      if (termState === "idle") {
        host.className = "terminal terminal--idle";
        host.innerHTML =
          '<span class="terminal__ic">' + ic(methodIcon(method), { size: 46, stroke: 1.5 }) + "</span>" +
          '<p class="terminal__msg">' + POS.s("pay.card.idle") + "</p>" +
          '<div class="terminal__amt num">' + POS.money(chargeAmt) + "</div>";
      } else if (termState === "waiting") {
        host.className = "terminal terminal--waiting";
        host.innerHTML =
          '<div class="spin" aria-hidden="true"></div>' +
          '<p class="terminal__msg">' + POS.s(method === "mbway" ? "pay.mbway.waiting" : "pay.card.waiting") + "</p>" +
          '<div class="terminal__amt num">' + POS.money(chargeAmt) + "</div>" +
          '<button class="btn btn--block term-cancel" type="button" id="termCancel">' + POS.s("pay.card.cancelOp") + "</button>" +
          '<div class="sim" role="group" aria-label="' + POS.s("pay.sim.hint") + '">' +
            '<button class="sim__btn sim__ok" type="button" id="simOk">' + ic("check", { size: 16 }) + "<span>" + POS.s("pay.sim.approve") + "</span></button>" +
            '<button class="sim__btn sim__no" type="button" id="simNo">' + ic("ban", { size: 16 }) + "<span>" + POS.s("pay.sim.decline") + "</span></button>" +
          "</div>";
        host.querySelector("#termCancel").addEventListener("click", function () { termCancel(chargeAmt); });
        host.querySelector("#simOk").addEventListener("click", function () { termApprove(chargeAmt); });
        host.querySelector("#simNo").addEventListener("click", function () { termDecline(chargeAmt); });
      } else if (termState === "declined") {
        host.className = "terminal terminal--declined";
        host.innerHTML =
          '<span class="terminal__ic terminal__ic--bad">' + ic("alert-circle", { size: 46, stroke: 2 }) + "</span>" +
          '<p class="terminal__msg">' + POS.s("pay.card.declined") + "</p>" +
          '<small class="terminal__hint">' + POS.s("pay.card.declinedHint") + "</small>" +
          '<div class="terminal__actions">' +
            '<button class="btn btn--primary btn--block" type="button" id="retry">' + POS.s("pay.card.retry") + "</button>" +
            '<button class="btn btn--block" type="button" id="changeM">' + POS.s("pay.card.changeMethod") + "</button>" +
          "</div>";
        host.querySelector("#retry").addEventListener("click", function () { termState = "idle"; renderTerminal(); refreshCTA(); });
        host.querySelector("#changeM").addEventListener("click", function () { termState = "idle"; setMethod("cash"); });
        host.querySelector("#retry").focus();
      }
    }

    function startTerminal() {
      termState = "waiting";
      renderTerminal();
      refreshCTA();
    }
    function termApprove(amt) {
      cart.addPayment({ method: method, amountCents: amt });
      POS.setLastMethod(method);
      termState = "idle";
      afterPaymentConfirmed();
    }
    function termDecline(amt) {
      cart.recordAttempt({ method: method, amountCents: amt, result: "declined" });
      termState = "declined";
      renderTerminal();
      refreshCTA();
    }
    function termCancel(amt) {
      cart.recordAttempt({ method: method, amountCents: amt, result: "cancelled" });
      termState = "idle";
      renderTerminal();
      refreshCTA();
      POS.toast(POS.s("pay.card.cancelled"), { duration: 1600 });
    }

    /* ---------- Método ---------- */
    function resetCurrent() {
      amountCents = 0; amountTouched = false; termState = "idle";
    }
    function setMethod(m) {
      method = m;
      resetCurrent();
      document.querySelectorAll(".method").forEach(function (x) {
        x.setAttribute("aria-pressed", String(x.dataset.m === m));
      });
      $("#cashPanel").hidden = (m !== "cash");
      $("#termPanel").hidden = (m === "cash");
      if (m === "cash") { renderQuick(); renderCash(); }
      else renderTerminal();
      refreshCTA();
    }

    /* ---------- Após confirmar um pagamento ---------- */
    function afterPaymentConfirmed() {
      if (cart.dueCents() > 0) {
        splitMode = true;
        resetCurrent();
        rerender();
        return;
      }
      completeSale();
    }

    /* ---------- Confirmar pagamento em dinheiro ---------- */
    function confirmCash() {
      if (committing) return;
      if (!amountTouched || amountCents <= 0) { refreshCTA(); return; }
      committing = true;
      cart.addPayment({ method: "cash", amountCents: amountCents });
      POS.setLastMethod("cash");
      committing = false;
      afterPaymentConfirmed();
    }

    /* ---------- CTA principal ---------- */
    function ctaState() {
      // Modo multi-pagamento
      if (multiMode) {
        var total = totals().totalCents;
        var sumEntered = MULTI_METHODS.reduce(function (s, m) { return s + (multiAmounts[m.id] || 0); }, 0);
        var formErr2 = validateForm();
        if (sumEntered <= 0) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: POS.s("pay.needAmount"), action: null };
        if (sumEntered < total) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: POS.s("pay.due") + " " + POS.money(total - sumEntered), action: null };
        if (formErr2) return { label: POS.s("pay.emit"), amount: POS.money(total), reason: formErr2, action: null };
        return { label: POS.s("pay.emit"), amount: POS.money(total), reason: null, action: emitMultiMode };
      }

      var d = due();
      var paid = cart.paidCents();

      var formErr = validateForm();

      if (termState === "waiting") return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.card.waiting"), action: null, busy: true };
      if (termState === "declined") return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.card.declined"), action: null };

      if (method === "cash") {
        var pay = amountTouched ? amountCents : 0;
        if (pay <= 0) return { label: POS.s("pay.addPayment"), amount: "", reason: POS.s("pay.needAmount"), action: null };
        if (pay >= d) {
          // Cobre tudo (incluindo com troco)
          if (formErr) return { label: POS.s("pay.emit"), amount: POS.money(d), reason: formErr, action: null };
          return { label: POS.s("pay.emit"), amount: POS.money(d), reason: null, action: confirmCash };
        }
        return { label: POS.s("pay.addPayment"), amount: POS.money(pay), reason: null, action: confirmCash };
      }

      // Cartão / MB WAY (idle)
      var amt = amountTouched ? amountCents : d;
      if (amt <= 0) amt = totals().totalCents;
      if (amt <= 0) return { label: POS.s("pay.charge"), amount: "", reason: POS.s("pay.needAmount"), action: null };
      if (amt < d) return { label: POS.s("pay.addPayment"), amount: POS.money(amt), reason: null, action: startTerminal };
      if (formErr) return { label: POS.s("pay.emit"), amount: POS.money(amt), reason: formErr, action: null };
      return { label: POS.s("pay.emit"), amount: POS.money(amt), reason: null, action: startTerminal };
    }

    function refreshCTA() {
      var s = ctaState();
      var btn = $("#finish");
      var isEmit = s.label === POS.s("pay.emit");
      $("#finishLbl").textContent = s.label;
      $("#finishAmt").textContent = s.amount || "";
      $("#finishReason").textContent = s.reason || "";
      btn.classList.toggle("has-reason", !!s.reason);
      btn.classList.toggle("is-busy", !!s.busy);
      btn.classList.toggle("is-emit", isEmit && !s.reason);
      btn.disabled = !s.action;
      btn.onclick = s.action ? function () {
        btn.disabled = true;
        s.action();
      } : null;
    }

    /* ---------- Cleanup ---------- */
    function cleanup() { try { sessionStorage.removeItem("pos_payment"); } catch (e) {} }

    function autoPrintReceipt() {
      if (POS.autoPrint()) POS.toast(POS.s("doc.printed"), { duration: 1400 });
    }

    /* ---------- Concluir venda ---------- */
    function completeSale() {
      if (committing) return;
      committing = true;
      var formErr = validateForm();
      if (formErr) {
        committing = false;
        POS.toast(formErr, { variant: "error", duration: 2200 });
        refreshCTA();
        return;
      }
      var change = cart.changeCents();
      if (change > 0) return showChangeStep(change);
      var sale = cart.commitSale({ receiptDest: "none" });
      autoPrintReceipt();
      cleanup();
      openPostSaleModal(sale);
    }

    /* ---------- Passo de troco (modal) ---------- */
    function showChangeStep(change, opts) {
      opts = opts || {};
      var card = document.createElement("div"); card.className = "changecard";
      card.innerHTML =
        '<div class="changecard__lbl">' + POS.s("pay.changeDue") + "</div>" +
        '<div class="changecard__val num">' + POS.money(change) + "</div>" +
        '<button class="btn btn--pay btn--block changecard__ok" type="button" id="chgOk">' + POS.s("pay.emit") + "</button>";

      var close = POS.openModal(card, { noClose: true, label: POS.s("pay.success") });
      var okBtn = card.querySelector("#chgOk");
      var done = false;

      var go = function () {
        if (done) return; done = true; okBtn.disabled = true;
        var sale;
        if (!opts.restored) {
          sale = cart.commitSale({ receiptDest: "none" });
          autoPrintReceipt();
        } else {
          sale = POS.lastSale();
          POS.clearLastSale();
        }
        cleanup();
        close();
        if (sale) openPostSaleModal(sale);
        else window.location.href = "sale.html";
      };

      okBtn.addEventListener("click", go);
      card.addEventListener("keydown", function (e) {
        if (e.key !== "Enter") return;
        var a = document.activeElement;
        if (a && a !== okBtn && (a.tagName === "BUTTON" || a.tagName === "SUMMARY")) return;
        e.preventDefault(); go();
      });
      okBtn.focus();
    }

    /* ---------- Modal pós-venda ---------- */
    function openPostSaleModal(sale) {
      var cust = POS.customers.find(function (c) { return c.id === sale.customerId; });
      var custEmail = (cust && cust.email) || "";

      var wrap = document.createElement("div"); wrap.className = "postsale";
      wrap.innerHTML =
        '<div class="postsale__head">' +
          '<div class="postsale__badge">' + ic("check", { size: 32, stroke: 2.8 }) + '</div>' +
          '<h3>' + POS.s("pay.success") + '</h3>' +
          '<p class="postsale__ref">' + (sale.seriesId || "2026") + (sale.saleNo ? " · Nº " + sale.saleNo : "") + '</p>' +
        '</div>' +
        '<div class="postsale__actions">' +
          '<button class="postsale__act" data-a="print" type="button" aria-pressed="false">' + ic("printer", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.print") + '</span></button>' +
          '<button class="postsale__act" data-a="email" type="button" aria-pressed="false">' + ic("mail", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.email") + '</span></button>' +
          '<button class="postsale__act" data-a="offer" type="button" aria-pressed="false">' + ic("gift", { size: 22, stroke: 1.6 }) + '<span>' + POS.s("pay.dest.offer") + '</span></button>' +
        '</div>' +
        '<div class="postsale__panel" id="psPanel"></div>' +
        '<button class="btn btn--primary btn--block" id="psNewSale" type="button">' + POS.s("pay.newSale") + '</button>';

      var close = POS.openModal(wrap, { label: POS.s("pay.success") });
      var panel = wrap.querySelector("#psPanel");

      function setActive(btn) {
        wrap.querySelectorAll(".postsale__act").forEach(function (b) { b.setAttribute("aria-pressed", String(b === btn)); });
      }

      wrap.querySelector('[data-a="print"]').addEventListener("click", function () {
        setActive(this); panel.innerHTML = "";
        POS.printDoc(sale, { format: "a4" });
        POS.toast(POS.s("doc.printed"), { duration: 1400 });
        this.setAttribute("aria-pressed", "false");
      });

      wrap.querySelector('[data-a="email"]').addEventListener("click", function () {
        setActive(this);
        panel.innerHTML =
          '<div class="ps-email">' +
            '<label class="ps-email__label" for="psEmailIn">' + POS.s("doc.emailPrompt") + '</label>' +
            '<div class="ps-email__row">' +
              '<input class="ff__in" id="psEmailIn" type="email" placeholder="email@exemplo.com" value="' + custEmail + '" autocomplete="email">' +
              '<button class="btn btn--primary" id="psEmailSend" type="button">' + ic("send", { size: 16 }) + ' ' + POS.s("act.confirm") + '</button>' +
            '</div>' +
          '</div>';
        panel.querySelector("#psEmailIn").focus();
        panel.querySelector("#psEmailSend").addEventListener("click", function () {
          var addr = panel.querySelector("#psEmailIn").value.trim();
          if (!addr) { panel.querySelector("#psEmailIn").focus(); return; }
          POS.toast(POS.s("doc.emailSent"), { variant: "success", duration: 2000 });
        });
      });

      wrap.querySelector('[data-a="offer"]').addEventListener("click", function () {
        setActive(this);
        var linesHtml = (sale.lines || []).map(function (l) {
          var p = POS.products.find(function (x) { return x.id === l.productId; });
          var name = p ? POS.t(p.name) : l.productId;
          var qty = l.weighable ? (l.qty + " kg") : ("×" + l.qty);
          return '<label class="ps-offer__row"><input class="ps-offer__chk" type="checkbox" value="' + l.key + '" checked>' +
            '<span class="ps-offer__name">' + name + '</span>' +
            '<span class="ps-offer__qty">' + qty + '</span></label>';
        }).join("");
        panel.innerHTML =
          '<div class="ps-offer">' +
            '<p class="ps-offer__hint">' + POS.s("doc.gift") + '</p>' +
            '<div class="ps-offer__list">' + linesHtml + '</div>' +
            '<button class="btn btn--block" id="psOfferPrint" type="button">' + ic("printer", { size: 16 }) + ' ' + POS.s("doc.gift") + '</button>' +
          '</div>';
        panel.querySelector("#psOfferPrint").addEventListener("click", function () {
          var keys = Array.from(panel.querySelectorAll(".ps-offer__chk:checked")).map(function (c) { return c.value; });
          var filtered = Object.assign({}, sale, { lines: sale.lines.filter(function (l) { return keys.indexOf(String(l.key)) !== -1; }) });
          POS.printDoc(filtered, { format: "offer" });
          POS.toast(POS.s("doc.giftPrinted"), { duration: 1400 });
        });
      });

      var done = false;
      wrap.querySelector("#psNewSale").addEventListener("click", function () {
        if (done) return; done = true;
        POS.clearLastSale && POS.clearLastSale();
        close();
        window.location.href = "sale.html";
      });
    }

    /* ---------- Modo dividido ---------- */
    function renderMultiMethods() {
      var total = totals().totalCents;
      var sumEntered = MULTI_METHODS.reduce(function (s, m) { return s + (multiAmounts[m.id] || 0); }, 0);

      var rows = MULTI_METHODS.map(function (m) {
        var amt = multiAmounts[m.id] || 0;
        var hasAmt = amt > 0;
        return '<div class="mrow' + (hasAmt ? " mrow--set" : "") + '">' +
          '<span class="mrow__ic">' + ic(m.icon, { size: 22, stroke: 1.6 }) + '</span>' +
          '<span class="mrow__label">' + POS.s(m.labelKey) + '</span>' +
          '<button class="mrow__val num" type="button" data-m="' + m.id + '" aria-label="' + POS.s(m.labelKey) + ': ' + (hasAmt ? POS.money(amt) : "—") + '">' +
            (hasAmt ? POS.money(amt) : '<span class="mrow__placeholder">—</span>') +
          '</button>' +
          (hasAmt ? '<button class="mrow__clr" type="button" data-m="' + m.id + '" aria-label="' + POS.s("pay.removePayment") + '">' + ic("x", { size: 16 }) + '</button>' : '<span class="mrow__clr-ph"></span>') +
        '</div>';
      }).join("");

      document.getElementById("multiMethodList").innerHTML = rows;

      // Banner em falta / troco
      var remaining = total - sumEntered;
      var banner = "";
      if (sumEntered > 0 && remaining > 0) {
        banner = '<div class="paylist__due"><span>' + POS.s("pay.due") + '</span><span class="num">' + POS.money(remaining) + '</span></div>';
      } else if (sumEntered > total) {
        banner = '<div class="paylist__change"><span>' + POS.s("pay.changeDue") + '</span><span class="num">' + POS.money(sumEntered - total) + '</span></div>';
      }
      document.getElementById("multiBanner").innerHTML = banner;

      // Eventos: botão de valor → keypad
      document.querySelectorAll(".mrow__val").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var mid = btn.dataset.m;
          var cur = multiAmounts[mid] || 0;
          var remaining2 = Math.max(0, total - sumEntered + cur);
          POS.keypad({
            title: POS.s("pay.received"),
            sub: POS.s("pay.method." + mid),
            decimal: true, initial: cur / 100, maxInt: 5, maxDec: 2, suffix: "€",
            onConfirm: function (v) {
              multiAmounts[mid] = Math.round(v * 100);
              renderMultiMethods();
              refreshCTA();
            }
          });
        });
      });

      // Eventos: botão × → limpar
      document.querySelectorAll(".mrow__clr").forEach(function (btn) {
        if (!btn.dataset.m) return;
        btn.addEventListener("click", function () {
          multiAmounts[btn.dataset.m] = 0;
          renderMultiMethods();
          refreshCTA();
        });
      });
    }

    function toggleMultiMode() {
      multiMode = !multiMode;
      var btn = document.getElementById("btnMultiMode");
      btn.setAttribute("aria-pressed", String(multiMode));
      document.getElementById("singleMode").hidden = multiMode;
      document.getElementById("multiMode").hidden = !multiMode;
      if (multiMode) {
        cart.clearPayments();
        multiAmounts = { cash: 0, card: 0, mbway: 0 };
        renderMultiMethods();
      } else {
        multiAmounts = { cash: 0, card: 0, mbway: 0 };
        resetCurrent();
        setMethod(method);
        renderPayList();
      }
      refreshCTA();
    }

    function emitMultiMode() {
      if (committing) return;
      committing = true;
      var formErr = validateForm();
      if (formErr) { committing = false; POS.toast(formErr, { variant: "error", duration: 2200 }); refreshCTA(); return; }
      MULTI_METHODS.forEach(function (m) {
        var amt = multiAmounts[m.id] || 0;
        if (amt > 0) {
          cart.addPayment({ method: m.id, amountCents: amt });
          POS.setLastMethod(m.id);
        }
      });
      var change = cart.changeCents();
      if (change > 0) return showChangeStep(change);
      var sale = cart.commitSale({ receiptDest: "none" });
      autoPrintReceipt();
      cleanup();
      openPostSaleModal(sale);
    }

    /* ---------- Render geral ---------- */
    function rerender() {
      renderCart();
      if (multiMode) {
        renderMultiMethods();
      } else {
        renderPayList();
        if (method === "cash") {
          $("#cashPanel").hidden = false; $("#termPanel").hidden = true;
          renderQuick(); renderCash();
        } else {
          $("#cashPanel").hidden = true; $("#termPanel").hidden = false;
          renderTerminal();
        }
        document.querySelectorAll(".method").forEach(function (x) {
          x.setAttribute("aria-pressed", String(x.dataset.m === method));
        });
      }
      refreshCTA();
    }

    function renderAll() { applyStatic(); paintIcons(); renderCustomer(); rerender(); }

    /* ---------- Eventos ---------- */
    // Métodos de pagamento
    document.querySelectorAll(".method").forEach(function (m) {
      m.addEventListener("click", function () { setMethod(m.dataset.m); });
    });

    // Valor recebido (abrir keypad)
    $("#received").addEventListener("click", function () {
      var target = due();
      if (target <= 0) target = totals().totalCents;
      POS.keypad({
        title: POS.s("pay.received"),
        sub: POS.s("cart.totalDue") + ": " + POS.money(target),
        decimal: true, initial: 0, maxInt: 5, maxDec: 2, suffix: "€",
        onConfirm: function (v) {
          amountCents = Math.round(v * 100); amountTouched = true;
          renderCash(); renderPayBannerLive(); refreshCTA();
        }
      });
    });

    // Chips de tipo de documento
    document.querySelectorAll(".top-chip").forEach(function (c) {
      c.addEventListener("click", function () { setDocType(c.dataset.dt); });
    });

    // Seletor de cliente
    var btnCust = $("#btnCust");
    if (btnCust) btnCust.addEventListener("click", openCustomerPicker);

    // Botão de opções do documento
    var btnDocOpts = $("#btnDocOpts");
    if (btnDocOpts) btnDocOpts.addEventListener("click", openDocOptions);

    // Modo dividido
    document.getElementById("btnMultiMode").addEventListener("click", toggleMultiMode);

    /* ---------- Inicialização ---------- */
    POS.onLangChange(renderAll);
    POS.mountDevNav("sale");

    setDocType(docType);
    setMethod(method);
    renderAll();
  })();
  </script>
</body>
</html>
