<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Moloni POS — Venda</title>
  <script>try{var d=document.documentElement,t=sessionStorage.getItem('pos_theme');if(t&&t!=='normal')d.setAttribute('data-theme',t);var l=sessionStorage.getItem('pos_layout');if(l&&l!=='a')d.setAttribute('data-layout',l);var w=sessionStorage.getItem('pos_ops_w');if(w)d.style.setProperty('--ops-w',w);}catch(e){}</script>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/sale.css" />
  <style>
    /* Voucher rows — modal de talões de desconto */
    .voucher-row { display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-2) 0; border-bottom:1px solid var(--line); }
    .voucher-row:last-child { border-bottom:none; }
    .voucher-row__info { flex:1; display:flex; flex-direction:column; gap:2px; }
    .voucher-row__code { font-size:var(--fs-sm); font-weight:700; letter-spacing:.06em; color:var(--ink-900); font-variant-numeric:tabular-nums; }
    .voucher-row__label { font-size:var(--fs-xs,11px); color:var(--ink-500); }
    .voucher-row__del { display:grid; place-items:center; width:36px; height:36px; border-radius:var(--r-sm); border:none; background:transparent; color:var(--ink-400); cursor:pointer; flex-shrink:0; }
    .voucher-row__del:hover { background:var(--danger-50,#fef2f2); color:var(--danger-500); }
    .voucher-row__del:focus-visible { outline:2px solid var(--brand-400); outline-offset:2px; }
    /* DEV helper — códigos de teste disponíveis */
    .voucher-hints { margin-top:var(--sp-4); padding:var(--sp-3); background:var(--surface-2,#f4f5f7); border-radius:var(--r-md); border:1px dashed var(--line); }
    .voucher-hints__label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-400); margin-bottom:var(--sp-2); display:flex; align-items:center; gap:var(--sp-1); }
    .voucher-hints__badge { font-size:9px; font-weight:800; letter-spacing:.05em; padding:1px 5px; border-radius:3px; background:#f59e0b; color:#fff; }
    .voucher-hint__row { display:flex; align-items:center; justify-content:space-between; gap:var(--sp-2); padding:var(--sp-1) var(--sp-2); border-radius:var(--r-sm); cursor:pointer; transition:background 120ms; }
    .voucher-hint__row:hover, .voucher-hint__row:focus-visible { background:var(--brand-50,#eef2ff); outline:none; }
    .voucher-hint__row:focus-visible { box-shadow:0 0 0 2px var(--brand-400); }
    .voucher-hint__code { font-size:var(--fs-sm); font-weight:700; letter-spacing:.07em; color:var(--brand-700,#3730a3); font-variant-numeric:tabular-nums; }
    .voucher-hint__val { font-size:var(--fs-xs,11px); color:var(--ink-500); }
  </style>
</head>
<body>
  <main class="app">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar__logo">
        <svg viewBox="0 0 500 500" fill="currentColor" role="img" aria-label="moloni ON"><path d="M493.6 394.7v94.34H159.58C74.62 489.04 5.5 419.92 5.5 334.96V95.46h94.34v239.49c0 32.95 26.79 59.75 59.75 59.75H493.6Z"/><path d="M493.6 155.08v333.95h-94.34V155.08c0-32.95-26.79-59.75-59.75-59.75H99.96V1h239.55c84.97 0 154.08 69.12 154.08 154.08Z"/><path d="M194.85 190.34H304.2v109.35H194.85z"/></svg>
      </div>
      <div class="topbar__brand">
        <span class="topbar__store">Mercearia Avenida</span>
        <span class="topbar__terminal"><span id="topDate">--</span><span class="topbar__dot"> · </span><span id="topClock" class="num">--:--</span></span>
      </div>
      <span class="topbar__spacer"></span>
      <div class="topbar__actions row">
        <div class="topbar__op-group">
          <button class="topbar__user" id="tbUser" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="topbar__avatar">AS</span>
            <span class="topbar__user-info"><span id="tbUserName">Ana Sousa</span><span class="topbar__user-terminal" id="tbUserTerminal">Terminal 1</span></span>
            <span class="topbar__chev" id="tbUserChev" aria-hidden="true"></span>
          </button>
          <span class="topbar__op-sep" aria-hidden="true"></span>
          <button class="topbar__btn topbar__btn--lock" id="tbLock" type="button" aria-label="Bloquear terminal"></button>
        </div>
      </div>
    </header>

    <!-- Rail -->
    <nav class="rail" aria-label="Secções" id="rail"></nav>

    <!-- Catálogo -->
    <section class="catalog" aria-label="Catálogo">
      <h1 class="sr-only">Venda — Terminal 1</h1>
      <div class="search-row">
        <div class="search" id="searchWrap">
          <span class="search__icon" id="searchIcon" aria-hidden="true"></span>
          <input id="search" type="search" autocomplete="off" aria-label="Procurar produto" />
          <button class="search__clear" id="searchClear" type="button" aria-label="Limpar pesquisa"></button>
        </div>
        <button class="kbd-toggle" id="kbdToggle" type="button" aria-pressed="false" aria-label="Teclado no ecrã"></button>
      </div>
      <div class="cat-nav" id="catNav" role="navigation" aria-label="Navegar por categoria"></div>
      <nav class="crumb" id="crumb" aria-label="Navegação de categorias"></nav>
      <div class="grid-scroll"><div class="grid" id="grid"></div></div>
    </section>

    <!-- Coluna de operações (Layout C) -->
    <aside class="ops" id="ops" aria-label="Operações">
      <div class="ops__resizer" id="opsResizer" role="separator" aria-orientation="vertical" aria-label="Redimensionar" tabindex="0"></div>
    </aside>

    <!-- Talão -->
    <aside class="cart" aria-label="Venda atual">
      <div class="cart__head">
        <button class="cart__more" id="btnMore" type="button" aria-label="Mais ações"></button>
        <button class="customer" id="btnCustomer" type="button">
          <span class="customer__ava" id="custAva" aria-hidden="true"></span>
          <span class="customer__txt"><b id="custName">Consumidor Final</b><span id="custSub">Cliente</span></span>
          <span class="customer__chev" id="custChev" aria-hidden="true"></span>
        </button>
      </div>

      <div class="lines" id="lines"></div>
      <div class="summary" id="summary"></div>
    </aside>

    <!-- Ecrã in-place (substitui catálogo+talão): Definições, etc. -->
    <section class="screen" id="screen" hidden aria-label="Ecrã"></section>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/doc.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
  (function () {
    "use strict";
    var $ = function (s, r) { return (r || document).querySelector(s); };
    var ic = POS.icon, cart = POS.cart;

    // estado de navegação do catálogo
    var nav = { cat: "favorites", sub: null };   // favoritos por defeito
    var query = "";
    var viewMode = localStorage.getItem("pos_view_mode") || "grid";
    var selectedLine = null;              // linha selecionada p/ desconto

    var DOC_TYPES = ["doc.simplified", "doc.receipt", "doc.invoiceReceipt"];

    /* ---------- Relógio + data ---------- */
    function tick() {
      var d = new Date(), loc = POS.lang === "pt" ? "pt-PT" : "en-IE";
      $("#topClock").textContent = d.toLocaleTimeString(loc, { hour: "2-digit", minute: "2-digit" });
      var dateEl = $("#topDate");
      if (dateEl) dateEl.textContent = d.toLocaleDateString(loc, { weekday: "short", day: "numeric", month: "short" });
    }

    /* ---------- Ícones estáticos ---------- */
    function paintStaticIcons() {
      $("#searchIcon").innerHTML = ic("search", { size: 20 });
      $("#searchClear").innerHTML = ic("x", { size: 18 });
      $("#kbdToggle").innerHTML = ic("keyboard", { size: 22 });
      $("#tbUserChev").innerHTML = ic("chevron-down", { size: 16 });
      $("#tbLock").innerHTML = ic("lock", { size: 18 });
      $("#btnMore").innerHTML = ic("more", { size: 20 });
      $("#custAva").innerHTML = ic("user", { size: 18 });
      $("#custChev").innerHTML = ic("chevron-right", { size: 18 });
    }

    function applyStatic() {
      document.querySelectorAll("[data-s]").forEach(function (el) {
        var k = el.getAttribute("data-s"); if (k) el.textContent = POS.s(k);
      });
      $("#search").placeholder = POS.s("cat.search");
    }

    /* ---------- Rail ---------- */
    var RAIL = [
      { key: "sale",      icon: "cart",      label: "nav.sale",      active: true },
      { key: "register",  icon: "register",  label: "nav.register" },
      { key: "docs",      icon: "file",      label: "nav.docs" },
      { key: "tables",    icon: "utensils",  label: "nav.tables" },
      { key: "customers", icon: "users",     label: "nav.customers" },
    ];
    var currentSection = "sale";
    function renderRail() {
      var r = $("#rail"); r.innerHTML = "";
      RAIL.forEach(function (it) {
        var a = document.createElement("button"); a.type = "button";
        a.className = "rail__item"; a.dataset.key = it.key;
        if (it.key === currentSection) a.setAttribute("aria-current", "page");
        a.innerHTML = ic(it.icon, { size: 24 }) + "<span>" + POS.s(it.label) + "</span>" +
          (it.key === "register" ? '<span class="rail__badge" aria-hidden="true">' + ic("x", { size: 11, stroke: 3 }) + "</span>" : "");
        a.addEventListener("click", function () { goSection(it.key); });
        r.appendChild(a);
      });
      var sp = document.createElement("span"); sp.className = "rail__spacer"; r.appendChild(sp);
      var set = document.createElement("button"); set.type = "button";
      set.className = "rail__item";
      set.innerHTML = ic("settings", { size: 24 }) + "<span>" + POS.s("nav.settings") + "</span>";
      set.addEventListener("click", function () { openAppearance(); });
      r.appendChild(set);
    }
    function updateRailActive() {
      document.querySelectorAll("#rail .rail__item[data-key]").forEach(function (a) {
        if (a.dataset.key === currentSection) a.setAttribute("aria-current", "page"); else a.removeAttribute("aria-current");
      });
    }
    function goSection(key) {
      currentSection = key;
      if (key === "sale") hideScreen(); else openSectionScreen(key);
      updateRailActive();
    }
    function openSectionScreen(key) {
      var titleKey = key === "register" ? "nav.register" : key === "docs" ? "nav.docs" : key === "customers" ? "nav.customers" : "nav.tables";
      var wrap = document.createElement("div"); wrap.className = "settings";
      wrap.innerHTML = '<div class="set-head"><h3>' + POS.s(titleKey) + "</h3>" +
        '<button class="set-close" id="scClose" type="button" aria-label="' + POS.s("act.close") + '">' + ic("x", { size: 22 }) + "</button></div>" +
        '<div class="set-body" id="scBody"></div>';
      wrap.querySelector("#scClose").addEventListener("click", function () { goSection("sale"); });
      var body = wrap.querySelector("#scBody");
      if (key === "register") buildCaixaPlaceholder(body);
      else if (key === "docs") buildDocsPlaceholder(body);
      else if (key === "customers") buildCustomersScreen(body);
      else body.innerHTML = '<div class="set-sec"><p class="muted">' + POS.s("ph.soon") + "</p></div>";
      showScreen(wrap, POS.s(titleKey), function () { openSectionScreen(key); });
    }
    function buildCustomersScreen(body) {
      body.classList.add("set-body--customers");
      var customers = (POS.customers || []).slice();
      var q = "";
      function filtered() {
        if (!q) return customers;
        var lq = q.toLowerCase();
        return customers.filter(function (c) {
          return (c.name || "").toLowerCase().includes(lq) ||
                 (c.nif || "").includes(lq) ||
                 (c.phone || "").includes(lq);
        });
      }
      function renderList() {
        var list = filtered();
        var activeCust = cart.customer();
        var rows = list.length ? list.map(function (c) {
          var isActive = activeCust && activeCust.id === c.id;
          return '<div class="cust-row' + (isActive ? " is-active" : "") + '">' +
            '<div class="cust-avatar">' + ic("user", { size: 20 }) + '</div>' +
            '<div class="cust-info">' +
              '<span class="cust-name">' + POS.t(c.name) + '</span>' +
              '<span class="cust-meta">' +
                (c.nif ? '<span>' + POS.s("cust.nif") + ' ' + c.nif + '</span>' : '') +
                (c.phone ? '<span>' + c.phone + '</span>' : '') +
                (c.email ? '<span>' + c.email + '</span>' : '') +
              '</span>' +
            '</div>' +
            '<button class="btn btn--sm' + (isActive ? " btn--primary" : "") + '" data-id="' + c.id + '" type="button">' +
              (isActive ? ic("check", { size: 16 }) + " " : "") + POS.s("cust.select") +
            '</button>' +
          '</div>';
        }).join("") : '<p class="muted cust-empty">' + POS.s("cust.empty") + '</p>';
        host.innerHTML = rows;
        host.querySelectorAll("button[data-id]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            cart.setCustomer(btn.dataset.id);
            goSection("sale");
          });
        });
      }
      var host = document.createElement("div"); host.className = "cust-list";
      var search = '<div class="cust-search">' +
        '<div class="cust-search__wrap">' + ic("search", { size: 18 }) +
          '<input class="cust-search__input" type="search" placeholder="' + POS.s("cust.search") + '" autocomplete="off">' +
        '</div>' +
      '</div>';
      body.innerHTML = search;
      body.appendChild(host);
      renderList();
      body.querySelector(".cust-search__input").addEventListener("input", function (e) {
        q = e.target.value.trim();
        renderList();
      });
    }
    function buildCaixaPlaceholder(body) {
      var open = POS.cash.isOpen();
      body.innerHTML = '<div class="set-sec">' +
        '<div class="cash-status ' + (open ? "is-open" : "") + '"><span>' + POS.s(open ? "cash.statusOpen" : "cash.statusClosed") +
          '</span>' + (open ? '<span class="num">' + POS.s("cash.balance") + ": <b>" + POS.money(POS.cash.balance()) + "</b></span>" : "") + "</div>" +
        '<div class="cash-grid cash-grid--6" style="margin-top:var(--sp-3)">' +
          cashCard("open", "cash.open", "register") + cashCard("close", "cash.close", "lock") +
          cashCard("in", "cash.in", "arrow-right") + cashCard("out", "cash.out", "corner-up-left") +
          cashCard("summary", "cash.summary", "info") + cashCard("detailed", "cash.detailed", "file") + "</div>" +
        (open ? '<button class="btn btn--block" data-cash="nosale" type="button" style="margin-top:var(--sp-3)">' + ic("inbox", { size: 18 }) + " " + POS.s("cash.nosale") + "</button>" : "") +
        '<p class="muted" style="margin-top:var(--sp-4);font-size:var(--fs-sm)">' + POS.s("ph.caixaZ") + "</p></div>";
      body.querySelectorAll("[data-cash]").forEach(function (b) { b.addEventListener("click", function () { cashAction(b.dataset.cash); }); });
    }
    function buildDocsPlaceholder(body) {
      body.classList.add("set-body--docs");
      body.innerHTML = '<div class="docs-master">' +
        '<div class="docs-master__list dl-host" id="docsHost"></div>' +
        '<div class="docs-master__detail" id="docsDetail"></div></div>';
      var detail = body.querySelector("#docsDetail");
      function showDetail(d) { detail.innerHTML = ""; detail.appendChild(buildDocPreview(d, { inline: true })); }
      var docs = POS.documents.slice().sort(function (a, b) { return b.ts - a.ts; });
      renderDocList(body.querySelector("#docsHost"), { onSelect: showDetail, selectedId: docs[0] && docs[0].id });
      if (docs[0]) showDetail(docs[0]);   // master-detail: 1.º documento carregado por defeito
    }

    /* ---------- Breadcrumb ---------- */
    function renderCrumb() {
      var c = $("#crumb"); c.innerHTML = "";

      if (query) {
        c.innerHTML = '<span class="crumb__here">' + POS.s("cat.products") +
          ' <span class="crumb__count">· "' + query + '"</span></span>';
      } else {
        var root = document.createElement("button");
        root.className = "crumb__btn"; root.type = "button";
        root.innerHTML = ic("folder", { size: 18 }) + "<span>" + POS.s("cat.categories") + "</span>";
        root.addEventListener("click", function () { goRoot(); });

        if (nav.cat && nav.cat !== "__all__") {
          var hasFavs = POS.productsByCategory("favorites").length > 0;
          if (nav.cat === "favorites") {
            // Categorias › Favoritos
            c.appendChild(root); c.appendChild(sep());
            c.appendChild(asHere(POS.t(POS.getCategory("favorites").name)));
          } else {
            // link de Favoritos SEMPRE antes de Categorias (se existirem favoritos)
            if (hasFavs) {
              var favB = document.createElement("button"); favB.className = "crumb__btn"; favB.type = "button";
              favB.innerHTML = ic("star", { size: 16 }) + "<span>" + POS.t(POS.getCategory("favorites").name) + "</span>";
              favB.addEventListener("click", function () { nav = { cat: "favorites", sub: null }; renderCatalog(); });
              c.appendChild(favB); c.appendChild(sep());
            }
            c.appendChild(root);
            c.appendChild(sep());
            var catObj = POS.getCategory(nav.cat);
            if (!nav.sub) {
              c.appendChild(asHere(POS.t(catObj.name)));
            } else {
              var fb = document.createElement("button");
              fb.className = "crumb__btn"; fb.type = "button"; fb.textContent = POS.t(catObj.name);
              fb.addEventListener("click", function () { nav = { cat: catObj.id, sub: null }; renderCatalog(); });
              c.appendChild(fb);
              c.appendChild(sep());
              c.appendChild(asHere(POS.t(POS.getSubcategory(nav.sub).name)));
            }
          }
        }
      }

      // toggle de vista — sempre presente no canto direito do crumb
      var spacer = document.createElement("span"); spacer.className = "crumb__spacer";
      var tog = document.createElement("button");
      tog.className = "crumb__view-tog"; tog.type = "button";
      tog.setAttribute("aria-label", viewMode === "grid" ? POS.s("cat.viewList") : POS.s("cat.viewGrid"));
      tog.setAttribute("aria-pressed", viewMode === "list" ? "true" : "false");
      tog.innerHTML = ic(viewMode === "grid" ? "list" : "grid-2x2", { size: 18 });
      tog.addEventListener("click", function () {
        viewMode = viewMode === "grid" ? "list" : "grid";
        localStorage.setItem("pos_view_mode", viewMode);
        renderCatalog();
      });
      c.appendChild(spacer);
      c.appendChild(tog);

      function asHere(txt) { var s = document.createElement("span"); s.className = "crumb__here"; s.textContent = txt; return s; }
      function sep() { var s = document.createElement("span"); s.className = "crumb__sep"; s.innerHTML = ic("chevron-right", { size: 16 }); return s; }
    }

    function goRoot() { nav = { cat: null, sub: null }; query = ""; $("#search").value = ""; $("#searchWrap").classList.remove("has-value"); renderCatalog(); }

    /* ---------- Cat-nav (tabs fixos + carousel) ---------- */
    var _catNavReady = false;
    function buildCatNav() {
      var container = $("#catNav");
      if (_catNavReady) { updateCatNavTabs(); return; }
      _catNavReady = true;

      // Tab Favoritos
      var favTab = document.createElement("button");
      favTab.className = "cat-tab"; favTab.id = "catTabFav"; favTab.type = "button";
      favTab.setAttribute("aria-label", POS.s("cat.favorites") || "Favoritos");
      favTab.innerHTML = ic("star", { size: 20 });
      favTab.addEventListener("click", function () {
        query = "";
        nav = (nav.cat === "favorites") ? { cat: "__all__", sub: null } : { cat: "favorites", sub: null };
        renderCatalog();
      });

      // Tab Todas as categorias
      var allTab = document.createElement("button");
      allTab.className = "cat-tab"; allTab.id = "catTabAll"; allTab.type = "button";
      allTab.setAttribute("aria-label", POS.s("cat.categories") || "Categorias");
      allTab.innerHTML = ic("grid-2x2", { size: 20 });
      allTab.addEventListener("click", function () { query = ""; goRoot(); });

      // Separador visual
      var sep = document.createElement("span");
      sep.className = "cat-nav__sep"; sep.setAttribute("aria-hidden", "true");

      // Setas + rail
      var prevBtn = document.createElement("button");
      prevBtn.className = "famstrip__arrow famstrip__arrow--prev"; prevBtn.type = "button";
      prevBtn.setAttribute("aria-label", "Anterior"); prevBtn.tabIndex = -1;
      prevBtn.innerHTML = ic("chevron-left", { size: 16 });

      var railEl = document.createElement("div");
      railEl.className = "famstrip__rail";

      var nextBtn = document.createElement("button");
      nextBtn.className = "famstrip__arrow famstrip__arrow--next"; nextBtn.type = "button";
      nextBtn.setAttribute("aria-label", "Seguinte"); nextBtn.tabIndex = -1;
      nextBtn.innerHTML = ic("chevron-right", { size: 16 });

      POS.categories.filter(function (c) { return c.id !== "favorites"; }).forEach(function (cat) { railEl.appendChild(famChip(cat)); });

      requestAnimationFrame(function () {
        var chips = railEl.querySelectorAll(".famchip");
        var maxW = 0;
        chips.forEach(function (ch) { maxW = Math.max(maxW, ch.offsetWidth); });
        if (maxW > 0) chips.forEach(function (ch) { ch.style.width = maxW + "px"; ch.style.flex = "0 0 " + maxW + "px"; });
      });

      function scrollStep(dir) {
        var chip = railEl.querySelector(".famchip");
        var step = chip ? chip.offsetWidth + 8 : 160;
        railEl.scrollBy({ left: dir * step * 2, behavior: "smooth" });
      }
      function updateArrows() {
        var atStart = railEl.scrollLeft <= 2;
        var atEnd = railEl.scrollLeft + railEl.clientWidth >= railEl.scrollWidth - 2;
        prevBtn.disabled = atStart;
        nextBtn.disabled = atEnd;
        prevBtn.style.opacity = atStart ? "0" : "1";
        nextBtn.style.opacity = atEnd ? "0" : "1";
        prevBtn.style.pointerEvents = atStart ? "none" : "";
        nextBtn.style.pointerEvents = atEnd ? "none" : "";
      }
      prevBtn.addEventListener("click", function () { scrollStep(-1); });
      nextBtn.addEventListener("click", function () { scrollStep(1); });
      railEl.addEventListener("scroll", updateArrows, { passive: true });
      requestAnimationFrame(updateArrows);

      // Wrap: rail + setas sobrepostas com fade
      var railWrap = document.createElement("div");
      railWrap.className = "famstrip__wrap";
      railWrap.appendChild(prevBtn);
      railWrap.appendChild(railEl);
      railWrap.appendChild(nextBtn);

      container.appendChild(favTab);
      container.appendChild(allTab);
      container.appendChild(sep);
      container.appendChild(railWrap);

      updateCatNavTabs();
    }
    function updateCatNavTabs() {
      var favTab = document.getElementById("catTabFav");
      var allTab = document.getElementById("catTabAll");
      if (!favTab || !allTab) return;
      var isFavs = !query && nav.cat === "favorites";
      var isAll  = !query && !nav.cat;
      favTab.setAttribute("aria-selected", isFavs ? "true" : "false");
      allTab.setAttribute("aria-selected", isAll ? "true" : "false");
      // chips do carousel — activo quando na categoria correspondente (não fav, não __all__, não raiz)
      document.querySelectorAll(".famchip[data-cat]").forEach(function (chip) {
        var active = !query && nav.cat === chip.dataset.cat;
        chip.setAttribute("aria-selected", active ? "true" : "false");
      });
    }

    /* ---------- Grelha ---------- */
    function renderCatalog() { buildCatNav(); renderCrumb(); renderGrid(); }

    function renderGrid() {
      var grid = $("#grid"); grid.innerHTML = ""; grid.className = "grid" + (viewMode === "list" ? " grid--list" : "");

      if (query) { return renderProducts(alphaSorted(searchProducts())); }
      if (nav.cat === "__all__") { return renderProducts(alphaSorted(POS.products.slice())); }
      if (!nav.cat) {  // raiz: tiles de família para seleção
        POS.categories.forEach(function (cat) { grid.appendChild(familyTile(cat, false)); });
        return;
      }
      if (nav.cat === "favorites") return renderProducts(alphaSorted(POS.productsByCategory("favorites")));
      if (POS.hasSub(nav.cat) && !nav.sub) {  // subfamílias
        POS.getSubcategories(nav.cat).forEach(function (sub) { grid.appendChild(familyTile(sub, true)); });
        return;
      }
      renderProducts(alphaSorted(nav.sub ? POS.productsBySubcategory(nav.sub) : POS.productsByCategory(nav.cat)));
    }

    function alphaSorted(arr) { return arr.slice().sort(function (a, b) { return POS.t(a.name).localeCompare(POS.t(b.name), POS.lang); }); }
    function gridSec(text) { var h = document.createElement("h2"); h.className = "grid-sec"; h.textContent = text; return h; }
    function renderProducts(list) {
      var grid = $("#grid");
      if (!list.length) {
        grid.innerHTML = '<div class="empty">' + ic("search", { size: 44, stroke: 1.5 }) +
          "<h3>" + POS.s("cat.empty.title") + "</h3><p>" + POS.s("cat.empty.body") + "</p></div>";
        return;
      }
      list.forEach(function (p) { grid.appendChild(viewMode === "list" ? productListRow(p) : productTile(p)); });
    }

    function famChip(cat) {
      var count = POS.productsByCategory(cat.id).length;
      var b = document.createElement("button"); b.className = "famchip"; b.type = "button";
      b.dataset.cat = cat.id;
      b.setAttribute("aria-selected", "false");
      b.style.setProperty("--fam-color", cat.color || "var(--brand-600)");
      b.innerHTML =
        '<span class="famchip__disc">' + ic(cat.icon || "folder", { size: 22 }) + "</span>" +
        '<span class="famchip__txt"><span class="famchip__name">' + POS.t(cat.name) + "</span>" +
          '<span class="famchip__count">' + count + " " + POS.s(count === 1 ? "tot.item" : "tot.items") + "</span></span>";
      b.addEventListener("click", function () {
        nav = (nav.cat === cat.id) ? { cat: "favorites", sub: null } : { cat: cat.id, sub: null };
        renderCatalog();
      });
      return b;
    }

    function familyTile(catOrSub, isSub) {
      var count = isSub ? POS.productsBySubcategory(catOrSub.id).length : POS.productsByCategory(catOrSub.id).length;
      var btn = document.createElement("button");
      btn.className = "ftile"; btn.type = "button";
      btn.style.setProperty("--fam-color", catOrSub.color || "var(--brand-600)");
      btn.innerHTML =
        '<span class="ftile__disc">' + ic(catOrSub.icon || "folder", { size: 26 }) + "</span>" +
        '<span class="ftile__name">' + POS.t(catOrSub.name) + "</span>" +
        '<span class="ftile__count">' + count + " " + POS.s(count === 1 ? "tot.item" : "tot.items") + "</span>";
      btn.addEventListener("click", function () {
        if (isSub) nav = { cat: nav.cat, sub: catOrSub.id };
        else nav = { cat: catOrSub.id, sub: null };
        renderCatalog();
      });
      return btn;
    }

    function productTile(p) {
      var cat = POS.getCategory(p.cat);
      var color = (cat && cat.color) || "#888";
      var inCart = cart.lines.filter(function (l) { return l.productId === p.id; })
        .reduce(function (n, l) { return n + (l.weighable ? 1 : l.qty); }, 0);
      var out = p.stock <= 0;
      var addLbl = out ? (POS.t(p.name) + " — " + POS.s("pd.outStock"))
        : (POS.s("pd.add") + ": " + POS.t(p.name) + ", " + POS.money(p.priceCents) + (inCart ? " (" + inCart + ")" : ""));
      var tile = document.createElement("div");
      tile.className = "tile" + (out ? " is-out" : "") + (inCart ? " has-qty" : "");
      tile.style.setProperty("--tile-color", color);
      tile.innerHTML =
        '<button class="tile__add" type="button"' + (out ? ' disabled aria-label="' : ' aria-label="') + addLbl + '">' +
          '<span class="tile__media">' + ic(p.icon || (cat && cat.icon) || "tag", { size: 32, stroke: 1.6 }) +
            (inCart ? '<span class="tile__badge" aria-hidden="true">' + inCart + "</span>" : "") +
            (out ? '<span class="tile__out">' + POS.s("pd.outStock") + "</span>" : "") +
          "</span>" +
          '<span class="tile__name">' + POS.t(p.name) + "</span>" +
        "</button>" +
        '<div class="tile__foot">' +
          '<span class="tile__price">' + POS.money(p.priceCents) + (p.weighable ? ' <small>' + POS.s("cat.weighable") + "</small>" : "") + "</span>" +
          '<button class="tile__info" type="button" aria-label="' + POS.s("cat.details") + ": " + POS.t(p.name) + '">' + ic("info", { size: 20 }) + "</button>" +
        "</div>";
      var add = tile.querySelector(".tile__add");
      add.addEventListener("click", function () { addProduct(p, add); });
      tile.querySelector(".tile__info").addEventListener("click", function (e) { e.stopPropagation(); openDetails(p); });
      return tile;
    }

    function productListRow(p) {
      var cat = POS.getCategory(p.cat);
      var color = (cat && cat.color) || "#888";
      var inCart = cart.lines.filter(function (l) { return l.productId === p.id; })
        .reduce(function (n, l) { return n + (l.weighable ? 1 : l.qty); }, 0);
      var out = p.stock <= 0;
      var row = document.createElement("div");
      row.className = "list-row" + (out ? " is-out" : "");
      row.style.setProperty("--tile-color", color);
      row.innerHTML =
        '<button class="list-row__add" type="button"' +
          (out ? ' disabled aria-label="' + POS.t(p.name) + " — " + POS.s("pd.outStock") + '"'
               : ' aria-label="' + POS.s("pd.add") + ": " + POS.t(p.name) + '"') + ">" +
          '<span class="list-row__disc">' + ic(p.icon || (cat && cat.icon) || "tag", { size: 20 }) + "</span>" +
          '<span class="list-row__name">' + POS.t(p.name) +
            (inCart ? ' <span class="list-row__badge" aria-label="' + inCart + ' no carrinho">' + inCart + "</span>" : "") +
          "</span>" +
          '<span class="list-row__price">' + POS.money(p.priceCents) +
            (p.weighable ? "<small>/kg</small>" : "") +
          "</span>" +
        "</button>" +
        '<button class="list-row__info" type="button" aria-label="' + POS.s("cat.details") + ": " + POS.t(p.name) + '">' +
          ic("info", { size: 16 }) +
        "</button>";
      row.querySelector(".list-row__add").addEventListener("click", function () { addProduct(p, row.querySelector(".list-row__add")); });
      row.querySelector(".list-row__info").addEventListener("click", function (e) { e.stopPropagation(); openDetails(p); });
      return row;
    }

    function searchProducts() {
      var q = query.toLowerCase();
      return POS.products.filter(function (p) {
        return POS.t(p.name).toLowerCase().indexOf(q) >= 0 ||
          (p.barcode || "").indexOf(q) >= 0 || (p.ref || "").toLowerCase().indexOf(q) >= 0;
      });
    }

    // porteiro do POS: vender exige caixa aberta. Não é um muro à entrada — bloqueia só a venda,
    // com saída a 1 toque (banner persistente no catálogo + toast com ação).
    function requireOpenCash() {
      if (POS.cash.isOpen()) return true;
      POS.toast(POS.s("cash.blockedSale"), { variant: "danger", duration: 2600, action: { label: POS.s("cash.openCta"), onClick: function () { cashAction("open"); } } });
      var banner = $(".cat-lock"); if (banner) pulseSwipe(banner);
      return false;
    }
    // reflete o estado da caixa em toda a UI (rail, banner do catálogo, botão Pagar)
    function syncCashUI() {
      var open = POS.cash.isOpen();
      var rail = document.querySelector('#rail .rail__item[data-key="register"]');
      if (rail) { rail.classList.toggle("is-closed", !open); rail.setAttribute("aria-label", POS.s(open ? "cash.railOpen" : "cash.railClosed")); }
      var cat = $(".catalog");
      if (cat) cat.classList.toggle("is-locked", !open);
      toggleLockBanner(!open);
    }
    function toggleLockBanner(on) {
      var cat = $(".catalog"); if (!cat) return;
      var banner = cat.querySelector(".cat-lock");
      if (!on) { if (banner) banner.remove(); return; }
      if (banner) return;
      banner = document.createElement("div"); banner.className = "cat-lock"; banner.setAttribute("role", "status");
      banner.innerHTML = '<span class="cat-lock__ic">' + ic("lock", { size: 20 }) + "</span>" +
        '<span class="cat-lock__txt"><b>' + POS.s("cash.lockedTitle") + "</b><small>" + POS.s("cash.lockedBody") + "</small></span>" +
        '<button class="cat-lock__cta" type="button">' + POS.s("cash.openCta") + "</button>";
      banner.querySelector(".cat-lock__cta").addEventListener("click", function () { cashAction("open"); });
      var crumb = cat.querySelector("#crumb");
      if (crumb && crumb.nextSibling) cat.insertBefore(banner, crumb.nextSibling); else cat.appendChild(banner);
    }
    // ao abrir o terminal: se a caixa estiver fechada, convida a abrir (dispensável, 1x por sessão)
    function cashStartupPrompt() {
      if (POS.cash.isOpen()) return;
      try { if (sessionStorage.getItem("pos_cash_prompted") === "1") return; sessionStorage.setItem("pos_cash_prompted", "1"); } catch (e) {}
      var w = document.createElement("div"); w.className = "sheet";
      w.innerHTML = "<h3>" + POS.s("cash.promptTitle") + "</h3><div class='sheet__sub'>" + POS.s("cash.promptBody") + "</div>" +
        '<div class="sheet__foot"><button class="btn" data-k="later">' + POS.s("cash.later") + "</button>" +
        '<button class="btn btn--primary" data-k="open">' + POS.s("cash.openCta") + "</button></div>";
      var close = POS.openModal(w, { label: POS.s("cash.promptTitle") });
      w.querySelector('[data-k="later"]').addEventListener("click", close);
      var ob = w.querySelector('[data-k="open"]');
      ob.addEventListener("click", function () { close(); cashAction("open"); });
      ob.focus();
    }
    function addProduct(p, tileEl) {
      if (!requireOpenCash()) return;
      if (p.stock <= 0) { POS.toast(POS.s("pd.outStock"), { variant: "danger", duration: 1600 }); return; }
      if (p.weighable) { openWeight(p, tileEl); return; }
      flyToCart(tileEl);                 // clonar ANTES do add (o add re-renderiza a grelha)
      var key = cart.add(p.id); selectedLine = key;
    }

    /* ---------- Dialog de detalhes ---------- */
    function openDetails(p) {
      var cat = POS.getCategory(p.cat), tax = POS.getTax(p.tax);
      var color = (cat && cat.color) || "#888";
      var net = Math.round(p.priceCents / (1 + tax.rate / 100));
      var stockTag = p.stock <= 0 ? '<span class="pd__tag out">' + POS.s("pd.outStock") + "</span>"
        : p.stock <= 5 ? '<span class="pd__tag low">' + POS.s("pd.lowStock") + " · " + p.stock + "</span>"
        : '<span class="pd__tag ok">' + p.stock + " " + POS.s("pd.inStock") + "</span>";

      var variantsHtml = "";
      if (p.variants && p.variants.length) {
        variantsHtml = '<div class="pd__sec"><h4>' + POS.s("pd.variants") + "</h4>" +
          p.variants.map(function (v) {
            return '<div style="margin-bottom:8px"><div class="muted" style="font-size:var(--fs-xs);margin-bottom:4px">' + POS.t(v.name) + "</div>" +
              '<div class="varopts">' + v.options.map(function (o, i) {
                return '<button class="varopt" type="button" aria-pressed="' + (i === 0) + '">' + o + "</button>";
              }).join("") + "</div></div>";
          }).join("") + "</div>";
      }

      var wrap = document.createElement("div"); wrap.className = "pd";
      wrap.style.setProperty("--tile-color", color);
      wrap.innerHTML =
        '<div class="pd__hero"><div class="pd__media">' + ic(p.icon || (cat && cat.icon) || "tag", { size: 56, stroke: 1.5 }) + "</div>" +
          '<div class="pd__head"><div class="pd__name">' + POS.t(p.name) + "</div>" +
            '<div class="pd__ref">' + POS.s("pd.ref") + ": " + p.ref + "</div>" +
            '<div class="pd__price">' + POS.money(p.priceCents) + (p.weighable ? " <small>" + POS.s("cat.weighable") + "</small>" : "") + "</div>" +
            '<div class="pd__tags">' + stockTag + '<span class="pd__tag">' + tax.label[POS.lang] + "</span>" +
              '<span class="pd__tag">' + POS.t(cat.name) + "</span></div>" +
          "</div></div>" +
        '<div class="pd__body">' +
          '<div class="pd__sec"><h4>' + POS.s("pd.desc") + "</h4><p>" + POS.t(p.desc) + "</p></div>" +
          '<div class="pd__grid">' +
            '<div class="pd__cell"><div class="k">' + POS.s("pd.priceNoVat") + '</div><div class="v">' + POS.money(net) + "</div></div>" +
            '<div class="pd__cell"><div class="k">' + POS.s("pd.stock") + '</div><div class="v">' + p.stock + "</div></div>" +
          "</div>" + variantsHtml +
        "</div>" +
        '<div class="pd__foot">' +
          '<button class="btn pd__fav-btn" data-k="fav" type="button" aria-pressed="' + !!p.fav + '" aria-label="' + POS.s("pd.addFav") + '">' +
            ic("star", { size: 20 }) + "</button>" +
          '<button class="btn" data-k="close">' + POS.s("act.cancel") + "</button>" +
          '<button class="btn btn--primary" data-k="add"' + (p.stock <= 0 ? " disabled" : "") + ">" + ic("plus", { size: 18 }) + " " + POS.s("pd.add") + "</button></div>";

      wrap.querySelectorAll(".varopt").forEach(function (b) {
        b.addEventListener("click", function () {
          var sibs = b.parentElement.querySelectorAll(".varopt");
          sibs.forEach(function (x) { x.setAttribute("aria-pressed", String(x === b)); });
        });
      });
      var close = POS.openModal(wrap, { label: POS.t(p.name) });
      wrap.querySelector('[data-k="close"]').addEventListener("click", close);
      wrap.querySelector('[data-k="add"]').addEventListener("click", function () { close(); addProduct(p); });
      wrap.querySelector('[data-k="fav"]').addEventListener("click", function () {
        p.fav = !p.fav;
        this.setAttribute("aria-pressed", String(p.fav));
        renderGrid();
      });
    }

    /* ---------- Talão ---------- */
    function renderDoc() {
      var t = cart.state.docType || "receipt";
      var prefix = POS.docCode(cart.state.docType || "receipt");   // estado mantido; seleção move para o checkout
    }

    function renderCustomer() {
      var c = cart.customer();
      $("#custName").textContent = POS.t(c.name);
      $("#custSub").textContent = c.nif ? ("NIF " + c.nif) : POS.s("cart.customer");
    }

    function renderLines() {
      var host = $("#lines");
      if (!cart.lines.length) {
        host.innerHTML = '<div class="cart__empty">' + ic("inbox", { size: 52, stroke: 1.3 }) +
          "<h3>" + POS.s("cart.empty.title") + "</h3><p>" + POS.s("cart.empty.body") + "</p></div>";
        return;
      }
      host.innerHTML = '<div class="lines__head"><span>' + POS.s("cat.products") +
        '</span><span>' + POS.s("tot.total") + "</span></div>";
      cart.lines.forEach(function (l) {
        var p = POS.getProduct(l.productId);
        var gross = cart.lineGross(l), tot = cart.lineTotal(l), disc = cart.lineDiscount(l);
        var qtyLabel = l.weighable ? POS.weight(l.qty) : l.qty;
        var row = document.createElement("div"); row.className = "line" + (l.key === selectedLine ? " is-selected" : "");
        row.innerHTML =
          '<button class="line__info" data-act="select" style="background:none;text-align:left">' +
            '<span class="line__name">' + (l.nameOverride || POS.t(p.name)) + "</span>" +
            '<span class="line__sub"><small>' + POS.money(l.unitPriceCents) + (l.weighable ? "/kg" : "") + " · " + POS.getTax(p.tax).rate + "%</small>" +
              (disc ? '<span class="disc-badge">−' + (l.discount.type === "pct" ? l.discount.value + "%" : POS.money(disc)) + "</span>" : "") +
            "</span>" +
          "</button>" +
          '<div class="stepper">' +
            '<button type="button" data-act="dec" aria-label="' + (l.qty <= 1 ? POS.s("cart.remove") : "−") + '" class="' + (l.qty <= 1 ? "stepper__del" : "") + '">' + (l.qty <= 1 ? ic("trash", { size: 16 }) : ic("minus", { size: 18 })) + "</button>" +
            '<button type="button" class="qty" data-act="edit" aria-label="' + POS.s("cart.qty") + '">' + qtyLabel + "</button>" +
            '<button type="button" data-act="inc" aria-label="+">' + ic("plus", { size: 18 }) + "</button>" +
          "</div>" +
          '<div class="line__right"><div class="line__amt">' +
            '<span class="line__price">' + POS.money(tot) + "</span>" +
            (disc ? '<span class="line__was">' + POS.money(gross) + "</span>" : "") +
          "</div></div>";
        row.querySelector('[data-act="dec"]').addEventListener("click", function () { l.qty <= 1 ? confirmRemove(l) : cart.changeQty(l.key, -1); });
        row.querySelector('[data-act="inc"]').addEventListener("click", function () { cart.changeQty(l.key, +1); });
        row.querySelector('[data-act="edit"]').addEventListener("click", function () { openQty(l); });
        row.querySelector('[data-act="select"]').addEventListener("click", function () { selectLine(l); });
        host.appendChild(row);
      });
    }

    function confirmRemove(l) {
      var p = POS.getProduct(l.productId);
      var wrap = document.createElement("div");
      wrap.innerHTML =
        '<p style="padding:var(--sp-4) var(--sp-5) var(--sp-3);font-size:var(--fs-base);color:var(--ink-700)">' +
          POS.t(p.name) + '</p>' +
        '<div class="pd__foot">' +
          '<button class="btn" data-k="cancel">' + POS.s("act.cancel") + '</button>' +
          '<button class="btn btn--danger-solid" data-k="confirm">' + ic("trash", { size: 16 }) + " " + POS.s("cart.remove") + '</button>' +
        '</div>';
      var close = POS.openModal(wrap, { label: POS.s("cart.removeConfirm") });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", close);
      wrap.querySelector('[data-k="confirm"]').addEventListener("click", function () { close(); removeLine(l); });
    }
    function removeLine(l) {
      var snap = cart.remove(l.key);
      if (selectedLine === l.key) selectedLine = null;
      POS.toast(POS.s("cart.removed"), { variant: "danger", action: { label: POS.s("cart.undo"), onClick: function () { cart.restore(snap); } } });
    }
    function selectLine(l) {
      if (POS.layout === "c") { selectedLine = (selectedLine === l.key) ? null : l.key; renderOps(); renderLines(); }
      else { selectedLine = l.key; openLineMenu(l); }
    }

    function renderSummary() {
      var t = cart.totals(), host = $("#summary");
      var itemsWord = t.itemCount === 1 ? POS.s("tot.item") : POS.s("tot.items");
      var vatCents = t.totalCents - t.subtotalCents;
      var vouchers = cart.state.vouchers || [];
      var globalDiscCents = t.discountCents - (t.vouchersCents || 0);

      var discRows = [];
      if (globalDiscCents > 0) {
        var gd = cart.state.discount;
        var gdLabel = POS.s("tot.discount") + (gd && gd.type === "pct" ? " (" + gd.value + "%)" : "");
        discRows.push(discRow("global", gdLabel, "−" + POS.money(globalDiscCents)));
      }
      vouchers.forEach(function (v) {
        var val = v.type === "pct" ? ("−" + v.value + "%") : ("−" + POS.money(v.valueCents));
        discRows.push(discRow("v-" + v.code, v.code, val));
      });

      host.innerHTML =
        (t.itemCount ? '<button class="summary__disc-btn" id="btnDisc" type="button">' +
          ic("plus", { size: 15 }) + " " + POS.s("tot.discount") +
        "</button>" : "") +
        (discRows.length ? '<div class="summary__disc-group">' +
          '<span class="summary__disc-group-label">' + POS.s("tot.discounts") + '</span>' +
          discRows.join("") +
        '</div>' : "") +
        '<div class="summary__rows">' +
          (t.itemCount ? sumRow(POS.s("tot.subtotal") + " " + POS.s("tot.noVat"), POS.money(t.subtotalCents)) : "") +
          (t.itemCount && vatCents > 0 ? sumRow(POS.s("tot.tax") + " (" + (t.taxBreakdown && t.taxBreakdown.length === 1 ? t.taxBreakdown[0].rate + "%" : POS.s("tot.mixed")) + ")", POS.money(vatCents)) : "") +
        "</div>" +
        '<div class="pay-fast">' +
          '<div class="pay-fast__total"><span>' + t.itemCount + " " + itemsWord + '</span><span class="pay-fast__amount num">' + POS.money(t.totalCents) + '</span></div>' +
          '<div class="pay-fast__btns">' +
            '<button class="pay-fast__btn" id="btnPayCash" type="button"' + (t.itemCount && POS.cash.isOpen() ? "" : " disabled") + ">" +
              ic("banknote", { size: 20 }) + " " + POS.s("pay.method.cash") +
            '</button>' +
            '<button class="pay-fast__btn" id="btnPayCard" type="button"' + (t.itemCount && POS.cash.isOpen() ? "" : " disabled") + ">" +
              ic("card", { size: 20 }) + " " + POS.s("pay.method.card") +
            '</button>' +
          '</div>' +
          (t.itemCount ? '<button class="pay-fast__more" id="btnPayMore" type="button">' +
            ic("settings-2", { size: 14 }) + " " + POS.s("pay.advanced") +
          '</button>' : '') +
        '</div>';

      if (t.itemCount) $("#btnDisc").addEventListener("click", openDiscountChooser);
      if (t.itemCount) {
        $("#btnPayCash").addEventListener("click", function () { fastPay("cash"); });
        $("#btnPayCard").addEventListener("click", function () { fastPay("card"); });
        $("#btnPayMore").addEventListener("click", function () { pay(); });
      }

      if (globalDiscCents > 0) {
        host.querySelector('[data-remove="global"]').addEventListener("click", function () {
          cart.setDiscount(null);
          POS.toast(POS.s("disc.removed"), { variant: "success", duration: 1400 });
        });
      }
      vouchers.forEach(function (v) {
        var btn = host.querySelector('[data-remove="v-' + v.code + '"]');
        if (btn) btn.addEventListener("click", function () {
          cart.removeVoucher(v.code);
          POS.toast(POS.s("disc.removed"), { variant: "success", duration: 1400 });
        });
      });
    }
    function sumRow(l, v, cls) { return '<div class="summary__row"><span>' + l + '</span><span class="val ' + (cls || "") + '">' + v + "</span></div>"; }
    function discRow(id, label, val) {
      return '<div class="summary__row summary__disc-row">' +
        '<button class="summary__disc-del" type="button" data-remove="' + id + '" aria-label="Remover desconto">' + ic("trash", { size: 16 }) + '</button>' +
        '<span class="summary__disc-name">' + label + '</span>' +
        '<span class="val summary__disc">' + val + '</span>' +
      '</div>';
    }

    /* ---------- Trocar terminal ---------- */
    function openTerminalSwitcher() {
      var current = POS.terminal();
      var wrap = document.createElement("div"); wrap.className = "sheet";
      var byStore = {};
      POS.terminals.forEach(function (t) { (byStore[t.storeId] = byStore[t.storeId] || []).push(t); });

      var html = "<h3>" + POS.s("user.switchTerminal") + "</h3>";
      POS.stores.forEach(function (store) {
        var terms = byStore[store.id]; if (!terms) return;
        html += '<div class="term-group"><div class="term-group__label">' + store.name + '</div>';
        terms.forEach(function (t) {
          var isCurrent = t.id === current.terminalId;
          var cashState = null; try { cashState = JSON.parse(localStorage.getItem("pos_cash_" + t.id)); } catch (e) {}
          var isOpen = cashState && cashState.open;
          var termLabel = t.id.replace(/^T(\d+)$/, "Terminal $1");
          html += '<button class="term-row' + (isCurrent ? " term-row--active" : "") + '" type="button" data-tid="' + t.id + '">' +
            '<div class="term-row__ic">' + ic("monitor", { size: 20 }) + '</div>' +
            '<div class="term-row__info"><b>' + termLabel + '</b><span>' + (isOpen ? POS.s("cash.open") : POS.s("cash.closed")) + '</span></div>' +
            (isCurrent ? '<div class="term-row__check">' + ic("check", { size: 16, stroke: 2.5 }) + '</div>' : '') +
          '</button>';
        });
        html += '</div>';
      });
      wrap.innerHTML = html;

      var close = POS.openModal(wrap, { label: POS.s("user.switchTerminal") });
      wrap.querySelectorAll(".term-row:not(.term-row--active)").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var tDef = POS.terminals.find(function (x) { return x.id === btn.dataset.tid; });
          if (!tDef) return;
          var store = POS.stores.find(function (s) { return s.id === tDef.storeId; });
          POS.setTerminal({ terminalId: tDef.id, label: tDef.label });
          if (store) POS.store = store;
          close(); renderUser(); syncCashUI();
          POS.toast(tDef.id.replace(/^T(\d+)$/, "Terminal $1"), { variant: "success", duration: 1800 });
        });
      });
    }

        '<span class="doc-item__main"><span class="doc-item__no">' + nm + "</span>" +

    var DOC_DT = { simplified: "doc.simplified", receipt: "doc.receipt", invoiceReceipt: "doc.invoiceReceipt", creditNote: "doc.creditNote" };
    // item de documento (disco código AT + TIPO série/número + total) — toque abre o preview
    function docItemEl(d, onClick) {
      var dt = d.type || d.docType;   // seed usa `type`, vendas reais (pos_sales) usam `docType`
      var cust = POS.customers.find(function (c) { return c.id === d.customerId; }) || POS.customers[0];
      var time = new Date(d.ts).toLocaleString(POS.lang === "pt" ? "pt-PT" : "en-IE", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
      var sub = POS.s(DOC_DT[dt] || "doc.receipt") + " · " + POS.t(cust.name) + (d.nif ? " · " + d.nif : "") + " · " + time;
      var b = document.createElement("button"); b.type = "button"; b.className = "clist__item doc-item"; b.dataset.docId = d.id;
      b.innerHTML = '<span class="doc-code" style="--code-c:' + POS.docCodeColor(dt) + '">' + POS.docCode(dt) + "</span>" +
        '<span class="doc-item__main"><span class="doc-item__no">' + POS.docLabel(d) + "</span>" +
          '<span class="doc-item__sub">' + sub + "</span></span>" +
        '<span class="doc-item__total num">' + POS.money((d.totals && d.totals.taxBreakdown) ? d.totals.totalCents : POS.docTotals(d.lines).totalCents) + "</span>";
      b.addEventListener("click", function () { if (onClick) onClick(d, b); else openDocPreview(d); });
      return b;
    }
    // lista de documentos com pesquisa + paginação (mesma lógica da lista de movimentos)
    function renderDocList(host, opts) {
      opts = opts || {};
      // funde vendas reais emitidas (pos_sales) com o histórico seed, recentes em cima
      var all = POS.sales().concat(POS.documents).sort(function (a, b) { return b.ts - a.ts; });
      var st = { q: "", size: opts.size || 25, page: 1 };
      host.innerHTML =
        '<div class="cd-search"><input id="dlSearch" type="search" autocomplete="off" placeholder="' + POS.s("doc.search") + '" aria-label="' + POS.s("doc.search") + '" /></div>' +
        '<div class="dl-list" id="dlList"></div>' +
        '<div class="cd-foot"><div class="seg cd-size" role="group" aria-label="' + POS.s("cash.perPage") + '">' +
          [10, 25, 50].map(function (n) { return '<button type="button" data-size="' + n + '"' + (n === st.size ? ' aria-pressed="true"' : "") + ">" + n + "</button>"; }).join("") + "</div>" +
          '<div class="cd-pager"><button class="cd-nav" id="dlPrev" type="button" aria-label="' + POS.s("cash.prevPage") + '">' + ic("chevron-left", { size: 20 }) + "</button>" +
          '<span class="cd-pginfo" id="dlInfo"></span>' +
          '<button class="cd-nav" id="dlNext" type="button" aria-label="' + POS.s("cash.nextPage") + '">' + ic("chevron-right", { size: 20 }) + "</button></div></div>";
      var listEl = host.querySelector("#dlList"), info = host.querySelector("#dlInfo");
      function filtered() {
        var q = st.q.trim().toLowerCase(); if (!q) return all;
        return all.filter(function (d) {
          var cust = POS.customers.find(function (c) { return c.id === d.customerId; }) || POS.customers[0];
          var hay = (POS.docLabel(d) + " " + POS.s(DOC_DT[d.type || d.docType] || "doc.receipt") + " " + POS.t(cust.name) + " " + (d.nif || "") + " " + POS.money(POS.docTotals(d.lines).totalCents)).toLowerCase();
          return hay.indexOf(q) >= 0;
        });
      }
      function render() {
        var list = filtered();
        var pages = Math.max(1, Math.ceil(list.length / st.size));
        if (st.page > pages) st.page = pages;
        listEl.innerHTML = "";
        if (!list.length) { listEl.innerHTML = '<p class="muted" style="padding:24px;text-align:center">' + POS.s(st.q ? "cash.noSearch" : "doc.none") + "</p>"; }
        else list.slice((st.page - 1) * st.size, st.page * st.size).forEach(function (d) {
          var el = docItemEl(d, opts.onSelect ? function () {
            listEl.querySelectorAll(".doc-item").forEach(function (x) { x.classList.remove("is-active"); });
            el.classList.add("is-active"); opts.onSelect(d);
          } : null);
          if (opts.selectedId === d.id) el.classList.add("is-active");
          listEl.appendChild(el);
        });
        info.textContent = POS.s("cash.page") + " " + st.page + " " + POS.s("cash.of") + " " + pages;
        host.querySelector("#dlPrev").disabled = st.page <= 1;
        host.querySelector("#dlNext").disabled = st.page >= pages;
      }
      var si = host.querySelector("#dlSearch");
      si.addEventListener("focus", function () { POS.osk.open(); });
      si.addEventListener("input", function () { st.q = si.value; st.page = 1; render(); });
      host.querySelectorAll(".cd-size button").forEach(function (b) {
        b.addEventListener("click", function () { st.size = parseInt(b.dataset.size, 10); st.page = 1; host.querySelectorAll(".cd-size button").forEach(function (x) { x.removeAttribute("aria-pressed"); }); b.setAttribute("aria-pressed", "true"); render(); });
      });
      host.querySelector("#dlPrev").addEventListener("click", function () { if (st.page > 1) { st.page--; render(); } });
      host.querySelector("#dlNext").addEventListener("click", function () { st.page++; render(); });
      render();
    }
    function openDocuments() {
      var wrap = document.createElement("div"); wrap.className = "sheet cash-detail";
      wrap.innerHTML = "<h3>" + POS.s("act.documents") + '</h3><div class="dl-host" id="dlHost"></div>';
      renderDocList(wrap.querySelector("#dlHost"));
      POS.openDrawer(wrap, { label: POS.s("act.documents"), onClose: function () { POS.osk.close(); } });
    }

    var TAX_NAME = { 23: "tax.normal", 13: "tax.intermedia", 6: "tax.reduzida", 0: "tax.isento" };
    // preview do documento em blocos colapsáveis (Clientes/Artigos/Impostos/Pagamentos/Resumo) — no drawer
    function buildDocPreview(d, opts) {
      opts = opts || {};
      var cust = POS.customers.find(function (c) { return c.id === d.customerId; }) || POS.customers[0];
      var tot = (d.totals && d.totals.taxBreakdown) ? d.totals : POS.docTotals(d.lines || []);
      function acc(id, titleKey, bodyHtml, open) {
        return '<section class="acc' + (open ? " is-open" : "") + '" data-acc="' + id + '">' +
          '<button class="acc__hd" type="button" aria-expanded="' + (open ? "true" : "false") + '">' +
            ic("chevron-down", { size: 20 }) + "<span>" + POS.s(titleKey) + "</span></button>" +
          '<div class="acc__bd">' + bodyHtml + "</div></section>";
      }
      // Clientes
      var clientHtml = '<div class="kv"><span>' + POS.s("doc.client") + '</span><span>' + POS.t(cust.name) + "</span></div>" +
        '<div class="kv"><span>' + POS.s("doc.nif") + '</span><span>' + (d.nif || cust.nif || "—") + "</span></div>";
      // Artigos — 4 colunas (Designação/Qt/PVP/Total); IVA e Desc na sub-linha (cabe no drawer)
      var artRows = (d.lines || []).map(function (l) {
        var p = POS.getProduct(l.productId); var rate = p ? POS.getTax(p.tax).rate : 0;
        var gross = Math.round(l.qty * l.unitPriceCents);
        if (l.discount) gross -= l.discount.type === "pct" ? Math.round(gross * Math.min(100, l.discount.value) / 100) : Math.min(gross, Math.round(l.discount.value));
        var meta = POS.s("doc.vatLetter") + " " + rate + "%" + (l.discount ? " · " + POS.s("doc.disc") + " " + (l.discount.type === "pct" ? l.discount.value + "%" : POS.money(l.discount.value)) : "");
        return '<tr><td><div class="doc-dname">' + (p ? POS.t(p.name) : "—") + '</div><div class="doc-dmeta">' + meta + "</div></td>" +
          '<td class="r">' + l.qty + '</td><td class="r">' + POS.money(l.unitPriceCents) + '</td><td class="r">' + POS.money(gross) + "</td></tr>";
      }).join("");
      var artHtml = '<table class="doc-tbl"><thead><tr><th>' + POS.s("doc.designation") + '</th><th class="r">' + POS.s("doc.qty") +
        '</th><th class="r">' + POS.s("doc.pvpUnit") + '</th><th class="r">' + POS.s("doc.lineTotal") + "</th></tr></thead><tbody>" + artRows + "</tbody></table>";
      // Impostos
      var taxRows = tot.taxBreakdown.map(function (g) {
        return "<tr><td>" + POS.s(TAX_NAME[g.rate] || "tax.normal") + " (" + g.rate + '%)</td><td class="r">' + POS.money(g.base) + '</td><td class="r">' + POS.money(g.tax) + "</td></tr>";
      }).join("");
      var taxHtml = '<table class="doc-tbl"><thead><tr><th>' + POS.s("doc.vatLetter") + '</th><th class="r">' + POS.s("doc.taxBase") +
        '</th><th class="r">' + POS.s("doc.taxAmount") + "</th></tr></thead><tbody>" + taxRows + "</tbody></table>";
      // Pagamentos
      var payHtml = (d.payments || [{ method: "cash", amountCents: tot.totalCents }]).map(function (p) {
        return '<div class="kv"><span>' + (POS.s("pay.method." + p.method) === "pay.method." + p.method ? p.method : POS.s("pay.method." + p.method)) + '</span><span class="num">' + POS.money(p.amountCents) + "</span></div>";
      }).join("") + (d.changeCents ? '<div class="kv"><span>' + POS.s("doc.change") + '</span><span class="num">' + POS.money(d.changeCents) + "</span></div>" : "");
      // Resumo
      var net = tot.taxBreakdown.reduce(function (n, g) { return n + g.base; }, 0);
      // Resumo colapsável SÓ com líquido + IVA; o Valor Total fica fixo (sempre visível)
      var sumHtml = '<div class="kv"><span>' + POS.s("doc.netTotal") + '</span><span class="num">' + POS.money(net) + "</span></div>" +
        tot.taxBreakdown.map(function (g) { return '<div class="kv"><span>' + POS.s(TAX_NAME[g.rate] || "tax.normal") + '</span><span class="num">' + POS.money(g.tax) + "</span></div>"; }).join("");

      var wrap = document.createElement("div"); wrap.className = "docsum" + (opts.inline ? " docsum--inline" : "");
      var isNC = (d.type || d.docType) === "creditNote";
      wrap.innerHTML =
        '<div class="docsum__head"><h3>' + POS.s("doc.summaryOf") + " " + POS.docLabel(d) + "</h3>" +
          '<div class="docsum__sub">' + POS.s("doc.contributor") + ": " + POS.t(cust.name) + "</div>" +
          (isNC && d.relatedLabel ? '<div class="docsum__sub">' + POS.s("nc.origin") + ": " + d.relatedLabel + (d.reason ? " · " + POS.s("nc.reason") + ": " + d.reason : "") + "</div>" : "") + "</div>" +
        '<div class="docsum__body"></div>' +
        '<div class="docsum__total"><span>' + POS.s("doc.grandTotal") + '</span><span class="num">' + POS.money(tot.totalCents) + "</span></div>" +
        '<div class="docsum__foot">' +
          '<button class="btn btn--primary docsum__primary" data-a="talao">' + ic("printer", { size: 18 }) + " " + POS.s("doc.saleReceipt") + "</button>" +
          '<div class="docsum__sec">' +
            '<button class="btn docsum__secbtn" data-a="pdf">' + ic("printer", { size: 20 }) + "<span>" + POS.s("doc.printPdf") + "</span></button>" +
            '<button class="btn docsum__secbtn" data-a="email">' + ic("mail", { size: 20 }) + "<span>" + POS.s("doc.email") + "</span></button>" +
            '<button class="btn docsum__secbtn" data-a="gift">' + ic("ticket", { size: 20 }) + "<span>" + POS.s("doc.giftReceipt") + "</span></button>" +
          "</div>" +
          (POS.canCreditNote(d) ? '<button class="btn btn--block docsum__nc" data-a="nc">' + ic("corner-up-left", { size: 18 }) + " " + POS.s("doc.toNc") + "</button>" : "") +
        "</div>";
      // monta os blocos na ordem pedida
      var body = wrap.querySelector(".docsum__body");
      body.innerHTML = acc("clients", "doc.clientsBlock", clientHtml, false) +
        acc("items", "doc.items", artHtml, true) +   // por defeito só Artigos aberto
        acc("taxes", "doc.taxes", taxHtml, false) +
        acc("pay", "doc.payment", payHtml, false) +
        acc("summary", "doc.summaryBlock", sumHtml, false);
      body.querySelectorAll(".acc__hd").forEach(function (h) {
        h.addEventListener("click", function () { var sec = h.parentNode; var on = sec.classList.toggle("is-open"); h.setAttribute("aria-expanded", on ? "true" : "false"); });
      });
      wrap.querySelector('[data-a="pdf"]').addEventListener("click", function () { POS.printDoc(d, { format: "a4" }); });
      wrap.querySelector('[data-a="gift"]').addEventListener("click", function () {
        POS.openModal(buildGiftEditor(d, function (filtered) {
          POS.printDoc(filtered, { format: "oferta" });
          POS.toast(POS.s("doc.giftPrinted"), { duration: 1500 });
        }), { label: POS.s("doc.giftReceipt") });
      });
      wrap.querySelector('[data-a="talao"]').addEventListener("click", function () { POS.printDoc(d, { format: "talao" }); POS.toast(POS.s("doc.printed"), { variant: "success", duration: 1500 }); });
      wrap.querySelector('[data-a="email"]').addEventListener("click", function () { emailDoc(d); });
      var ncBtn = wrap.querySelector('[data-a="nc"]');
      if (ncBtn) ncBtn.addEventListener("click", function () { convertToNC(d); });
      return wrap;
    }
    // Converter para Nota de Crédito — exige permissão (creditNote), depois motivo + confirmação
    function convertToNC(d) { requirePermission("creditNote", function () { ncDialog(d); }); }
    function ncDialog(d) {
      var reason = "";
      var REASONS = ["nc.reason.return", "nc.reason.cancel", "nc.reason.error"];
      var wrap = document.createElement("div"); wrap.className = "sheet";
      wrap.innerHTML = "<h3>" + POS.s("nc.title") + "</h3>" +
        "<div class='sheet__sub'>" + POS.s("nc.hint") + " · " + POS.s("nc.origin") + ": " + POS.docLabel(d) + "</div>" +
        '<div class="nc-reasons">' + REASONS.map(function (r) { return '<button class="nc-chip" type="button" data-r="' + r + '">' + POS.s(r) + "</button>"; }).join("") + "</div>" +
        '<label class="ff" style="margin-top:var(--sp-3)"><span>' + POS.s("nc.reason") + '</span>' +
          '<textarea id="ncNote" class="ff__in" rows="2" style="height:auto;padding:10px 12px" placeholder="' + POS.s("nc.reasonPick") + '"></textarea></label>' +
        '<div class="sheet__foot"><button class="btn" data-k="cancel">' + POS.s("act.cancel") + "</button>" +
        '<button class="btn btn--danger-solid" data-k="ok" disabled>' + POS.s("nc.emit") + "</button></div>";
      var close = POS.openModal(wrap, { label: POS.s("nc.title"), noClose: true, onClose: function () { POS.osk.close(); } });
      var note = wrap.querySelector("#ncNote"), ok = wrap.querySelector('[data-k="ok"]');
      function sync() { reason = note.value.trim(); ok.disabled = !reason; }
      note.addEventListener("focus", function () { POS.osk.open(); });
      note.addEventListener("input", sync);
      wrap.querySelectorAll(".nc-chip").forEach(function (b) {
        b.addEventListener("click", function () {
          wrap.querySelectorAll(".nc-chip").forEach(function (x) { x.classList.remove("is-on"); });
          b.classList.add("is-on"); note.value = POS.s(b.dataset.r); sync();
        });
      });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", close);
      var emitting = false;
      ok.addEventListener("click", function () {
        if (emitting || !reason) return; emitting = true; ok.disabled = true; POS.osk.close();

    /* Editor de quantidades para o talão de oferta — reutilizado no pós-venda e no preview de documento */
    function buildGiftEditor(sale, onPrint) {
      var lineState = (sale.lines || []).map(function (l) {
        var p = POS.products.find(function (x) { return x.id === l.productId; });
        var name = p ? POS.t(p.name) : (l.productId || "—");
        return { key: l.key, name: name, maxQty: l.weighable ? null : (l.qty || 1), qty: l.weighable ? null : (l.qty || 1), weighable: !!l.weighable, weight: l.weight || 0, included: true, line: l };
      });

      var wrap = document.createElement("div");
      var hint = document.createElement("p"); hint.className = "gift-hint"; hint.textContent = POS.s("doc.giftEditorHint");
      var listEl = document.createElement("div"); listEl.className = "gift-lines";
      var printBtn = document.createElement("button"); printBtn.type = "button"; printBtn.className = "btn btn--primary btn--block"; printBtn.style.marginTop = "var(--sp-4)";
      printBtn.innerHTML = ic("printer", { size: 16 }) + " " + POS.s("doc.giftReceipt");
      wrap.appendChild(hint); wrap.appendChild(listEl); wrap.appendChild(printBtn);

      function syncBtn() { printBtn.disabled = !lineState.some(function (ls) { return ls.included; }); }

      function renderLines() {
        listEl.innerHTML = "";
        lineState.forEach(function (ls) {
          var row = document.createElement("div");
          row.className = "gift-line" + (ls.included ? "" : " gift-line--excluded");

          var chk = document.createElement("input"); chk.type = "checkbox"; chk.className = "gift-line__chk"; chk.checked = ls.included;
          chk.addEventListener("change", function () { ls.included = chk.checked; renderLines(); syncBtn(); });

          var nameEl = document.createElement("span"); nameEl.className = "gift-line__name"; nameEl.textContent = ls.name;

          row.appendChild(chk); row.appendChild(nameEl);

          if (ls.weighable) {
            var wEl = document.createElement("span"); wEl.className = "gift-line__weight"; wEl.textContent = ls.weight + " kg";
            row.appendChild(wEl);
          } else {
            var stepper = document.createElement("div"); stepper.className = "gift-stepper";

            var btnMinus = document.createElement("button"); btnMinus.type = "button"; btnMinus.className = "gift-stepper__btn";
            btnMinus.innerHTML = ic("minus", { size: 15 }); btnMinus.setAttribute("aria-label", "−");
            btnMinus.disabled = !ls.included || ls.qty <= 1;

            var qtyDisp = document.createElement("span"); qtyDisp.className = "gift-stepper__val"; qtyDisp.textContent = ls.qty;

            var btnPlus = document.createElement("button"); btnPlus.type = "button"; btnPlus.className = "gift-stepper__btn";
            btnPlus.innerHTML = ic("plus", { size: 15 }); btnPlus.setAttribute("aria-label", "+");
            btnPlus.disabled = !ls.included || ls.qty >= ls.maxQty;

            btnMinus.addEventListener("click", function () { if (ls.qty > 1) { ls.qty--; renderLines(); } });
            btnPlus.addEventListener("click", function () { if (ls.qty < ls.maxQty) { ls.qty++; renderLines(); } });

            stepper.appendChild(btnMinus); stepper.appendChild(qtyDisp); stepper.appendChild(btnPlus);

            row.appendChild(stepper);
          }
          listEl.appendChild(row);
        });
      }

      renderLines(); syncBtn();

      printBtn.addEventListener("click", function () {
        var filteredLines = lineState.filter(function (ls) { return ls.included; }).map(function (ls) {
          var l = Object.assign({}, ls.line);
          if (!ls.weighable) l.qty = ls.qty;
          return l;
        });
        onPrint(Object.assign({}, sale, { lines: filteredLines }));
      });

      return wrap;
    }

    function cashForm(kind, authorized) {

        requirePermission("cashInOut", function () { cashForm(kind, true); }); return;
      }
      var titleKey = kind === "open" ? "cash.open" : "cash." + kind;
      var hintKey = kind === "open" ? "cash.fundHint" : "cash." + kind + "Hint";
      var valLabelKey = kind === "open" ? "cash.fund" : "cash.value";
      // abertura: sugere o último fundo usado (confirmável a 1 toque)

      var wrap = document.createElement("div"); wrap.className = "sheet";
      wrap.innerHTML = "<h3>" + POS.s(titleKey) + "</h3><div class='sheet__sub'>" + POS.s(hintKey) + "</div>" +

        '<button class="btn btn--primary" data-k="ok">' + POS.s("cash.save") + "</button></div>";
      var close = POS.openModal(wrap, { label: POS.s(titleKey), onClose: function () { POS.osk.close(); } });
      var valBtn = wrap.querySelector("#cashVal");

      valBtn.addEventListener("click", function () {   // por defeito: valor simples (keypad)
        POS.keypad({ title: POS.s(valLabelKey), decimal: true, initial: valueCents ? valueCents / 100 : 0, maxInt: 6, maxDec: 2, suffix: "€",
          onConfirm: function (v) { setVal(Math.round(v * 100)); } });

    /* Contador por denominação (notas/moedas) — soma automática, devolve total + repartição */
    var DENOMS = [50000, 20000, 10000, 5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5, 2, 1];
    function denomCounter(o) {
      o = o || {};
      var counts = Object.assign({}, o.initial || {});
      function total() { return DENOMS.reduce(function (n, c) { return n + c * (counts[c] || 0); }, 0); }
      function rowHtml(c) {
        var q = counts[c] || 0;
        return '<div class="den-row" data-c="' + c + '">' +
          '<span class="den-face">' + POS.money(c) + "</span>" +
          '<div class="den-step"><button class="den-btn" data-act="dec" type="button" aria-label="−">' + ic("minus", { size: 18 }) + "</button>" +
            '<button class="den-qty" type="button" aria-label="' + POS.s("denom.qtyFor") + " " + POS.money(c) + '">' + q + "</button>" +
            '<button class="den-btn" data-act="inc" type="button" aria-label="+">' + ic("plus", { size: 18 }) + "</button></div>" +
          '<span class="den-sub num">' + POS.money(c * q) + "</span></div>";
      }
      var notes = DENOMS.filter(function (c) { return c >= 500; }).map(rowHtml).join("");
      var coins = DENOMS.filter(function (c) { return c < 500; }).map(rowHtml).join("");
      var wrap = document.createElement("div"); wrap.className = "sheet denom";
      wrap.innerHTML = "<h3>" + POS.s("denom.title") + "</h3>" +
        '<div class="den-scroll">' +
          '<div class="den-grouplbl">' + POS.s("denom.notes") + "</div><div class='den-grid'>" + notes + "</div>" +
          '<div class="den-grouplbl">' + POS.s("denom.coins") + "</div><div class='den-grid'>" + coins + "</div></div>" +
        '<div class="den-foot"><div class="den-total"><span>' + POS.s("denom.total") + '</span><b id="denTotal">' + POS.money(total()) + "</b></div>" +
          '<div class="sheet__foot" style="margin:0"><button class="btn" data-k="cancel">' + POS.s("act.cancel") + "</button>" +
          '<button class="btn" data-k="clear">' + POS.s("denom.clear") + "</button>" +
          '<button class="btn btn--primary" data-k="ok">' + POS.s("act.confirm") + "</button></div></div>";
      var close = POS.openModal(wrap, { label: POS.s("denom.title"), noClose: true });
      function refresh(c) {
        var row = wrap.querySelector('.den-row[data-c="' + c + '"]'); if (!row) return;
        var q = counts[c] || 0;
        row.querySelector(".den-qty").textContent = q;
        row.querySelector(".den-sub").textContent = POS.money(c * q);
        row.classList.toggle("is-set", q > 0);
        wrap.querySelector("#denTotal").textContent = POS.money(total());
      }
      wrap.querySelectorAll(".den-row").forEach(function (row) {
        var c = parseInt(row.dataset.c, 10);
        row.querySelector('[data-act="dec"]').addEventListener("click", function () { counts[c] = Math.max(0, (counts[c] || 0) - 1); refresh(c); });
        row.querySelector('[data-act="inc"]').addEventListener("click", function () { counts[c] = (counts[c] || 0) + 1; refresh(c); });
        row.querySelector(".den-qty").addEventListener("click", function () {
          POS.keypad({ title: POS.s("denom.qtyFor") + " " + POS.money(c), decimal: false, initial: counts[c] || 0, maxInt: 4,
            onConfirm: function (v) { counts[c] = Math.max(0, Math.round(v)); refresh(c); } });
        });
        refresh(c);
      });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", function () { close(); });   // sai sem registar contagem
      wrap.querySelector('[data-k="clear"]').addEventListener("click", function () { counts = {}; DENOMS.forEach(refresh); });
      wrap.querySelector('[data-k="ok"]').addEventListener("click", function () { close(); if (o.onConfirm) o.onConfirm(total(), Object.assign({}, counts)); });
      wrap.querySelector('[data-k="ok"]').focus();   // foco no CTA, não num stepper
    }

    /* Fecho CEGO: operador conta primeiro; esperado e divergência só se revelam na revisão */
    function cashClose() {
      if (!POS.cash.isOpen()) { POS.toast(POS.s("cash.notOpen"), { variant: "danger", duration: 1600 }); return; }
      var counted = null, reported = 0, countedBreakdown = null;

      var bC = wrap.querySelector("#ccCounted"), bK = wrap.querySelector("#ccCard"), review = wrap.querySelector('[data-k="review"]');
      function setCounted(c, breakdown) { counted = c; countedBreakdown = breakdown || null; bC.textContent = POS.money(counted); bC.classList.add("is-set"); review.disabled = false; }
      bC.addEventListener("click", function () {   // por defeito: valor simples (keypad)
        POS.keypad({ title: POS.s("cash.countedCash"), decimal: true, initial: counted != null ? counted / 100 : 0, maxInt: 7, maxDec: 2, suffix: "€",
          onConfirm: function (v) { setCounted(Math.round(v * 100), null); } });
      });
      wrap.querySelector("#ccDenom").addEventListener("click", function () {   // opcional: contar por denominação
        denomCounter({ initial: countedBreakdown, onConfirm: function (totalCents, counts) { setCounted(totalCents, counts); } });
