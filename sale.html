      bK.addEventListener("click", function () {
        POS.keypad({ title: POS.s("cash.reportedCard"), decimal: true, initial: reported / 100, maxInt: 7, maxDec: 2, suffix: "€",
          onConfirm: function (v) { reported = Math.round(v * 100); bK.textContent = POS.money(reported); } });
      });
      wrap.querySelector("#ccNote").addEventListener("focus", function () { POS.osk.open(); });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", close);
      review.addEventListener("click", function () {
        if (counted == null) return;
        POS.osk.close();
        cashCloseReview(counted, reported, wrap.querySelector("#ccNote").value.trim(), close, countedBreakdown);
      });
    }
    function methodLabel(m) { var k = "pay.method." + m; var v = POS.s(k); return v === k ? m : v; }
    // documento Z (recibo) — reutilizado na revisão do fecho, na pré-visualização e na reimpressão
    function buildZDoc(z, recon) {
      function row(label, val, cls) { return '<div class="z-row' + (cls ? " " + cls : "") + '"><span>' + label + '</span><span class="z-num">' + val + "</span></div>"; }
      function diffRow(label, diff) {
        var cls = diff === 0 ? "is-exact" : diff < 0 ? "is-short" : "is-over";
        var tag = diff === 0 ? POS.s("cash.exact") : (diff < 0 ? POS.s("cash.short") : POS.s("cash.over")) + " " + POS.money(Math.abs(diff));
        return '<div class="z-row ' + cls + '"><span>' + label + '</span><span class="z-num">' + tag + "</span></div>";
      }
      var methods = Object.keys(z.byMethod || {}).map(function (m) { return row(methodLabel(m), POS.money(z.byMethod[m])); }).join("") ||
        '<div class="z-row z-muted"><span>—</span><span></span></div>';
      var vat = (z.tax || []).map(function (g) {
        return '<div class="z-vat"><span>' + g.rate + "%</span><span>" + POS.money(g.base) + "</span><span>" + POS.money(g.tax) + "</span></div>";
      }).join("") || '<div class="z-vat z-muted"><span>—</span><span></span><span></span></div>';
      return '<div class="z-doc">' +
        '<div class="z-doc__head"><div class="z-doc__title">' + POS.s("z.title") + "</div>" +
          '<div class="z-doc__sub">' + POS.s("z.subtitle") + " · " + POS.s("z.terminal") + " " + z.terminalId + "</div></div>" +
        '<div class="z-doc__meta">' + POS.s("cash.operator") + ": " + (z.operator || "—") +
          " · " + POS.s("z.opening") + " " + (z.openTs ? cashTime(z.openTs) : "—") +
          " · " + POS.s("z.closing") + " " + cashTime(z.closeTs || Date.now()) + "</div>" +
        '<div class="z-sec">' + row(POS.s("z.sales"), z.salesCount, "z-row--big") + row(POS.s("z.gross"), POS.money(z.grossCents)) + "</div>" +
        '<div class="z-label">' + POS.s("z.byMethod") + "</div><div class='z-sec'>" + methods +
          (z.changeGiven || z.changeCents ? row(POS.s("z.changeGiven"), "−" + POS.money(z.changeCents || 0)) : "") + "</div>" +
        '<div class="z-label">' + POS.s("z.movements") + "</div><div class='z-sec'>" +
          row(POS.s("cash.fundDay"), POS.money(z.fundo)) + row(POS.s("cash.movIn"), POS.money(z.ins)) + row(POS.s("cash.movOut"), "−" + POS.money(z.outs)) + "</div>" +
        '<div class="z-label">' + POS.s("z.vat") + '</div><div class="z-vat z-vat--head"><span>' + POS.s("z.vatRate") + "</span><span>" + POS.s("z.vatBase") + "</span><span>" + POS.s("z.vatAmount") + "</span></div>" +
          '<div class="z-sec">' + vat + "</div>" +
        (recon ? '<div class="z-label">' + POS.s("z.reconcile") + "</div><div class='z-sec'>" +
          row(POS.s("cash.expectedCash"), POS.money(recon.expectedCash)) + row(POS.s("cash.countedCash"), POS.money(recon.countedCash)) + diffRow(POS.s("cash.diffCash"), recon.diffCash) +
          '<div class="cc-sep"></div>' +
          row(POS.s("cash.expectedCard"), POS.money(recon.expectedCard)) + row(POS.s("cash.reportedCard"), POS.money(recon.reportedCard)) + diffRow(POS.s("cash.diffCard"), recon.diffCard) + "</div>" : "") +
        '<div class="z-doc__foot">' + POS.s("z.certified") + "</div></div>";
    }
    function reconFrom(snap) {
      return { expectedCash: snap.expectedCash, countedCash: snap.countedCash, diffCash: snap.diffCash,
        expectedCard: snap.expectedCard, reportedCard: snap.reportedCard, diffCard: snap.diffCard };
    }
    function openZPreview(z, recon) {
      var wrap = document.createElement("div"); wrap.className = "sheet z-preview";
      wrap.innerHTML = buildZDoc(z, recon) +
        '<div class="sheet__foot"><button class="btn btn--primary btn--block" data-k="print">' + ic("printer", { size: 18 }) + " " + POS.s("z.print") + "</button></div>";
      var close = POS.openModal(wrap, { label: POS.s("z.title") });
      wrap.querySelector('[data-k="print"]').addEventListener("click", function () { doPrintZ(z, recon); });
    }
    function doPrintZ(z, recon) {
      var host = $(".z-print"); if (host) host.remove();
      host = document.createElement("div"); host.className = "z-print"; host.innerHTML = buildZDoc(z, recon);
      document.body.appendChild(host);
      function cleanup() { if (host && host.parentNode) host.remove(); window.removeEventListener("afterprint", cleanup); }
      window.addEventListener("afterprint", cleanup);
      try { window.print(); } catch (e) {}
      setTimeout(cleanup, 1000);   // fallback (alguns browsers não disparam afterprint)
    }

    // passo de revisão (mini-Z): resumo do turno + reconciliação, com confirmação irreversível
    function cashCloseReview(counted, reported, note, closePrev, countedBreakdown) {
      var exp = POS.cash.expected();
      var z = POS.cash.zReport(); z.changeGiven = z.changeCents;
      var recon = { expectedCash: exp.cash, countedCash: counted, diffCash: counted - exp.cash,
        expectedCard: exp.card, reportedCard: reported, diffCard: reported - exp.card };
      // divergência elevada (dinheiro ou cartão > 10€) exige justificação antes de fechar
      var bigDiff = Math.abs(recon.diffCash) > 1000 || Math.abs(recon.diffCard) > 1000;
      var w = document.createElement("div"); w.className = "sheet z-review";
      w.innerHTML = "<h3>" + POS.s("cash.close") + "</h3><div class='sheet__sub'>" + POS.s("cash.reviewClose") + "</div>" +
        buildZDoc(z, recon) +
        (bigDiff ? '<div class="cc-warn">' + ic("alert-circle", { size: 18 }) + " " + POS.s("cash.bigDiff") + "</div>" +
          '<label class="ff"><span>' + POS.s("cash.notes") + '</span><textarea id="ccJustify" class="ff__in" rows="2" style="height:auto;padding:10px 12px">' + (note || "") + "</textarea></label>" : "") +
        '<div class="sheet__foot"><button class="btn" data-k="back">' + POS.s("act.cancel") + "</button>" +
        '<button class="btn" data-k="print">' + ic("printer", { size: 18 }) + " " + POS.s("z.print") + "</button>" +
        '<button class="btn btn--danger-solid" data-k="confirm"' + (bigDiff ? " disabled" : "") + ">" + POS.s("cash.confirmClose") + "</button></div>";
      var close = POS.openModal(w, { label: POS.s("cash.close"), noClose: true });
      w.querySelector('[data-k="back"]').addEventListener("click", function () { close(); });
      w.querySelector('[data-k="print"]').addEventListener("click", function () { doPrintZ(z, recon); });
      var confirmBtn = w.querySelector('[data-k="confirm"]'), justify = w.querySelector("#ccJustify");
      if (justify) {
        justify.addEventListener("focus", function () { POS.osk.open(); });
        justify.addEventListener("input", function () { confirmBtn.disabled = !justify.value.trim(); });
      }
      var committing = false;
      confirmBtn.addEventListener("click", function () {
        if (committing) return;
        var finalNote = justify ? justify.value.trim() : note;
        if (bigDiff && !finalNote) { POS.toast(POS.s("cash.bigDiff"), { variant: "danger", duration: 2000 }); return; }
        committing = true; this.disabled = true; POS.osk.close();   // anti-duplo-toque (fecho é irreversível)
        POS.cash.close({ countedCash: counted, reportedCard: reported, note: finalNote, countedBreakdown: countedBreakdown });
        close(); closePrev(); afterCashChange();
        POS.toast(POS.s("cash.closed"), { variant: "success", duration: 1800 });
      });
    }

    /* Consultar — Resumo: estado do turno num relance */
    function cashSummary() {
      var s = POS.cash.summary();
      var wrap = document.createElement("div"); wrap.className = "sheet";
      function row(labelKey, val, strong, txt) { return '<div class="cc-row' + (strong ? " is-strong" : "") + '"><span>' + POS.s(labelKey) + '</span><span class="num">' + (txt != null ? txt : POS.money(val)) + "</span></div>"; }
      var body = s.open
        ? '<div class="cc-table">' + row("cash.fundDay", s.fundo) + row("cash.salesCash", s.salesCash) + row("cash.movIn", s.ins) + row("cash.movOut", 0, false, "−" + POS.money(s.outs)) +
            '<div class="cc-sep"></div>' + row("cash.expectedCash", s.expectedCash, true) +
            '<div class="cc-sep"></div>' + row("cash.expectedCard", s.salesCard) + '<div class="cc-row"><span>' + POS.s("cash.salesCount") + '</span><span class="num">' + s.salesCount + "</span></div></div>"
        : '<p class="muted" style="padding:16px;text-align:center">' + POS.s("cash.statusClosed") + "</p>";
      wrap.innerHTML = "<h3>" + POS.s("cash.summary") + "</h3>" +
        '<div class="cash-status ' + (s.open ? "is-open" : "") + '"><span>' + POS.s(s.open ? "cash.statusOpen" : "cash.statusClosed") + "</span></div>" + body;
      POS.openModal(wrap, { label: POS.s("cash.summary") });
    }

    /* Consultar — Detalhado: lista completa, recentes em cima, paginada + pesquisa (drawer) */
    function cashDetailed() {
      var all = POS.cash.movements().slice().reverse();
      var st = { q: "", size: 25, page: 1 };
      var wrap = document.createElement("div"); wrap.className = "sheet cash-detail";
      wrap.innerHTML = "<h3>" + POS.s("cash.detailed") + "</h3>" +
        '<div class="cd-search"><input id="cdSearch" type="search" autocomplete="off" placeholder="' + POS.s("cash.search") + '" aria-label="' + POS.s("cash.search") + '" /></div>' +
        '<div class="cd-list" id="cdList"></div>' +
        '<div class="cd-foot"><div class="seg cd-size" role="group" aria-label="' + POS.s("cash.perPage") + '">' +
          [10, 25, 50].map(function (n) { return '<button type="button" data-size="' + n + '"' + (n === 25 ? ' aria-pressed="true"' : "") + ">" + n + "</button>"; }).join("") + "</div>" +
          '<div class="cd-pager"><button class="cd-nav" id="cdPrev" type="button" aria-label="' + POS.s("cash.prevPage") + '">' + ic("chevron-left", { size: 20 }) + "</button>" +
          '<span class="cd-pginfo" id="cdInfo"></span>' +
          '<button class="cd-nav" id="cdNext" type="button" aria-label="' + POS.s("cash.nextPage") + '">' + ic("chevron-right", { size: 20 }) + "</button></div></div>";
      POS.openDrawer(wrap, { label: POS.s("cash.detailed"), onClose: function () { POS.osk.close(); } });
      var listEl = wrap.querySelector("#cdList"), info = wrap.querySelector("#cdInfo");
      function filtered() {
        var q = st.q.trim().toLowerCase(); if (!q) return all;
        return all.filter(function (m) {
          var hay = (POS.s(CASH_LABELS[m.type]) + " " + (m.note || "") + " " + (m.operator || "") + " " + POS.money(m.amount)).toLowerCase();
          return hay.indexOf(q) >= 0;
        });
      }
      function render() {
        var list = filtered();
        var pages = Math.max(1, Math.ceil(list.length / st.size));
        if (st.page > pages) st.page = pages;
        var slice = list.slice((st.page - 1) * st.size, st.page * st.size);
        if (!list.length) {
          listEl.innerHTML = '<p class="muted" style="padding:24px;text-align:center">' + POS.s(st.q ? "cash.noSearch" : "cash.noMov") + "</p>";
        } else {
          listEl.innerHTML = slice.map(function (m) {
            var extra = m.type === "close" && m.diffCash !== 0
              ? ' · ' + (m.diffCash < 0 ? POS.s("cash.short") : POS.s("cash.over")) + " " + POS.money(Math.abs(m.diffCash)) : "";
            var zBtn = m.type === "close" && m.z ? '<button class="cd-z" type="button" data-zid="' + m.id + '">' + ic("file-text", { size: 16 }) + " " + POS.s("z.viewZ") + "</button>" : "";
            return '<div class="cd-item"><div class="cd-main"><div class="cd-type">' + POS.s(CASH_LABELS[m.type]) + "</div>" +
              '<div class="cd-meta">' + cashTime(m.ts, true) + " · " + (m.operator || "—") + (m.note ? " · " + m.note : "") + extra + "</div>" + zBtn + "</div>" +
              '<span class="cd-amt ' + (m.type === "out" ? "is-neg" : "") + '">' + cashSign(m.type) + POS.money(m.amount) + "</span></div>";
          }).join("");
          listEl.querySelectorAll(".cd-z").forEach(function (b) {
            b.addEventListener("click", function () {
              var m = all.find(function (x) { return x.id === b.dataset.zid; });
              if (m && m.z) openZPreview(m.z, reconFrom(m));
            });
          });
        }
        info.textContent = POS.s("cash.page") + " " + st.page + " " + POS.s("cash.of") + " " + pages;
        wrap.querySelector("#cdPrev").disabled = st.page <= 1;
        wrap.querySelector("#cdNext").disabled = st.page >= pages;
      }
      var si = wrap.querySelector("#cdSearch");
      si.addEventListener("focus", function () { POS.osk.open(); });
      si.addEventListener("input", function () { st.q = si.value; st.page = 1; render(); });
      wrap.querySelectorAll(".cd-size button").forEach(function (b) {
        b.addEventListener("click", function () {
          st.size = parseInt(b.dataset.size, 10); st.page = 1;
          wrap.querySelectorAll(".cd-size button").forEach(function (x) { x.removeAttribute("aria-pressed"); });
          b.setAttribute("aria-pressed", "true"); render();
        });
      });
      wrap.querySelector("#cdPrev").addEventListener("click", function () { if (st.page > 1) { st.page--; render(); } });
      wrap.querySelector("#cdNext").addEventListener("click", function () { st.page++; render(); });
      render();
    }

    function openLineMenu(l) {
      var p = POS.getProduct(l.productId);
      var wrap = document.createElement("div"); wrap.className = "menu";
      wrap.innerHTML =
        '<button class="menu__item" data-a="disc">' + ic("percent", { size: 20 }) + "<span>" + POS.s("cart.discountLine") + "</span></button>" +
        '<button class="menu__item" data-a="qty">' + ic("tag", { size: 20 }) + "<span>" + POS.s("kp.qtyFor") + "</span></button>" +
        '<button class="menu__item" data-a="info">' + ic("info", { size: 20 }) + "<span>" + POS.s("cat.details") + "</span></button>" +
        '<button class="menu__item danger" data-a="del">' + ic("trash", { size: 20 }) + "<span>" + POS.s("cart.remove") + "</span></button>";
      var close = POS.openModal(wrap, { label: POS.t(p.name) });

    function confirmClear() {
      if (!cart.lines.length) return;
      // anular uma venda com artigos exige permissão (voidSale)
      if (!POS.policy.can(POS.terminal().operatorId, "voidSale")) { requirePermission("voidSale", confirmClearGo); return; }
      confirmClearGo();
    }
    function confirmClearGo() {
      var wrap = document.createElement("div"); wrap.className = "sheet";
      wrap.innerHTML = "<h3>" + POS.s("cart.clearConfirm") + "</h3><div class='sheet__sub'>" + POS.s("cart.clearBody") + "</div>" +
        '<div class="sheet__foot"><button class="btn" data-k="no">' + POS.s("act.cancel") + "</button>" +
        '<button class="btn btn--danger-solid" data-k="yes">' + POS.s("cart.clear") + "</button></div>";
      var close = POS.openModal(wrap, { label: POS.s("cart.clearConfirm") });
      wrap.querySelector('[data-k="no"]').addEventListener("click", close);
      wrap.querySelector('[data-k="yes"]').addEventListener("click", function () { close(); cart.clear(); POS.toast(POS.s("cart.cleared"), { variant: "danger" }); });
    }

    /* quantidade / peso via keypad partilhado (POS.keypad, com validação) */
    function openQty(l) {
      var p = POS.getProduct(l.productId);
      POS.keypad({ title: POS.t(p.name), sub: l.weighable ? POS.s("kp.weightFor") : POS.s("kp.qtyFor"),
        decimal: l.weighable, initial: l.qty, maxInt: l.weighable ? 3 : 4, maxDec: 3, suffix: l.weighable ? "kg" : "",
        onConfirm: function (v) { if (v > 0) cart.setQty(l.key, v); else cart.remove(l.key); } });
    }
    function openWeight(p, srcEl) {
      POS.keypad({ title: POS.t(p.name), sub: POS.s("kp.weightFor") + " · " + POS.money(p.priceCents) + "/kg",
        decimal: true, initial: 0, maxInt: 3, maxDec: 3, suffix: "kg",
        onConfirm: function (v) { if (v > 0) { flyToCart(srcEl); var k = cart.add(p.id, { qty: v }); selectedLine = k; } } });
    }

    /* Teclado de desconto reutilizável (%/€). onApply(d) — d:{type,value} (value: cêntimos p/ abs, % p/ pct) ou null p/ remover */
    function discountKeypad(o) {
      var mode = "pct", buf = "", dec = POS.lang === "pt" ? "," : ".";
      var wrap = document.createElement("div"); wrap.className = "sheet";
      wrap.innerHTML = "<h3>" + o.title + "</h3><div class='sheet__sub'>" + o.sub + "</div>" + (o.topHtml || "") +
        '<div class="seg" id="dMode"><button type="button" data-m="pct" aria-pressed="true">%</button><button type="button" data-m="abs" aria-pressed="false">€</button></div>' +
        '<div class="kp-display"><span class="sheet__display" id="dDisp">0</span><button class="kp-clear" type="button" data-k="clear">' + POS.s("kp.clear") + "</button></div>" +
        '<div class="keypad" id="dPad"></div>' +
        '<div class="sheet__foot"><button class="btn" data-k="cancel">' + POS.s("act.cancel") + "</button>" +
        '<button class="btn btn--primary" data-k="ok">' + POS.s("act.apply") + "</button></div>";
      var disp = wrap.querySelector("#dDisp");
      function draw() { disp.textContent = (buf || "0").replace(".", dec) + (mode === "pct" ? " %" : " €"); }
      ["1","2","3","4","5","6","7","8","9","dot","0","back"].forEach(function (k) {
        var b = document.createElement("button"); b.type = "button";
        if (k === "back") { b.className = "key-back"; b.setAttribute("aria-label", POS.s("kp.back")); b.innerHTML = ic("backspace", { size: 24 }); }
        else if (k === "dot") b.textContent = dec;
        else b.textContent = k;
        b.addEventListener("click", function () {
          if (k === "back") buf = buf.slice(0, -1);
          else if (k === "dot") { if (mode === "abs" && buf.indexOf(".") < 0) buf = (buf || "0") + "."; }
          else { var next = buf + k; if (mode === "pct" && parseFloat(next) > 100) next = "100"; if (next.length <= 7) buf = next; }
          draw();
        });
        wrap.querySelector("#dPad").appendChild(b);
      });
      wrap.querySelector('[data-k="clear"]').addEventListener("click", function () { buf = ""; draw(); });
      wrap.querySelectorAll("#dMode button").forEach(function (b) {
        b.addEventListener("click", function () { mode = b.dataset.m; if (mode === "pct" && buf.indexOf(".") >= 0) buf = buf.split(".")[0]; wrap.querySelectorAll("#dMode button").forEach(function (x) { x.setAttribute("aria-pressed", String(x === b)); }); draw(); });
      });
      draw();
      var close = POS.openModal(wrap, { label: o.title });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", close);
      wrap.querySelector('[data-k="ok"]').addEventListener("click", function () {
        var v = parseFloat(buf || "0"); close();
        var d = v > 0 ? { type: mode, value: mode === "abs" ? Math.round(v * 100) : Math.min(100, v) } : null;
        // teto de desconto do operador: % acima do limite exige PIN de supervisor
        if (d && d.type === "pct" && d.value > POS.policy.get("discountMaxPct")) {
          requireTier("supervisor", function () { o.onApply(d); }, "auth.discount");
        } else { o.onApply(d); }
      });
    }

    function openDiscount(lineKey) { // desconto numa linha específica (menu da linha)
      var l = cart.lines.find(function (x) { return x.key === lineKey; }); if (!l) return;
      var p = POS.getProduct(l.productId);
      discountKeypad({ title: POS.s("cart.discountLine"), sub: POS.t(p.name), onApply: function (d) { cart.setLineDiscount(l.key, d); } });
    }

    // Desconto ao nível do DOCUMENTO (sem linha selecionada): escolher tipo primeiro
    function openDiscountChooser() {
      if (!cart.lines.length) { POS.toast(POS.s("cart.empty.title"), { duration: 1400 }); return; }
      var wrap = document.createElement("div"); wrap.className = "sheet";
      wrap.innerHTML = "<h3>" + POS.s("tot.discount") + "</h3>" +
        '<div class="disc-choose">' +
          '<button class="disc-opt" type="button" data-c="global"><span class="disc-opt__ic">' + ic("percent", { size: 24 }) + "</span><b>" + POS.s("disc.globalTitle2") + "</b></button>" +
          '<button class="disc-opt" type="button" data-c="voucher"><span class="disc-opt__ic">' + ic("tag", { size: 24 }) + "</span><b>" + POS.s("disc.voucher") + "</b></button>" +
        "</div>";
      var close = POS.openModal(wrap, { label: POS.s("tot.discount") });
      wrap.querySelector('[data-c="global"]').addEventListener("click", function () { close(); openGlobalDiscount(); });
      wrap.querySelector('[data-c="voucher"]').addEventListener("click", function () { close(); openVoucherEntry(); });
    }
    function openGlobalDiscount() {
      var t = cart.totals();
      discountKeypad({
        title: POS.s("disc.globalTitle"), sub: POS.s("disc.globalSub"),
        topHtml: '<div class="disc-total"><span>' + POS.s("disc.docValue") + '</span><b class="num">' + POS.money(t.totalCents + t.discountCents) + "</b></div>",
        onApply: function (d) { cart.setDiscount(d); POS.toast(POS.s(d ? "disc.applied" : "disc.removed"), { variant: "success", duration: 1400 }); },
      });

    function openPerArticleDiscount() {
      discountKeypad({
        title: POS.s("disc.perArticleTitle"), sub: POS.s("disc.perArticleSub"),
        onApply: function (d) { cart.applyDiscountToAllLines(d); POS.toast(POS.s(d ? "disc.applied" : "disc.removed"), { variant: "success", duration: 1400 }); },
      });
    }

    function openVoucherEntry() {
      var wrap = document.createElement("div"); wrap.className = "sheet";
      var applied = cart.state.vouchers || [];
      var listHtml = applied.length
        ? applied.map(function (v) {
            var val = v.type === "pct" ? ("−" + v.value + "%") : ("−" + POS.money(v.valueCents));
            return '<div class="voucher-row">' +
              '<div class="voucher-row__info"><b class="voucher-row__code">' + v.code + '</b>' +
              '<span class="voucher-row__label">' + POS.t(v.label) + ' · <b class="num">' + val + '</b></span></div>' +
              '<button class="voucher-row__del" type="button" data-code="' + v.code + '" aria-label="Remover">' + ic("x", { size: 16 }) + '</button>' +
            '</div>';
          }).join("")
        : '<p class="muted" style="font-size:var(--fs-sm);padding:var(--sp-2) 0">' + POS.s("disc.noVouchers") + '</p>';

      var hintsHtml = (POS.vouchers || []).map(function (v) {
        var val = v.type === "pct" ? (v.value + "% desconto") : (POS.money(v.valueCents) + " desconto");
        return '<div class="voucher-hint__row" data-hint-code="' + v.code + '" role="button" tabindex="0" title="Clica para preencher">' +
          '<b class="voucher-hint__code">' + v.code + '</b>' +
          '<span class="voucher-hint__val">' + val + '</span>' +
        '</div>';
      }).join("");

      wrap.innerHTML =
        "<h3>" + POS.s("disc.voucher") + "</h3>" +
        '<div style="padding:0 var(--sp-5) var(--sp-3)">' +
          '<div style="display:flex;gap:var(--sp-2);margin-bottom:var(--sp-3)">' +
            '<input id="voucherInput" class="ff__in" type="text" placeholder="' + POS.s("disc.voucherCode") + '" style="flex:1;text-transform:uppercase;letter-spacing:.05em" autocomplete="off" autocorrect="off" spellcheck="false">' +
            '<button class="btn btn--primary" id="voucherApply" type="button">' + POS.s("act.apply") + '</button>' +
          '</div>' +
          '<div id="voucherList">' + listHtml + '</div>' +
          (hintsHtml ? '<div class="voucher-hints"><div class="voucher-hints__label">Códigos de teste <span class="voucher-hints__badge">DEV</span></div>' + hintsHtml + '</div>' : '') +
        '</div>';

      var close = POS.openModal(wrap, { label: POS.s("disc.voucher") });

      var input = wrap.querySelector("#voucherInput");
      var applyBtn = wrap.querySelector("#voucherApply");

      function doApply() {
        var code = input.value.trim().toUpperCase();
        if (!code) return;
        var res = cart.addVoucher(code);
        if (res === "ok") {
          POS.toast(POS.s("disc.voucherApplied"), { variant: "success", duration: 1600 });
          close();
          openVoucherEntry();
        } else if (res === "duplicate") {
          POS.toast(POS.s("disc.voucherDuplicate"), { variant: "warn", duration: 2000 });
          input.select();
        } else {
          POS.toast(POS.s("disc.voucherInvalid"), { variant: "danger", duration: 2000 });
          input.select();
        }
      }
      applyBtn.addEventListener("click", doApply);
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") doApply(); });

      wrap.querySelectorAll(".voucher-row__del").forEach(function (btn) {
        btn.addEventListener("click", function () {
          cart.removeVoucher(btn.dataset.code);
          close();
          openVoucherEntry();
        });

    /* ---------- Animação ghost (artigo voa para o talão) ---------- */
    function flyToCart(srcEl) {
      if (!srcEl || (window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches)) return;
      var media = srcEl.querySelector ? (srcEl.querySelector(".tile__media") || srcEl) : srcEl;
      var src = media.getBoundingClientRect();
      var dstEl = document.querySelector(".cart__head") || document.querySelector(".pay"); if (!dstEl) return;
      var dst = dstEl.getBoundingClientRect();
      var ghost = media.cloneNode(true); ghost.className = "fly-ghost";
      ghost.style.cssText = "position:fixed;left:" + src.left + "px;top:" + src.top + "px;width:" + src.width + "px;height:" + src.height + "px;margin:0;z-index:200;pointer-events:none;border-radius:14px;overflow:hidden;box-shadow:var(--sh-lg)";
      document.body.appendChild(ghost);
      var dx = (dst.left + dst.width / 2) - (src.left + src.width / 2);
      var dy = (dst.top + 24) - src.top;
      var anim = ghost.animate(
        [{ transform: "translate(0,0) scale(1)", opacity: 1 }, { transform: "translate(" + dx + "px," + dy + "px) scale(.18)", opacity: .25 }],
        { duration: 420, easing: "cubic-bezier(.5,0,.4,1)" });
      anim.onfinish = function () { ghost.remove(); };
    }

      rz.addEventListener("pointermove", function (e) { if (!dragging) return; var opsRect = $("#ops").getBoundingClientRect(); setW(e.clientX - opsRect.left); });
      rz.addEventListener("pointerup", function () { dragging = false; });

    /* ---------- Ecrã de bloqueio do terminal ---------- */
    var MOLONI_MARK = '<svg viewBox="0 0 500 500" fill="currentColor" aria-hidden="true" focusable="false">' +
      '<path d="M493.6 394.7v94.34H159.58C74.62 489.04 5.5 419.92 5.5 334.96V95.46h94.34v239.49c0 32.95 26.79 59.75 59.75 59.75H493.6Z"/>' +

    function lockTerminal() {
      if (document.querySelector(".lockscreen")) return;
      try { localStorage.setItem("pos_locked", "1"); } catch (e) {}
      var target = currentOp(), pin = "", fromId = currentOp().id;

        var box = node.querySelector("#lkStars"), html = "";
        for (var i = 0; i < 46; i++) {
          var sz = (Math.random() * 2.4 + 1).toFixed(1);
          var dur = (Math.random() * 5 + 4).toFixed(1), del = (-Math.random() * 8).toFixed(1);

      function shell() {

            '<div class="lock-pinhint">' + POS.s("lock.enterPin") + "</div>" +
            '<div class="lk-dots" id="lkDots">' + dots() + "</div>" +
            '<div class="lk-pad" id="lkPad"></div>' +
            '<button class="lk-switch" id="lkSwitch" type="button">' + ic("repeat", { size: 16 }) + " " + POS.s("lock.switch") + "</button>" +
          "</div>";
        var pad = node.querySelector("#lkPad");
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "blank", "0", "back"].forEach(function (k) {
          if (k === "blank") { var sp = document.createElement("span"); sp.className = "lk-key lk-key--blank"; sp.setAttribute("aria-hidden", "true"); pad.appendChild(sp); return; }
          var b = document.createElement("button"); b.type = "button"; b.className = "lk-key";
          if (k === "back") { b.className += " lk-key--ico"; b.innerHTML = ic("backspace", { size: 24 }); b.setAttribute("aria-label", "Backspace"); }
          else b.textContent = k;

          if (POS.cash.isOpen()) POS.cash.movement("handover", 0, currentOp().name);
          renderUser(); afterCashChange(); applyOpPrefs();
          POS.toast(POS.s("op.switched") + " · " + target.name, { variant: "success", duration: 1600 });
        }
      }
      function onKey(e) {
        if (/^[0-9]$/.test(e.key)) { e.preventDefault(); press(e.key); }
        else if (e.key === "Backspace") { e.preventDefault(); press("back"); }
      }
      shell();
      var app = $(".app"); if (app) { app.setAttribute("inert", ""); app.setAttribute("aria-hidden", "true"); }   // bloqueio real: foco/SR não passam por baixo
      document.body.appendChild(node);
      var firstKey = node.querySelector(".lk-key"); if (firstKey) firstKey.focus();
      document.addEventListener("keydown", onKey, true);
    }
    function opRole(t) { var o = POS.operators.find(function (x) { return x.id === t.operatorId; }); return o ? POS.t(o.role) : POS.s("user.role"); }
    function renderUser() {   // reflete o operador atual no topo (avatar + nome + terminal)
      var t = POS.terminal();
      var termLabel = (t.terminalId || "T1").replace(/^T(\d+)$/, "Terminal $1");
      var av = document.querySelector(".topbar__user .topbar__avatar"); if (av) av.textContent = initials(t.operatorName);
      var nm = $("#tbUserName"); if (nm) nm.textContent = t.operatorName;
      var tt = $("#tbUserTerminal"); if (tt) tt.textContent = termLabel;
      var st = document.querySelector(".topbar__store"); if (st) st.textContent = (POS.store && POS.store.name) || st.textContent;
    }
    // troca de operador SEM fechar a caixa; regista handover e carimba as próximas vendas
    /* ---------- Autorização por PIN (governança a morder no fluxo) ---------- */
    var TIER_RANK = { operator: 0, supervisor: 1, manager: 2 };
    function curTier() { return POS.policy.tier(POS.terminal().operatorId); }
    // pede PIN de um operador com tier >= minTier; se o atual já tem, passa direto (zero toques)
    function requireTier(minTier, onGranted, hintKey) {
      if (TIER_RANK[curTier()] >= TIER_RANK[minTier]) { onGranted(POS.terminal().operatorName); return; }
      var pin = "", wrap = document.createElement("div"); wrap.className = "sheet op-switch auth-pad";
      wrap.innerHTML = "<h3>" + POS.s("auth.title") + "</h3><div class='sheet__sub'>" + POS.s(hintKey || (minTier === "manager" ? "auth.hintManager" : "auth.hintSupervisor")) + "</div>" +
        '<div class="op-pin" style="border:none;padding-top:0"><div class="lk-dots" id="authDots"></div><div class="lk-pad op-pad" id="authPad"></div></div>' +
        '<div class="sheet__foot"><button class="btn btn--block" data-k="cancel">' + POS.s("act.cancel") + "</button></div>";
      var dotsEl = wrap.querySelector("#authDots"), pad = wrap.querySelector("#authPad");
      function dots() { var h = ""; for (var i = 0; i < 4; i++) h += '<span class="lk-dot' + (i < pin.length ? " is-on" : "") + '"></span>'; dotsEl.innerHTML = h; }
      function check() {
        var who = POS.operators.find(function (o) { return TIER_RANK[o.tier || "operator"] >= TIER_RANK[minTier] && o.pin === pin; });
        if (who) { close(); onGranted(who.name); return; }
        wrap.classList.remove("shake"); void wrap.offsetWidth; wrap.classList.add("shake"); pin = ""; dots(); POS.toast(POS.s("op.wrongPin"), { variant: "danger", duration: 1400 });
      }
      ["1", "2", "3", "4", "5", "6", "7", "8", "9", "blank", "0", "back"].forEach(function (k) {
        if (k === "blank") { var sp = document.createElement("span"); sp.className = "lk-key lk-key--blank"; pad.appendChild(sp); return; }
        var b = document.createElement("button"); b.type = "button"; b.className = "lk-key";
        if (k === "back") { b.className += " lk-key--ico"; b.innerHTML = ic("backspace", { size: 22 }); } else b.textContent = k;
        b.addEventListener("click", function () { if (k === "back") { pin = pin.slice(0, -1); dots(); return; } if (pin.length >= 4) return; pin += k; dots(); if (pin.length === 4) setTimeout(check, 120); });
        pad.appendChild(b);
      });
      var close = POS.openModal(wrap, { label: POS.s("auth.title") });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", function () { close(); });
      dots();
    }
    function requirePermission(action, onGranted) {
      var opId = POS.terminal().operatorId;
      if (POS.policy.can(opId, action)) { onGranted(POS.terminal().operatorName); return; }
      var need = (POS.policy.read().perm || {})[action] || "manager";
      requireTier(need, onGranted);
    }
    function switchOperator() {
      var t = POS.terminal();
      var sel = null, pin = "", close = null;
      var wrap = document.createElement("div"); wrap.className = "sheet op-switch";
      wrap.innerHTML = "<h3>" + POS.s("op.switchTitle") + "</h3><div class='sheet__sub'>" + POS.s("op.switchHint") + "</div>" +
        '<div class="op-list" id="opList"></div>' +
        '<div class="op-pin" id="opPinSec" hidden><div class="op-pin__lbl">' + POS.s("op.pin") + "</div>" +
          '<div class="lk-dots" id="opDots"></div><div class="lk-pad op-pad" id="opPad"></div></div>' +
        '<div class="sheet__foot"><button class="btn btn--block" data-k="cancel">' + POS.s("act.cancel") + "</button></div>";
      var listEl = wrap.querySelector("#opList"), pinSec = wrap.querySelector("#opPinSec"), dotsEl = wrap.querySelector("#opDots"), pad = wrap.querySelector("#opPad");
      function pinLen() { return (sel && sel.pin ? sel.pin.length : 4) || 4; }
      function dots() { var n = pinLen(), h = ""; for (var i = 0; i < n; i++) h += '<span class="lk-dot' + (i < pin.length ? " is-on" : "") + '"></span>'; dotsEl.innerHTML = h; }
      function buildPad() {
        pad.innerHTML = "";
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "blank", "0", "back"].forEach(function (k) {
          if (k === "blank") { var sp = document.createElement("span"); sp.className = "lk-key lk-key--blank"; pad.appendChild(sp); return; }
          var b = document.createElement("button"); b.type = "button"; b.className = "lk-key";
          if (k === "back") { b.className += " lk-key--ico"; b.innerHTML = ic("backspace", { size: 22 }); b.setAttribute("aria-label", "Backspace"); }
          else b.textContent = k;
          b.addEventListener("click", function () { press(k); });
          pad.appendChild(b);
        });
      }
      function press(k) {
        if (k === "back") { pin = pin.slice(0, -1); dots(); return; }
        if (pin.length >= pinLen()) return;
        pin += k; dots();
        if (pin.length === pinLen()) setTimeout(check, 120);
      }
      function check() {
        if (sel && pin === (sel.pin || "")) { doSwitch(); return; }
        pinSec.classList.remove("shake"); void pinSec.offsetWidth; pinSec.classList.add("shake");
        pin = ""; dots(); POS.toast(POS.s("op.wrongPin"), { variant: "danger", duration: 1400 });
      }
      function doSwitch() {
        var from = POS.terminal().operatorName;
        POS.setTerminal({ operatorId: sel.id, operatorName: sel.name });
        if (POS.cash.isOpen()) POS.cash.movement("handover", 0, from + " → " + sel.name);
        if (close) close(); renderUser(); afterCashChange();
        applyOpPrefs();   // aplica idioma/tema do novo operador (se tiver preferências)
        POS.toast(POS.s("op.switched") + " · " + sel.name, { variant: "success", duration: 1800 });
      }
      POS.operators.forEach(function (o) {
        var cur = o.id === t.operatorId;
        var b = document.createElement("button"); b.type = "button"; b.className = "op-row" + (cur ? " is-current" : "");
        if (cur) b.disabled = true;
        b.innerHTML = '<span class="op-ava" style="background:' + avatarColor(o.name) + '">' + initials(o.name) + "</span>" +
          '<span class="op-info"><b>' + o.name + "</b><small>" + POS.t(o.role) + (cur ? " · " + POS.s("op.current") : "") + "</small></span>";
        b.addEventListener("click", function () {
          sel = o; pin = "";
          listEl.querySelectorAll(".op-row").forEach(function (x) { x.classList.remove("is-sel"); });
          b.classList.add("is-sel");
          pinSec.hidden = false; buildPad(); dots();
        });
        listEl.appendChild(b);
      });
      close = POS.openModal(wrap, { label: POS.s("op.switchTitle") });
      wrap.querySelector('[data-k="cancel"]').addEventListener("click", function () { close(); });
    }
    function openUserMenu(anchor) {
      if (document.querySelector(".tb-menu")) return; // já aberto (toggle trata o fecho)
      var fs = !!document.fullscreenElement;
      function item(icon, label, act, warn) { return '<button class="tb-menu__item' + (warn ? " warn" : "") + '" role="menuitem" data-act="' + (act || "") + '">' + ic(icon, { size: 20 }) + "<span>" + POS.s(label) + "</span></button>"; }
      var menu = document.createElement("div"); menu.className = "tb-menu"; menu.setAttribute("role", "menu");
      menu.innerHTML =
        '<div class="tb-menu__head"><span class="topbar__avatar">' + initials(POS.terminal().operatorName) + '</span><div><b>' + POS.terminal().operatorName + "</b><small>" + opRole(POS.terminal()) + "</small></div></div>" +
        '<div class="tb-menu__sep"></div>' +
        item("user", "user.profile", "profile") + item("settings", "nav.settings", "settings") +
        '<div class="tb-menu__sep"></div>' +
        item("repeat", "user.switchOperator", "switch") + item("register", "user.switchTerminal", "terminal") + item(fs ? "minimize" : "maximize", fs ? "user.exitFullscreen" : "user.fullscreen", "fs") +
        '<div class="tb-menu__sep"></div>' +
        item("corner-up-left", "user.backToMoloni", "moloni") + item("log-out", "user.logout", "logout", true);
      document.body.appendChild(menu);
      var r = anchor.getBoundingClientRect();
      menu.style.top = (r.bottom + 8) + "px"; menu.style.right = Math.max(8, window.innerWidth - r.right) + "px";
      anchor.setAttribute("aria-expanded", "true");
      function close() { menu.remove(); anchor.setAttribute("aria-expanded", "false"); document.removeEventListener("mousedown", onOut, true); document.removeEventListener("keydown", onEsc, true); }
      function onOut(e) { if (!menu.contains(e.target) && !anchor.contains(e.target)) close(); }
      function onEsc(e) { if (e.key === "Escape") close(); }
      menu.addEventListener("click", function (e) { var b = e.target.closest("[data-act]"); if (!b) return; close(); handleUserAction(b.dataset.act); });
      setTimeout(function () { document.addEventListener("mousedown", onOut, true); document.addEventListener("keydown", onEsc, true); }, 0);
      var f = menu.querySelector(".tb-menu__item"); if (f) f.focus();
    }

    /* ---------- Bindings ---------- */
    $("#search").addEventListener("input", function (e) {
      query = e.target.value.trim();
      $("#searchWrap").classList.toggle("has-value", !!query);
      renderCatalog();
    });
    $("#search").addEventListener("keydown", function (e) {
      if (e.key !== "Enter") return;
      var matches = searchProducts();
      var exact = POS.products.find(function (p) { return p.barcode === query || (p.ref || "").toLowerCase() === query.toLowerCase(); });
      var target = exact || (matches.length === 1 ? matches[0] : null);
      if (target) { addProduct(target); query = ""; e.target.value = ""; $("#searchWrap").classList.remove("has-value"); renderCatalog(); }
    });
    $("#searchClear").addEventListener("click", function () { query = ""; $("#search").value = ""; $("#searchWrap").classList.remove("has-value"); $("#search").focus(); renderCatalog(); });
    $("#kbdToggle").addEventListener("click", function () { $("#search").focus(); POS.osk.toggle(); $("#kbdToggle").setAttribute("aria-pressed", String(POS.osk.isOpen())); });
    $("#btnMore").addEventListener("click", openMoreMenu);
    $("#btnCustomer").addEventListener("click", openCustomer);
    $("#tbLock").addEventListener("click", lockTerminal);
    $("#tbUser").addEventListener("click", function () { openUserMenu($("#tbUser")); });

    function renderCart() { renderDoc(); renderCustomer(); renderLines(); renderSummary(); }
    function renderAll() { applyStatic(); paintStaticIcons(); renderRail(); renderCatalog(); renderCart(); renderOps(); syncCashUI(); renderUser(); }

    POS.onCartChange(function () { renderCustomer(); renderLines(); renderSummary(); renderGrid(); renderOps(); });
    POS.onLayoutChange(function () { renderOps(); renderLines(); });
    POS.onLangChange(renderAll);
    POS.onLangChange(function () { if (reopenScreen && !$("#screen").hidden) reopenScreen(); });

    // preferências pessoais do operador (idioma/tema viajam com o login)
    function saveOpPrefs() { POS.setOpPrefs(POS.terminal().operatorId, { lang: POS.lang, theme: POS.theme }); }
    function applyOpPrefs() { var pr = POS.opPrefs(POS.terminal().operatorId); if (!pr) return; if (pr.lang && pr.lang !== POS.lang) POS.setLang(pr.lang); if (pr.theme && pr.theme !== POS.theme) POS.setTheme(pr.theme); }
    POS.onLangChange(saveOpPrefs); POS.onThemeChange(saveOpPrefs);

    POS.mountDevNav("sale");
    renderAll();
    applyOpPrefs();   // aplica as prefs do operador atual ao arrancar
    tick(); setInterval(tick, 1000 * 20);
    $("#search").focus();
    try { if (localStorage.getItem("pos_locked") === "1") lockTerminal(); } catch (e) {}   // mantém bloqueado entre recargas/abas
    cashStartupPrompt();   // convida a abrir a caixa se estiver fechada (dispensável)
  })();
  </script>
</body>
</html>
